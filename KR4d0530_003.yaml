得箇卭州竹拄到雲居不擬回送西江賢古愚上人山僧新自豫章回千里還乘渡水杯問法諸天龍象繞談經半夜鬼神來西風夏解江雲變南國秋歸野菊開欲叩心宗塵外侣白頭今日已成灰送範準堂住天台法輪寺白首南屏坐不回偶提佛法住天台幽禪有味風生磬瘦影無塵月滿臺羅漢山中飛錫過鮫人海上獻珠來不知萬壑煙霞底何處尋師撥芋煨送道存師游方故人去作逺逰僧千里關河付腳縢壞衲秋縫慈母線空山夜别祖師燈王城乞食應持鉢嶽寺棲禪暫挂藤何日諸方參叩遍一菴歸老白雲層送絶宗繼講師住大雄寺大展三衣古道場真人髙拱殿中央曼陀雨散天花落薰陸煙生石乳香纚纚風雷飛講舌耽耽龍象繞禪牀師行不廢宗雷社㑹覓籃輿到上方送泐季潭還龍翔時笑隱已化曽將小品問支公真是人間學道雄弟子不須悲滅度禪師久已證圓通長懷石上三生舊無復溪頭一笑同想見西岡歸禮塔神光時繞夜壇紅送至上人還金陵卷有笑隱丁仲容詩朱雀橋邊白下門舊游回首不堪論令威未返遼東鶴圓澤難招石上魂金剎火餘灰已冷錦囊詩在墨猶存南來邂逅逢師話老淚臨風墮酒尊聞雲海寬寶林同二師寂音悼之久别吳寬與越同近傳歸寂故禪宫葛川有日尋圓澤蓮社無人寄逺公亭外松焚雲海靜井間鰻化寶林空只留一㸃詩燈在長照殘山剩水中答復見心見寄蓮花峰下天香樹吹老西風幾度秋僧寶真同洪覺範詩窮我亦孟參謀文章宇內千年事身世江湖萬里舟甚欲相期石橋路更須同訪羽人丘重寄水西新公道場渭公三塔寬公我恐前生老法華退居清淡即僧家禪師有道常騎虎侍者通神自辟蛇已負法身來震旦終拋塵網覓提奢洞庭春後多風水准擬南歸買釣車道場山頂千年寺逈出雲林最上層師已新聞出世法我今渾似在家僧書遲不到秋風雁詩苦長縣夜雨燈蚤晚南歸有船闕籌峰真館追松瀑黃石翁尊師月色今宵恰滿規有山如此愧來遲金堂石室不到處澗水松聲無盡時麻姑凌寒或送酒木客入夜同吟詩匡廬老仙去已逺悵望雲間笙鶴期送張惟善使還上清宫驛騎翩翩萬里歸上清山下是巖扉金銀宫闕神仙館河漢文章織女機赤羽頻縣行處節青霞自剪醮時衣使途邂逅還相别回首江雲朔雁飛送道士張一無還安仁省親南楚東吳一草亭道人元不歎飄零幻身在世真如露客鬢經年漸欲星招隱山中猿鶴怨話禪石上鬼神聽殷勤此别須回首不忘君家桂樹青贈别句曲外史張伯雨𤣥洲别島鬱巃嵸滿谷蜷雲護萬松外史編圖瓊笈祕隱居留誥玉函封丹池雨見龍無角藥圃春肥鹿有茸擬借一龕為洞吏與君來往大茅峰壺隱為滁州徐仁則賦匏繫深知固蒂難飬生聊托一壺間仙公賣藥曽藏市逸士操瓢只在山千里江湖浮處逺百年日月貯來閒底須狡獪驚凡目剖破輪囷别築環懷計籌山通真館純一雲峰髙士雕年短髮苦駸駸只益孤懷歎惋深老比師丹渾忘事死無鍾子絶知音哀猿易下三聲淚獨鶴長存萬里心漫憶雲峰凌羽士故山無夢可相尋送匡山王濟逺朱𢎞道南歸萬峰蒼翠繞舒城中有琳宫似上清俠客劍寒騰虎氣仙人笙響作鸞聲到山定及朱桃熟歸洞應多白鹿迎好在丹房保𤣥極九還金液待君成幻寓菴用虞芝亭學士韻暫寄微軀在世塵此菴名亦强為鄰了知百嵗旦暮事豈泥三生前後因非假日明那有目忽隨空壞本無身要知枯坐環中者别是人間不死人送述古彭大年真人袖有神方煉紫荷幾年璚籙著功多仙人海上騎黃鶴道士山中認白騾棗木斗盤藏霹靂楊枝瓶水灑天河只應小閲開皇劫一劍秋空處處過大年仙人樂天遺雷符一卷為題一夕空飛解劍形先生神氣即風霆已還天闕朝羣帝别寫雷符使六丁遼海鶴歸雲邈邈葛陂龍化水冥冥只今有子能傳業來奉祠官篆檄靈題間間吳宗師徒孫丁自南卷羡君學道上清宫親得先生早發䝉枸杞未逢朱孺子丹砂須問葛仙翁忩前㸃易寒研露壇上焚香夜禮空化鶴歸來定何事從師千載住崆峒送劉彥基奉宗師命訪求道德經注北風霜霰日冥冥送子南歸出廣庭上國幾年陪賜履名山隨處訪藏經藜光照夜時燃火龍氣衝寒直射星却憶冲虛觀前路豫章雙樹更青青壺洲為上清張道士題錦水溪頭觀闕青仙家原不隔滄溟鳳麟洲渚寒凝碧雲霧衣裳夜降靈金醴浸花留客醉玉笙吹月使龍聽看君福地容蕭爽長與曽孫宴幔亭送上清道士李自賓歸山歸去青溪㸃易忩仙林如子世難雙丹藏虎豹千山雪劍度魚龍萬里江别洞苔花分石路古壇松子落巖淙道人不用尋煙火术煎經冬正滿缸送陳復齊歸婺之武義清寧觀武川道館白雲間蕭散真宜羽客閒丹侣有情開藥竈青童應在守蘿關岡頭叱石成羊起花下吹笙馭鶴還嵗晚相思擬相覓只愁落葉滿空山送胡道士還豫章舟居道人船子是行窩如此東湖煙水何寶劍攜將叱雷雨錢符埋得鎮蛟鼉雲盤仙篆朱文細海浴神丹絳氣多應與匡廬桂風子山中騎虎夜相過送薛鶴齊南歸吳中老鶴幡然憶楚皋南來直渡浙江濤千年故國悲城郭萬里晴空見羽毛候館夜吟飛綵翰靈壇秋醮振琅璈隃麋白屋山中路留得仙家舊種桃雲臺真館為上清周用章作突兀中天積翠遙層臺宛似鬱羅蕭清池曉浴丹如火白石春耕玉有苗此地來龍如可築他年歸鶴底須招只應月夜遊仙侣時復吹笙下紫霄送方玉壺羽士之京師學道武夷還上清羽人毛骨鶴同輕丹留别室生虹氣嘯隔空山作虎聲劍外鬼神來叱咤畫中河嶽入經營緱山合在飛亷館㑹見祠光徹夜明挽張伯雨宗契一夕星壇蛻羽衣山靈何許散靈輝書留真誥陶𢎞景名在丹臺馬子微海上青騾應逺去罏中白兔想潛飛風篁後夜還成韻猶似簫聲月下歸鹿巾曽入紫宸朝歸向名山駐緑軺龜脫生筒無俗纍鶴存瘦骨有仙標三元饑飯杯猶在五色香烟火已消應復神遊易仙館人間楚些若為招童稚情親到白紛真香幾向鵲爐焚丹成自浣天壇雨劍解空埋月澗墳山友分將石刻帖門人唱得錦飛羣他時㑹續君前傳刋作青瓊板上文月澗葬所正一冲和宫楊𢎞道以虞學士詩求和𤣥都桃是舊時花曽駐春遊送客車翰墨尚看延閣老松蘿長護羽人家丹砂鍊得仙翁術白絹封來諫議茶文采風流徒想見九霄無佩乞飛霞往事真成過眼花前王俱此走降車鶴歸華表千年郭燕入烏衣百姓家雨壞苑墻生野薺雲殘候館老山茶欲將弔古無窮意髙倚披雲賦落霞廣東帥府掾林德恭餉藤簟韜向筒中一握輕風漪八尺勝桃笙文編黑白蚺皮滑漆透丹黃虎魄明塢上卷將滄海色嶺南寄與故人情竹牀柟枕山忩下從此酣眼夢亦清鐵笛為孟天暐賦愛此輕圓鐵鑄成何須楚竹選孤生年多化作青蛇色夜靜吹如彩鳳聲繡出碧花凝錯落冷含金氣發鏗清最宜攜向君山去一聽仙翁奏月明給事以馬乳貺就索詩挏官載出槖駝馬分得官壺給事家代飲酪奴寧許敵蒸豚人乳不成誇肥凝曉露鴟夷革香帶秋風苜蓿花長與詩翁消酒渴肯辭為客住龍沙仙娥玩月圖為野雲陳氏題仙娥微步下髙寒獨立長松月滿山汝影透明金背鏡佩聲飛動玉連環洗空碧海銀蟾冷舞罷瑤階白鳳閒不是丹青寄顔色行雲無夢到人間陳子平寄所作瓊花答謝鳳在陽岡鶴在臯相思空遣夢勞勞簫吹夜月江橋酒槎泛秋風海市濤故國山川吳分野美人詞賦楚離騷瓊花新製人爭寫應使揚州紙價髙周漢長公府臨安故城二圖今開元宫主家樓觀鬱參差想見當年全盛時宫草細侵行輦路苑花深覆泛舟池瑤臺仙去塵生海甲帳神來風滿旗好在畫圖留勝蹟五雲長護鶴笙祠南渡君臣建業偏不堪喬木黯風煙豈知白馬興王後又到紅羊換劫年三輔黃圖空郡國六朝王氣渺山川白頭開府歸來日應覽遺蹤一愴然海樓為宛丘秋藏用題不著闌干百尺髙難容此客卧雲濤深連厚地三千軸逈壓神仙十五鼇日影夜生浮畫棟珠光秋孕射霜袍醉來白眼看餘子未許元龍氣獨豪太古樓為豫章傅道士題羽客棲𤣥紫極宫樓居三景自玲瓏游雲宛在洪荒世探道元居恍惚中忩白夜生南浦月簾髙時卷上江風如何宴坐忘機者千劫塵緣一息空半村為傅處士賦半距城闉半距村煙霞咫尺少塵喧小車出市僕先路斜日下山人到門兩岸花隂連第宅一川草色散雞豚田家數里將迎慣時復相留醉酒樽李克約餉臘梅并詩用韻答之空谷佳人縞袂單淡黃衫薄護春寒色欺隱者山中桂香逼騷靈畹裏蘭鳥吐粟金妝處巧蜂留蜜滓鍊來乾數枝乞與吟忩供溫水銅瓶自插看霍丘孫游武林湖山之勝詔之千頃平湖繞郡城畫船小槳蕩春聲紅酣花港風荷密玉照梅岡雪樹明煙月長留歌舞地山川不改古今情君行須到峰南北為覓蒼苔石上名懷臨川舊游賦以贈别戈直伯敬擬峴臺前汝水流因君還憶舊曽遊故人零落半為鬼賤子蹉跎今白頭詩思入江楓葉冷鄉心隨雨雁聲秋北齊居士知强健為覓新篇慰别愁暮春偶作瞢騰睡思酒頻中潦倒吟懷語不工燕子人家春復夏楝花時候雨兼風青林脫蝨成蝴蝶白水鳴蛙抱活東甚欲相從問丹訣頂間朱橘幾時紅草堂為胡晉仲題姑孰城中林壑竒幽人愛此結茅茨垂忩已著盧鴻畫繞壁惟書杜甫詩花氣晴薰燒酒火潮痕晚上釣魚絲數椽有此真堪隱不待山靈重勒移贈相士陳巨山老我寧甘徹骨貧多君見與掇皮真乖崖本是無情者若水終為勇退人機外驪黃難著相眼中青白自如神華峰太極圖猶在何日相欈問隱淪贈地理家何玉泉芒屩笻枝興渺然知君曽得異人傳經探玉髓青囊祕山隱金精鐵鎖縣腹有丹光飛日月眼窮地脉入雲煙幾時把袂神州路共看華嵩翠插天贈易學李所翁易學如翁近所無藹然聲問動江湖著龜凶吉占如繇爻象縱橫畫有圖三卷祕書傳句曲百錢卜肆隱成都相逢欲問平生事何惜春醪滿眼沽贈箏工任禮牙牀銀甲不勝清錦席瑶箏無限情第一部中當絶藝十三絃上有新聲齊宫蟬怨時時咽湘浦鴻來箇箇驚宜向教坊供國樂要須名似郭無名玉笙為陸國瑞賦曽聽仙人白玉笙飛瓊有譜學初成碧桃半向露中落采鳳忽來雲際鳴瑟響洞庭空寫恨磬浮瀛海不傳聲何如吹上扁舟去秋滿西湖月正明長至日題佳節蕭然無過賓餕餘觴豆自相親斗垂西柄半入海梅發南枝先得春平日以文為事業老來惟酒是精神莫論炊熟邯鄲未巳是山翁一缺伸元夜獨坐九衢花月萬家燈憶在錢塘與廣陵過去豪華春似夢老來心賞冷於氷蘇耽仙後還為鶴房琯生前本是僧喚取家人多置酒只將寂寞付瞢騰夜起雞鳴不鳴山四更月落未落霜滿城起看北斗寒挂地俯聽長河流有聲今夕何夕耿無寐千古萬古難為情欲持心事出門去哀歌坐待東方明秋懷山人底事縛微官來對䦨干首蓿盤匣印少開經雨澀篋衣多敝入秋寒勞生沙漠隨征轂入夢江湖有釣竿歌罷中庭待明發起看星漢正漫漫世事世事紛紛在目前故園無復可歸年吳東城陷仍為沼滄海塵生欲變田鼠穴詎容銜窶藪豨膏聊解運方穿臣心有血才盈掬擬向天公罄一箋蛻菴集卷三
