body:
  text: 蛻菴集卷三元張翥撰七言律詩無題見時略略望遙遙有月䦨干待袖招得巧蜘蛛絲縷細傳聲鸚鵡舌關嬌仙家絃管寧無譜天上星河亦有橋雲雨或時消息斷不如朝暮石城潮聞笛何人吹笛傍江干木落淮南夜色寒三弄水邊人艤棹一聲雲杪客憑欄梅花􅉡􅉡吹應落楊栁依依折欲殘惆悵緑珠何處在綺忩深鎖月漫漫臺城運盡黃旗晉祚開天星俄復坼三台方驚掘地雙鵝起已見浮江五馬來草暗離宫碑仆土雨殘戰地骨生苔當時一掬新亭淚猶帶寒潮日暮回冶城此地先皇駐六龍鼎成龍去杳無蹤御牀羅帕塵空暗輦道朱門草已空題榜侍臣留帝敕築亭真士記天容自憐不及窺弓劍愁絶寒城響暮鐘鹿苑寺千古南朝幾劫灰蕭梁寺額獨崔嵬化蛇妬婦餘空井刺虎將軍有舊臺江口山紅寒照沒石頭樹白暝烟來滿衣落葉西風急更為憑髙送一杯瓦棺寺修竹長松晝寂然梵宫髙閣起中天虎頭妙畫空餘刻鴟吻名書竟不傳石柱至今標宿莽瓦棺何處葬寒烟憑髙更盡䦨干曲及取江山未暮前石頭城用薩天錫韻逶迤石路帶城遙古寺殘僧蘚半凋一自降王歸上國空餘故老說前朝壞陵鬼剽傳金碗畫壁仙妝剝鳯翹更欲留連盡竒觀夕陽江上又生潮秦淮晚眺赤欄橋下暮潮空逺火疏舂暗靄中新月半天分落照斷雲千里附歸鴻嚴城鼓角秋聲早故國山川王氣終莫訝時來一長望越吟荆賦思無窮八月十六夜對月蟋蟀梧桐秋滿庭浮雲散盡見踈星仙人修月渾無跡使客乘槎自有靈一道銀河通碧海三更白露下青冥西風忽起吹黃鵠夢斷瑤臺醉未醒七憶憶錢塘平湖十里碧漪風歌舫漁舟逺近同天竺雨餘山撲翠海門潮上日蒸紅傷心花月隨年換回首閭閻委地空白髮故人零落盡浮生悵望夢魂中憶姑蘇讓王城外暮雲黃忍使行人哭戰場臺上麋逰香徑冷陵頭虎去劍池荒竹枝夜月歌仍怨蓴萊秋風興漫長不是不歸歸未得五湖烟水正茫茫憶㑹稽千巖秋色徹層霄憶昔來乘使者軺翠袖屢扶蓬閣醉籃輿時赴寶林招山隂客已無春㑹溪上風猶送暮樵此恨古今銷不盡西陵寂寞又回潮憶維揚蜀岡東畔竹西樓十五年前爛漫逰豈意繁華今劫火空懷歌吹古揚州親朋未報何人在戰伐寧知幾日休惟有滿襟狼藉淚何時歸灑大江流憶金陵昔年曽上鳳凰臺二水三山眼界開六代繁華春草歇千年興廢暮潮哀燈忩禪坐時聨句山館仙逰幾引杯最是令人愁絶處夕陽雙燕自歸來憶吳興憶泛苕華溪上船故人為我重留連半山塔寺藏雲樹繞郭樓臺住水天白榜載歌明月裏青帘沽酒畫橋邊計籌山下先塋在欲往澆松定幾年憶閩中漫漫漲海際天涯萬里曽乘使者槎梓澤重尋仙客洞草堂頻醉故侯家人多熟酒燒紅葉市有生蠻賣象牙安得夢中真化蝶翩然飛上刺桐花中秋次友生玩月韻華月光浮玉色醪涼颸時拂紫袍河通閣道流雲急星繞天樞出地髙按舞豈無仙跨鶴縱吟聊放客揮毫扁舟近憶樟亭下曽看魚龍送夜濤閏九月逰錢塘南屏諸山山僧領客興何長慧日峰前俯大荒舊俗尚傳三令節人生難遇兩重陽丹楓換葉隨秋老黃菊留花過閏香更與摩崖訪陳跡西風吹冷薜蘿裳閏中秋是日白露節河漢雲消溢素光重開樽酒據繩牀嫦娥斟酒猶前夕老子婆娑且醉鄉風信兩番生緑桂年華一寸入黃楊怪來詩思清難忍早雁聲中露欲霜七月望對月新秋月色初圓夜逺客樓中獨坐時却數只驚身老大相看聊與影栖遲神仙宫闕開三島牛女星河淡兩旗不是吳剛頻伐樹西風應長出輪枝中秋廣陵對月散盡浮雲月在東白蕉衫冷小庭空星河夜影樽罍裏城郭秋聲鼓角中落葉有光時墜露鳴蛩無響不含風此生五十三回見只遣嫦娥笑秃翁上元宿通州楊原誠寓宅禁城東下一川平杳杳烟蕪淡淡晴風滚暗塵羊角轉水披殘凍鴨頭生離居有酒春堪醉小市無燈月自明還憶故園今夕賞玉人花底共吹笙丁亥元日梅花院落雨聲中忩外春寒淰淰風臘酒撥醅浮玉蟻夜燈挑燼落金蟲星環甲紀驚身老雪解寅朝驗嵗豐還喜驛書催上路寸心長在日華東中秋玩月崇真萬夀宮西風吹月出雲端松柏流光繞石壇上國山河天廣大仙家樓觀夜髙寒似聞玉杵鳴𤣥兔疑有瑤笙下翠鸞只把酒杯供醉賞不知零露滿金盤四月旦日雨中送春苦筍櫻桃次第來雨餘官樹緑連街白纓蚯蚓歌幽草赤幘蚍蜉穴古槐短髮欲星愁有效幻身如電事無涯人間恩怨何須論團扇清風又入懷述古真人夀席為賦龍虎山中有洞天長生見此老彭籛羽衣小作金門客玉籙元書紫府仙藥竈夜光丹似日夀尊春色酒如泉未須便覓雲林隱更閲人間八百年春日泛湖陪李旻德融席上作春來渾不到湖邊偶逐東風上畫船花氣暖流黃鳥岸水光晴展白鷗天緑尊興極頻呼酒銀管聲髙正輥絃我比放翁應更放看花不獨海棠顛雪後苦寒雪後北風尤苦寒燎爐起擁懶頭冠謾懷學士酴醿酒仍對先生苜蓿盤戎馬尚驚塵滚滚客槎空望海漫漫向來事是今朝夢底用悲吟且自寬喜雨久旱苦蝗日氣如焚土氣腥黑雲當午忽冥冥雨工分下旗千隊神姥攜來酒一瓶牛馬長河迷渚涘龍蛇平陸起雷霆快看一洗飛蝗盡猶及秋田晚稼青清明日到陳莊出郭東門古道斜獨騎欵段穩于車春才三月已兩月村舊百家無十家山徑低飛鬼蛺蝶野塘競噪官蝦蟆東風不奈晚愈惡吹散滿身楊白花東西馬塍春行柬平湜伯容清明時節每多隂楊栁人家花滿林侵晚乍收連日雨賞春常負百年心鳬翁一一蒲塘暖雉子斑斑麥隴深為報能詩平處士剩攜芳酒共幽尋暮春有感次劉監丞二鳥寧容一處囚能鳴何似不鳴休來今往古無窮事剩水殘山總是愁欲識碧雲須麗句擬裁白雪缺名謳强顔未得投簪去一濯塵纓萬古流上京大雨驟寒飲周從道所莫年已卜田園去豈意猶歌行路難且復酒杯同旅次不堪人事總憂端山林茒屋三生逺風雨氈裘六月寒吾友有家應此住老夫何地挂吾冠逰鳳凰山故宫至髙禖臺鴻雁池衰草寒烟老木風南朝佳氣落秋空璧來山鬼遮秦使盤泣仙人出漢宫壞埒尚傳祠乙鳥荒池曽見射飛鴻騷人自古多離思長在登臨感慨中春日偕監中士友逰南城樓閣參差紫翠間微風不動綵雲閒栁垂禁籞絲千尺水繞宫溝玉一環春樹鳥鳴圓似管夕陽駝影兀如山醉鞭緩緩吟歸去燈火城東未掩關上京秋日三首山前孤戍水邊營落日無人已斷行甌脫數家門早閉轒溫千帳火宵明白摧野草狼同色秋入榆關雁有聲最是不禁橫笛怨海天秋月不勝情水繞雲回萬里川鳥飛不下草連天歌殘敕勒風生帳獵罷閼氏雪沒韀紅頰女兒花作隊紫髯都護酒如泉時巡嵗嵗還京樂别換新聲被管絃逺山平野浩茫茫曽是當年古戰場飲馬水乾沙窟白射雕塵起磧雲黃中郎節在仍歸漢校尉城空罷護羌今日車書逢混一不辭垂老看氊鄉三月二日賞杏花光嶽堂分韻栁色初青草漸茸春寒猶勒杏花風新煙院落清明後過雨園林罨畫中洛社衣冠今日再蘭亭觴詠此情同吾年最老身仍健更向尊前借酒紅臘日飲趙氏亭城上髙亭一再過每看風物費吟哦近詩頗效寒山子往事徒成春夢婆賸買十千燕市酒閒聽二八越娘歌梅花枉報春消息祗遣今年别恨多秋日偕成竹居秦景桓逰蜀岡萬花園九曲池平帶蜀岡吳公臺逺隔雷塘閒尋遺跡懷千古逈立髙丘望八荒黃落山川秋廣大青冥風露日凄涼一尊不慰登臨地朔雁南雲恨更長春日逰王公亮南墅人家星散住村墟第二港頭潮水初蛺蝶一䦨花院落烏犍千畝雨鉏犂養魚已得陶朱法種樹還抄汜勝書興熟不辭歸路逺醉扶斜日上柴車秋日陪吳興諸府公宴魯公池上芙蓉池上㑹羣公滿意華筵笑語中虹影連蜷山外雨荷香淡蕩晚來風歌催銀甲箏逾急涼入金樽露易空我亦玉堂揮翰手題詩合在水晶宫刋史局雨涼陪韓左丞叔亨小集斷煙疏雨散秋虹古木髙堂納晚風青史文章千古上紫微星象五雲中前朝無似於今盛羣彥難期此㑹同涼思滿簾宜解帶好懷寧放酒杯空中秋張外史招賞月失約賦以謝之明月中天霧氣消酒醒涼思正飄飄星河不動秋空濶鐘鼓無聲夜寂寥露下逺山皆落木風來滄海欲生潮仙家玩事無緣到虛負瓊樓聽玉簫辛巳二月朔登憫忠閣百級危梯遡碧空憑䦨浩浩納長風金銀宫闕諸天上錦繡山川一氣中事往前朝僧自老魂來滄海鬼猶雄只憐春色城南苑寂寞餘花落舊紅早發潞陽驛征車如水轡如絲望入金河欲曙時萬里山川環拱抱九天宫闕起參差風林泥泥秋多露野淀稜稜曉有澌三十餘年觀國願白頭今日到京師上京即事灤河東出水瀠洄叠坂層岡擁復開金柱鎮龍僧呪罷玉輿馭象帝乘來中天星斗朝黃道塞漠雲山繞紫臺欲擬兩京為賦頌白頭平子愧無才舟發浙江夜泊廟山驛風帆東上浪冥冥鐘鼓山前近驛亭江海秋生河漢白魚龍夜沒水雲青誰從三島求仙藥自信孤槎應客星好喚吳兒扣舷起浩歌呼酒月中聽豫章山房為見心復公賦劍江寺裏古樟樹百尺如蓋青童童山靈長此護林壑雷電不許藏蛇龍掃石僮來秋葉後談經僧坐晝隂中題詩禪房更瀟灑便與王城祗樹同上清山中煙景空明石路微千年草木駐光輝山中觀闕金銀氣天上神仙黼黻衣赤石大溪魚欲化青雲𤣥圃鶴長飛只今浩劫頻來往未信滄洲與願違四明寓居即事郡城重鎮浙江東徼道荒蕪雉堞空於越山川星紀外故王臺榭水雲中船來蠻賈衣裳怪潮上海鮮鱗鬛紅不向旗亭時一醉行人愁殺栁花風郡樓晚望全晉山川氣象開滿城煙樹擁層臺土風舊有堯時俗人物今無楚國材千嶂晚雲原上合兩河秋色雁邊來昔賢勝賞今陳迹落日登臨畫角哀雁自代過晉嶺客中感興雁行初自雁門來逺度平沙陳勢開光祿塞空霜氣冽受降城廢水聲哀烏孫公主歌難和猿臂將軍射未回今日客中腸易斷不須更上最髙臺茌平道中風起征塵滿鬢鬚頻呼驛卒緩前驅已悲白骨多新鬼尚說黃巾半畏途麥老大田鳴乳雉草深荒徑竄妖狐停驂思飲瓜園井欲倩鄰翁放轆轤宴四明江中醉卧及醒舟已次車廏站使節重來省昔年舊逰零落一凄然山川在眼空陳迹歌舞催人又别筵風捲潮聲全海起雨分虹影半空懸酒醒惟有斜忩月偏照姚江獨夜船發樂清縣岑山亭百尺新亭起碧岑長藤古木鬱蕭森山重山掩分吳越潮落潮生自古今飛鳥去邊浮海色夕陽明處散秋隂五雲長近仙臺上時聽鸞簫月下吟石門書院瀑布飛泉噴薄下靈湫疑有龍居最上頭長日風雷穿石起半空河漢抉雲流青牛隱去神宫在𤣥鶴歸來洞府幽弭節名山諧宿願築居終羡昔賢遊西峽渡江上日髙寒霧開渡頭風順早潮回中流白舫翩翩下兩岸青山滚滚來蠻媪浣紗衣似雪驛夫到岸鼓如雷舍人起揭篷忩坐笑割羊桃薦酒杯湄洲嶼飛舸鯨濤渡渺冥祠光壇上夜如星蛟龍筍簴縣金石雲霧衣裳集殿庭萬里使軺遊冠絶千秋海甸仰英靈乘風欲借天風便倣佛神山一髮青次福青宏路站州守林清源邀飲治所酒家籬落隔青棕更在輕煙細雨中繞郭好山橫野碧緣溪芳樹立春紅故人雪鬢年年老太守風謠處處同十載相逢又相别不堪回首海雲東浮山道中處處人煙有酒旗楝花開後絮飛時一溪春水浮黃頰滿樹春風呌畫眉入境漸聞人語好看山不厭馬行遲江蘺緑遍汀洲外擬折芳馨寄所思北山苦雨待程繼先舟行老態已成便早睡呼兒更與助深杯半忩風雨催秋到一夜湖山入夢來潦水無根殊泛濫蛩聲多事為悲哀不知明發緣何喜滿意燈花落又開寄龍翔欣公長老古笪橋邊夾道斜老禪方丈梵王家山人宴