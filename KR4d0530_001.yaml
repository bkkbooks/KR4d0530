body:
  text: 蛻菴集卷一元張翥撰五言古詩堂堂朝為堂堂吟暮為堂堂謳堂堂徒爾竒堂堂徒爾憂不見膏與蘭煎燔祗自休勿以不遇故棄捐經與史勿以勢利故棄捐亷與恥勿以行役故棄捐山與水謂夜未遽央已復明星明仰視何煌煌白露忽沾裳懷人攪余心何以勿永傷江北亦為客江南亦為客為客多逼兀何以安所適上有君與親下有妻與息在山則種榆在隰則種蒲馬牛必維婁舟航必繻袽富貴富貴友貧賤貧賤徒嵗月來者多江湖逝者逺所得不可逝所期不可返幸此世纍輕歸去衡門偃雜詩先人有夙訓聞在幼壯時豈意衰暮日乃復新驗之茫茫上天理詎可私臆知百年大化中流浪從推移信彼杞憂者徒為衆所嗤叔子鄰家兒探環記前身次律求師後一悟了宿因我亦清源洞蛻骨巖下人誤墮聲利區驅馳喪其真所以付樽酒都忘賤與貧惜無還丹術髙舉遺世塵悠悠笙鶴期曠望三山津寒日迫縣車寸隂老愈惜晨趨理公務暮返親墳籍究往發孤憤思來抱深惕理愜復相忘神劬聊一息湛然擁襟坐栩栩鼻端白千齡與化終不朽在方策聖哲有明訓學道庶自益寒夜何皛皛中庭積繁霜天風下河漢萬里流玉光羽衣四三人各乘白鳯凰笙響發空際遊雲髙馳翔無緣執霞佩攬結雙明璫願托月中桂終古有餘芳隴坂何﨑嶇行人且復止直上望晴川遙遙憶鄉里流離肝腸斷悲歌不能已一身已遐征永念同室子何殊轉蓬科隨風四散起雖得同根生不得同根死吾灑古今淚多於隴頭水春江采瑶草將以伸繾綣初期拾翠洲復道滋蘭畹美人隔花深歌竟瑶瑟偃臨流不可見恍忽心未穩佳時難驟得鶗鴂鳴已晚祇有千古思綿綿楚波逺黎丘之丈人歸路逢竒鬼既為鬼所惑又復鬼其子夏南滑蜀梁俯影明月裏背走謂伏鬼而又鬼諸已此皆非鬼者特以疑故死憧憧姦佞徒情狀實鬼爾匿迹不自慚胡為滿朝市河淮厭兵禍城邑多荒榛百里無幾家但見風起塵燕雀歸果樹豺虎飢食人鄉來脂膏地死骨今如銀流亡使復業牛種當及春安得百龔召錯落為拊循征討尚未息奈何爾遺民前出軍五首前軍紅衲袍朱絲繫彭排後軍細鎧甲白羽攢鞲靫輜車左右馳萬馬擁長街送行動城郭斗酒飲同儕壯士當報國毋為故鄉懷煆鐵作佩刀磨石為箭鏃中軍把轅門前豎十丈纛朝上蘆溝橋夕次泃河曲超乘既誇勇騁馬復齊足男兒不封侯百年同視肉昨日發萬軍今日發萬軍明日發萬軍梟騎來羣羣馬蹄所經過黃埃蕩成雲堆糧與作飯倒樹與作薪道途行者絶那得有居人大軍北庭來部伍各有屯放馬原隰枯磨刀河水渾行行且射獵雉兔不復存野次羣駝卧弓箭挂車轅幽幽笛聲起日暮傷人魂京師少年子膽氣乃粗豪傾金售寶劍厚價買名刀白氊作行帳紅綾製戰袍結束往從軍談笑取功勞當時霍嫖姚豈在學戎韜後出軍五首步卒傖楚健長刀短甲衣大呌前搏敵跳蕩如鳥飛左提血髑髏右奪賊馬歸黃金得重賞顧盼生光輝爾輩疾歸命將軍足天威我軍城東門呼聲震屋瓦百萬山壓來此賊何足打狂鋒尚力拒轉鬬血噴灑城中有暗溝多陷人與馬將令毋輕入明當一鼓下先鋒才攻門後軍已登陴拔都不怕死直上搴賊旗馬前獻逆首腳下踏死尸長河走敗船疾遣飛將追幕中作露板應有傅修期行行鐵兜鍪隊隊金駱駝嗚嗚吹銅角來來齊唱歌總戎面如虎指顧揮雕戈馬踶無賊壘手箠可填河王師本無敵安用戰圖多魔賊生汝亳獠賊起於海嬰鋒天狗觸墮網奔鯨駭徐方一戰收振旅已奏凱江浙塵既清豫章圍亦解諸將如竭力削平行可待獨酌謡有酒且一醉有歌且一謡杯盡當再酌歌闋須重調生足意自適身榮心苦焦所以黎首人放浪樂漁樵一謡仍一酌且復永今朝明朝未可料况乃百嵗遙但願花長開美酒長滿瓢靜疑太古調散覺神理超近識南郭叟得酒時見招盡醉即髙卧誰能慕松喬古鏡古鏡色如墨照人不見形我照乃見心洞徹天地明此明非外來此明非內有自是世上人惟將照妍醜題林大用隱居飯牛山山田多白石陽陂足豐草瘦地費牛力飯之當宿飽近午牛背熱出耕須及早解紖休樹隂念此觳觫老隱居抱正學逍遙事幽討商歌干齊侯戚也豈知道中秋望月當年見明月不飲亦清歡詎意有今夕照此長恨端近聞錢塘破流血城市丹官軍雖殺賊斯民已多殘不知親與故零落幾家完徘徊庭中影對酒起長歎死生兩莫測欲往書問難仰視雲中雁安得托羽翰凄其衰謝蹤有淚徒汍瀾山中松筠地棄置誰與看河漢變夜色西風生早寒纍觴不能醉百念摧肺肝送客齊化門東馬上口號白楊多悲風黃葉滿行路荒溝寒水碧亂石且無數我興逺送别駐望生百慮欲往豈不懷畏此簡書故遙遙墟煙上歷歷鳴雁度秋景倐己短歸人驅車去勞歌一凄然回首重愁暮陽曲義士薛氏旌表詩卷至正二年事十二年其里人趙時照求題上天久無雨南風日吹沙旱氣彌蟲蟲六月稻不花晉土素磽瘠如此嵗食賖上官方勸分義士起嘆嗟發帑捐積鏹糴粟來連車吾鄉忍溝壑哺爾萬口呀厚澤田里被頌聲父老誇預備世勿務征斂惟紛拏遂令活人功乃出一士家不知時有司視此無愧耶我作義薛詩好德良可嘉願言講荒政生意當無涯安童都事字鼎新號太虛徴余賦之集賢院太虛本無象何有倪與端至理妙自然萬化孰控摶天地亦一物而在虛空間所以豪傑士不受世網干脫迹形氣表出入凌汗漫鸞鵠為我導雲飇作之翰仰扳霄衢轡俯濯龍池瀾緑文粲瑶軌髙咏瀛洲山冥心合玄想坐以空洞觀琳腴薦朝食紫金咀神丹無待無窮外浩然與之還漷農歎漷南有農者家僅一兩車王師征淮蔡官遣給軍儲翁無應門兒一身老當夫勞勞千里役泥雨半道途到軍遭焚烹翁脫走故閭車牛力既盡户籍名不除府帖星火下爾乘仍往輸破産不重置笞箠無完膚翁復徒手歸涕洟滿敝襦問家墻屋在榆桞餘殘株野雉雊梁間狐狸穴階隅老妻出傭食四顧筐篋無有司更著役我實骨髓枯仰天哭欲死醉吏方歌呼題述律萬户淡樂軒惟淡有至樂此樂世罕知誰能味無味舍彼甘與肥君侯文武才面有虎豹姿被甲起上馬出入百萬師西來樹功勳獻頌白玉墀方將大將權繞帳羅旌麾紛華艷人目孰不為朵頥顧於方寸間物纍乃若遺齋居寄遐賞而無山林期處樂寧易言豈獨靜者宜始知豪傑士自有絶世資悠哉淡中趣吾道同所歸送黃中玉之慶元市舶昔我逰四明壯觀溟海波褰裳寶山頂曙色寒嵯峨日輪鎔生金涌出萬丈渦雲氣忽破碎朱光相蕩摩決眥蓬萊宫攜手扶桑柯羣仙迎我笑佩羽紛傞傞颶風歘驚潮騰擲鱷與鼉浮槎徑可攬從此超天河精神動百靈上下煩撝訶歸來已十載逺夢時一過君家賢父兄儒術傳世科薄言捧省檄舶署聊婆娑是邦控島夷走集聚商舸珠香雜犀象稅入何其多權衡較低昂心計寧有訛資閲須歷試壯圖詎蹉跎惟君官事隙為訪巖之阿懸想仙者徒往往笑且歌遐征渺不見空響遙相和因聲兩黃鵠持我紫玉珂豈無滄洲興奈此塵劫何門有車馬客行坐秋雨思秋風仰視白日雲中彼美一人誰容秉心鬱其忡忡為客一鼓云何慷慨起舞悲歌巨魚出聽涼波鳴鳥徘徊庭柯有客有客在門崔嵬髙蓋華軒起欲與之語言已叱僕夫回轅寧不少忍須臾謂我巷不容車北望豪家是趨堂上有箏有竽盛衰相尋無端媒勞恩絶則然還坐自樂我間勿謂無知絶絃七言古詩古促促辭促促何促促丈夫生兒美如玉長城遊蕩不思歸令我隻身守空屋不願汝學班定逺不願汝學馬相如定逺生不入玉關相如死不還成都但如塞翁父子長相保得馬失馬何足道又如龎公攜家隱鹿門遺安遺危俱不論貴而衣貂不如貧而緼枲離而食肉不如聚而飲水身雖促促心得寬為汝白頭屋中死北風行長河風急波浪惡青天晝黃塵漠漠瓠􅕧渡中舟盡泊官船扯帆與水爭牽馬毛寒撾不行秃樹挂戛枯蓬驚夜深風定浪聲死忩光倒搖天在水前伴相呼隨雁起帽絮不暖衣生稜老貿不語愁河氷上閘下閘應蹙凌篙師指直失增減明星欲明霜似糝館陶城南鼓紞紞螢苑曲楊花吹春一千里獸艦如雲錦帆起咸洛山河真帝都君王自愛揚州死軍􅋔小隊皆美人畫龍韀汗金麒麟香風搖蕩夜遊處二十四橋珠翠塵騎行不用燒紅燭萬點飛螢炫川谷金叉歌度苑中來寶帳香迷樓上宿醉魂貪作花月荒肯信劍戟生宫墻斕斑六合洗秋露尚疑怨血凝晶光至今落日行人路鬼火狐鳴隔煙樹腐草無情亦有情年年為照雷塘墓城西路城西路多少人從此中去昨日紅顔美少年今朝白骨委黃泉縱令藏金比山積鬼伯不受人間錢少年何用誇豪富來看城西送人處發古城鋪黃蒿古城風捲沙澗頭衰樹啼寒鴉嵗云暮矣霜露積夜如何其星漢斜滿衣落月行人起馬上夢魂猶在家王貞婦青楓嶺頭石色赤嶺下􅖣江千丈黑數行血字尚斕斑雨蕩霜磨消不得當時一死真勇烈身入波濤魂入石至今苔蘚不敢生上與日月爭光晶千秋萬古化為碧海風吹斷山雲腥可憐薄命良家女千金之軀棄如土姦臣誤國合萬死天獨何為妾遭虜古來喪亂何代無誰肯將身事他主兵塵澒洞迷天台骨肉散盡隨飛埃楓林景黑寒磷墮精靈日暮空歸來堂堂大節有如此正當廟食依崔嵬君看􅖣江之畔石上血與湘江之竹淚痕俱不滅題昌化陳孝子傳百丈山前妾逢主禮賢鎮中子逢母三十餘年昨日同白髮相看淚如雨阿㜷去時未斷乳兒壯得知心獨苦清湖老嫗天所留逆旅主人神使語歸來桑竹溪之滸婦前持觴兒起舞雙瓜生祥表秋圃豈用旌書動官府吳人買妾紛莫數嵗滿母歸遺子女巷南巷北不相覓况復山川兩修阻嗚呼千秋復萬古孝子之名在寰宇世上滔滔忘母人不愧唐昌一抔土題鐵石驄馬圖神崖黑龍時出水遊牝何年得其子是何毛骨如積鐵逈立長風獨竒偉霜蹄白鼻散五花倐見馬中真騄駬美髯奚官能剪拂不遣雲鬟涴泥滓少施鞚勒即飛騰唾尚不敢况敢捶馬生豈在粟一石不飽寧能見才美朝燕晡越信汝良安得壯士同生死阿師一室巾錫外時展此圖臨燕几三生似是支道林愛馬苦心同若此平原豐草秋漠漠恍惚寒沙颯然起英雄有志在青雲老眼因之空萬里題趙文敏公畫馬君不見漢家將軍求善馬戰骨縱橫血流野歸來作歌薦宗廟寧悲鬼哭宛城下何如聖代德所懷入獻磊落皆龍媒右牽者誰鬈者偲萬里知自宛沙來眼光鏡懸蹄腕促老奚識性仍善牧時巡之外遊幸稀飽秣原頭春苜蓿吳興學士藝絶倫妙處直似曹將軍只今有馬無此筆誰與寫之傳世人為君甘老駑駘羣題牧牛圖去年苦旱蹄𫾣塊今年水多深沒鼻爾牛觳觫耕得田水旱無情力皆廢畫中見此東臯春牧兒超搖犢子馴手持鴝鵒坐牛背風栁煙蕪愁殺人兒長犢壯須盡力豈惜辛勤供稼穡縱然喘死死即休不願徴求到筋骨題李白觀泉圖玻璃杯中春酒緑醉墨淋漓牡丹曲平生合置七寶牀白紵烏紗美如玉阿瞞荒宴百不理寧記宫花銜野鹿何物老嫗生此兒偷向金雞帳中宿髙將軍才奴𨽻耳誤使脫鞾吾所辱要留汙襪踏鯨魚鼠子何堪煩一蹴尋常溝瀆不可濯何處容伸遭汙足翩然却下匡廬雲五老峰前看飛瀑題郝內翰書所作夢觀瓊花賦後釣魚山前龍上天武昌城外走蜀船老姦欺國馳露布使者坐囚吞雪氊潰兵一夜甲填水血污木棉花下鬼豈知老仙方卧遊鶴背天風扶夢起頽雲抉月光西流玉簫聲斷江聲愁露華泣盡瓊樹死廣陵春色寒於秋百年遺賦人爭重徑墨遒毫精爽動節旄零落喜生還回首江南已如夢花神換根春更芳想像月色扃餘香楚招無人青鳥去公不少留涕泗滂題趙仲穆怪石竒木君不見嶽陽城南老樹能化人又不見草中巨石如卧虎樹逢仙客授還丹石誤將軍箭飛雨海寧太守提健筆與丹通靈箭角力山精木魅寒睒眻千年醜怪匿不得銜瘤半裂雷大出隱入雲綃露竒迹猝然一見心膽驚氣盡畫工俱辟易挂之髙堂風動搖古色一片秋蕭蕭待候硯池卷東海歸寫扶桑與沃焦題長孫皇后諫獵圖黃門曉出西清仗秋色滿天鷹犬王虎落遙連渭水南鸞旗直度河橋上日邉雲氣五色文虬鬚天子真天人羽林猛士森成列六氣不驚清路塵太平無征帝神武豈為禽荒將按部已知哲后佐興王不數樊姬能霸楚從容數語即罷田六宫迎笑花如煙蹕回那待外庭疏聽諫由來同轉圜天寶神孫墮大業錦繡五家爭蹀躞可憐風雪驪山宫正與真妃同射獵題華山圖華嶽連天向西起澒洞秦川三百里巨靈髙掌削芙蓉影落黃河一線水雲臺霧谷巢神仙羽衣金節時周旋大笑失腳白騾背歸來石上長鼾眠千載悠悠寄元賞耳孫風骨猶蕭爽逺從丹丘渡滄海追挹神蹤欲長往何人想像圖真形疊崕隂洞髙林青上摩金天之帝京下攬玉女之明星峰耶魔耶兩莫極虎豹呌絶煙霏冥仙家樓觀超然住遙認微茫是征路丹梯鐵鎖不可攀直喚茅龍上天去懶拙道人苕溪曉望圖憶昔薄逰苕之城溪光近秋山晚晴連峰接嶂望不極惟有白雲縱復橫漁村無林樹墨色微風忽起菰蒲聲月從太湖東畔出直射西塞山前明人家碧玉壺中住野舫銀河天上行酒酣時起發長嘯水底直遣魚龍驚老暉鄉亦此盤礴安知今我非三生盡搜萬象入竒筆畫與詩境俱崢嶸吾家苕中有茅屋京塵滿鬢難為情頓令扁舟夜入夢萬頃鷗波歸濯纓金宣孝太子墨竹沙海神光射天起中有蟠龍龍有子混同江聲何處來卷作琳琅墨池水蜿蜒飈起鱗鬛張蛻骨立化千篔簹一朝侍臣抱髯泣鶴駕不歸雲路長百年梁苑陵谷變流落人間能幾見明昌內府應祕藏小字親題保成殿吁嗟帝子真天人此君亦作天人真君不見洋州老太守揮灑雖工無此神緑玉連環歌為邢從周典簿作于闐河頭夜光發赤髯賈胡采明月中有美璞凝寒晶誰許鬼工能琢成伊誰得此邢公子示我緑玉雙連理恍如空碧虹氣垂半隱青瑶蟾一規展之兩環不逾尺疊作團團小蒼璧縠文錯落映雷文宛是昆吾寶刀刻廬陵學士癖好竒辨古重似瓊琚詞珊瑚佩鈎詎可數我疑制自金源時集賢仙公丈人行鳳閣舍人文有樣請君留束宫錦袍待看揮毫玉堂上并州歌送張彥洪使畢還河東吾鄉故人零落盡見子老成殊慰心祥金百鍊乃利器桐尾方焦逢賞音河東臬府幕下士飛傳來作朝正使太和嶺上盜已空旌旗盡是官軍紅殺人如麻道路絶朝狐暮梟競巢穴嚴風歘起霜倒飛塞日黯淡寒無輝子來未幾遽言歸使我東望淚沾衣豈不聞并州少年遊俠子手攜玉龍最輕死并州將軍劉越石夜半登臨長嘯起汾河直來繞郡城雁門離石寒崢嶸老旻四葉彈丸地大梁全師勞再征一朝征賊輒破碎大將不誅天失刑為子作歌歌憤激眼中太行如動色安得壯士射烏弓為落攙搶連太白劉道權為李逺子微作青山似洛中圖為作歌以係之石頭城中有渺渺之秦淮秦淮東流入江逺其上疊巘連魯崖牛頭雙闕雲門開三山北山鬱煙霾六朝遺迹猶在眼千古往事徒興懷昔人謂此洛中似四面青山圍二水劉侯熟識此景勝况復愛畫入骨髓五尺長紙繭不如乘興破墨塗成圖漁梁茅屋昏欲無壞陵荒隴迷楸梧寒潮已落斷崕濶行人不渡扁舟孤嵩邪邙邪漫漶那可辨但見招提林杪直下藏村墟憶我羈逰石城日江煙山雨正蕭瑟橫塘酒家好新酒醉倚船忩看竒崛只將健句寫歸來却恨此時無此筆吳俊仲傑橫河精舍圖亦道權作橫河精舍誰所居豐城隱者吳仲傑是中林壑特幽勝一幅劉權畫尤絶逺山數曲重復重炊煙一村樹叢叢嵐光雲氣紛滉漾盱水汝水遙相通近山什伯青匼匝峰底斜穿鷓鴣峽跳波直下却洄漩怪石截斷雙流合竹忩桂棟溪之隅過門好客無時無溪魚長肥酒長熟撥棄世務談詩書梧州春雨草木長櫸塘耕稼仍膏壤鉏翁牧子行唯諾沙鳥風帆自來往獨不見陶縣令松菊園又不見杜陵老桑麻田人生得此不歸去有如頭上之青天傑乎傑乎吾羡汝毋負山中故人招隱篇崔旭行之雲巢圖贈道士俞剛中請余賦長歌崔郎胸次竒宇兀興來從人索紙筆斯須千峰萬峰出底用一石畫五日上饒道人列仙癯示我新作雲巢圖塗嵐抹霧思更逸古色滿眼蒼寒俱重溪疊谷各異狀壞木崩石森相向翠微最上雲所棲道人又在雲之上數椽丹室蔭白茅團團雲間如一巢拂衣拂著宿鶴背挂劍挂落長松梢空濛杳靄迷處所豈復漂搖畏風雨既非鳥窠老衲子無乃中林古巢父填忩擁户晝不開神光隱見金銀臺雲之君兮鳳為馬往往玉簫吹月來道人幾年遊上國賣藥壺中人不識洞玄宫觀剛中所建宫名一黍珠靈秀似與仙都敵故巢未破歸便得歸到玉山多美石我詩毋刻刻此圖留照千秋山水碧剛中永豐縣人送崔讓士良都事江淮行省時平久不修武備一旦盜賊起跳踉南窺荆鄧北徐汝紅巾直來據武昌摧城破壁官吏走九江太守能死守赤眉銅馬終殄除此賊遊魂那得久天兵勢若風雨來直掃四野無氛埃廟謨最先擇元帥國計莫重完江淮堂堂中書開外省幕府人材倚公等崔侯如刃新發硎鋒鋭所當無肻綮金湯表裏元有捷正藉前籌資薄伐草茅有策可采用義士多方須教閲酒酣客起征馬鳴壯氣滿髯肝膽傾浩歌把劍徒激烈老矣莫賦從軍行為古紹先題劉平妻胡氏殺虎圖沙河岸邊秋草白棗陽城頭落日黑老兵辛苦踐更來林下稅車聊一息黃蘆颯颯中夜鳴倀鬼呌嘯悲風生虎飢得人怒不置婦急徒手危相爭直前死力持虎足呼兒進刀屠虎腹但知有夫豈知虎視之何殊機上肉當時一擊寧顧軀驚魂碎骨仍攜扶九原瞑目已無憾舊血勿湔身上襦千秋節義傳鄉閭我猶膽怯見畫圖健婦果勝一丈夫向來馮婦有不如城南城南北風朝卷沙將軍開宴樹大牙黃鬚健兒飽酒肉十十五五來將車盡驅丁男作生口鬼妾鬼馬充其家嗚呼上天不可問道旁觀者徒咨嗟范寬山水憶昔往尋剡中山南明天姥相縈盤客路上頭穿鳥道行人腳底踏風湍旦寒露重多成雨泄霧濛雲互吞吐僕夫相呼巖谷間空響譍人作人語溪窮岸斷地忽平石門壁立如削成隔水無數山花明中有人家雞犬聲向來老眼曽到處此境俱作桃源行百年留在范寬筆水墨精神且蕭瑟上有翰林學士之院章恐是宣和舊時物林猿野鶴應自在令我相見猶前日時平會乞間身歸一壑得專吾事畢張師夔為郭子靜作終南山色因題終南山色秀可食中有遊雲動凝碧華嶽西面仙掌髙仙都下射金精白紺宫琳館慿險阻渭水晴川來咫尺古木深藏魍魎寒隂崖曉入蜿蜒黑幽人舊隱依青壁蘿徑紫籬閉寥闃野橋插岸何處船落日無人獨歸客櫟翁筆法追郭熙逺意欲寄煙霞微半生江海屢驚夢萬里風塵能化衣捷徑無媒既愁寂故山好在曷遄歸尚説於今明月夜時有簫聲臺上飛天香室為四明定水復見心禪師賦寺有楊誠齋題定水山中多古桂老璘結茅來避世囊中少試蒸花法正藉煙霏作輿衛誰令作詩傳世人一時攪動聲聞塵百年公案結未了復翁拈起還清新唱開石壁壁成字百顆明珠照天地不關旃檀林下風薰破枯禪半邊鼻吾聞佛家别有衆香國我亦三生學禪客若為一洗六根空從子歸來分半席題趙文敏公木石有先師題於上吳興筆法妙天下人藏片楮無遺者南陽詩律動江湖一篇才出人爭寫二老風流傾一時只今傳畫仍傳詩清涵月露秋見影黑入雷雨寒無姿仇山黃鶴去不返苕溪鷗波嵗俱晚好呼鐵爪夜錚錚刻向青珉照人眼題武林姚氏頥夀堂有地須種木蘭花有樹好宿雙啼鴉木蘭女兒能代父慈鴉之雛能哺母姚家堂中如畫圖鶴髮髙居彩衣舞當年兵塵暗鄉關扶攜藳砧煙瘴間天留晚福在平世去家萬里仍生還有兒有婦供滫瀡書聲歌聲動鄰里板輿不待魚軒列鼎不如負米中有至樂物莫比酌彼金罍酒起為頥顔壽堂前日日春風和棘心之詩豈足多我今獨無空爾羡如此堂中萱草何題雪溪待渡圖晉陽山下蒲村渡斷坂連岡疊煙樹橫汾水落流更急客子西歸迫秋暮朔風轉雨作雪飛倚蓋沙頭泥沒屨後來者誰須我友望望津船出前溆濕雲撲地邊鴻驚危橋挂岸征馬生樵家有徑凍葉平土牀火暖無人聲亂峯倒倚白石爛空壑半壓氷槎橫歸來想像猶眼底詎擬褐夫能畫此溪明雪淨古色起一片荒寒在忩几嵗晚逺遊吾倦矣題李早女真三馬扇頭金源六葉全盛年明昌正似宣和前寶書玉軸充內府時以李早當龍眠想當畫院供奉日飽閲天間萬竒骨等間遊墨落宫扇駿氣凌風欲超忽霧鬛風􅐢剪剔新郎君丰格玉為人四帶紗巾繡衣領醉鞭踏盡燕臺春一聲白雁黃河暮豈料征蹄竟南渡回首西風障戰塵女仙空抱琵琶去題陳所翁九龍戲珠圖兩龍頡頏出重淵白日移海空中懸一龍回矯一倒起側磔胡髯怒噴水火珠炎炎如彈丸爪底雲頭爭控摶一龍仰首逆鱗露兩龍旁睨蒼崖蟠怪風狂電浩呼洶天吳倅立八山動一龍後出尤崛竒半尾戲繞蜿蜒兒兒生未角已神猛一顧却走千蛟螭陳翁硯池藏霹靂往往醉時翻水滴便覺天瓢入手來雨氣模糊渾是墨我嘗見畫多巨幅簸蕩驚濤駭人目何如此筆窮變化三尺微綃形勢足是翁前身定龍精故能吸歘奔精靈卷圖還君慎封鐍但恐破壁飛空冥題侍郎秋江捕魚圖秋江水多魚唯唯海風驅潮葭菼靡輕舠競載罛網出欲向中流截魴鯉巨鱗有神不可獲騰踏波濤脫泥滓最憐濡沫笭箵間小白針頭尖如指釣璜渭叟晚終遇西塞玄真徴不起若人自是隱者徒豈比沙島漁蠻子髙髯能畫得玄理塗抹山川遊戲耳千巖萬壑堆白雲稍看人家喬木底眼中之景何所似富春澤畔鸕鷀里兩臺蕭瑟秋風髙腳底灘聲蕩清泚我當扁舟衝雁過倣佛崖根舊曽艤自知世外漁者村只合投竿老煙水巨緇未辦五十犗草屩撈蝦從此始畫馬後有宋思陵押封以御寶睿思殿中萬幾暇縹帶犀籖閲名畫君王愛此神駿姿筆勢不在韋韓下五雲御押手自封玉窠蟠屈宸篆紅百年重遭赤馬劫散落不逐兵塵空誰歟傳之能愛惜尺楮蕭蕭開古色驪驄玉面蹄腕白青絲絡腦黃金勒風􅐢半散頭怒側一團渥窪雲氣黑緋衫圉郎緊控持直恐驕騰收不得向來南渡小朝廷虎視欲與金源爭蜀襄馬場能幾匹尚想按圖心膽傾只今萬里龍沙道遊牝千羣飽豐草天間上駟皆乘黃駑蹇紛紛世空老贈吳士桑饒吳興一士氣貌醇儒冠落魄甘長貧醫家諸書總貫穿有病有藥即與人山中僦屋不肯出苦厭城市多囂塵得錢沽酒飲即醉指點富貴如浮雲時來西湖住幾日所宿隨夜餐隨晨過門與我談抵掌百無一偽皆天真疾惡如讐每憤激正坐時命遭其屯人生除貧貧則已五鬼到此安能神天以清名補寒餓昔之隱者人皆聞聖賢法則吾豈敢鄉里小兒安足云况君能醫當濟世未歎行路常踆踆伸眉一笑索我别北風吹雪來繽紛溪畔無錢附歸去垂橐不管妻子嗔青山白石大自在且復挂子頭上巾江湖多蘆識者少嵗晚逺遊須待春君不見舍中之長眼眥肉豈解善事長桑君題泰東山藏主十八開士圖環瀛茫茫去不窮大鯨吹浪鼓颶風樓船如山不敢過况在泛葦浮萑中西方十八大尊者徑渡萬里猶乘空犀行水開蛟蜃露直下踏入天吳宫龜魚背髙盂錫穩中流正與靈槎同怪頭達四罔象一單舁出龎眉公鼻端噓氣作飛塔舌上彈呪招降龍兩僧促膝披貝葉一衲裏足須山童雪毛白鹿岐角健斑尾黑虎雙睛紅最後坐禪如古佛從渠摶控何神通吾聞浮屠多善幻作詩自賞畫者工君不見海波橫潰鬼神惡我無其術安能東重賦明山歌送胥式有儀還武昌山式從其師曽堅子白讀書處盱母城南隱居者一生耕鑿盱南野何年移入明山來築樓山顛雲在下環山小塢三十六中有清池蔭桑竹日髙塢口煙霧消稍見行人出深谷池頭古井穿石空絶底暗與江流通井中鯉魚長尺半人不敢取疑蛟龍隱居何人曽子白誰其從者胥生式先生喜與山為徒意不在仙在樓居胥也來讀山中書溪翁野老時時一相過有筐盛蕨兮有酒盛壺興酣題詩滿青壁墨痕入石青模糊華蓋浮丘石門麻姑鄰峯丘壑可逰衍山中之樂足以遄吾軀生今掉頭不肯住京塵茫茫嵗云暮豈知卬亦愛山人未辦山資得歸去曽先生幾時把袂明山行灑掃樓上聽松聲黃精飽啖一千日飛上丹梯朝玉京息齋竹石古木為會稽韓季博士題上有歐陽原功承旨題老竹葉稀多秃枝新竹碧潤含幽姿籜中龍子振春蟄突出雷雨頭參差旁蹲怪石石罅裂裂處恍惚疑龍穴山中有樹皆十圍活幹撑青死槎折霜皮食盡乾蘚文半頂斬立雙丫分最後一枝身出羣垂枝倒走隂崖雲李侯標致不可得小字親題别塗黑縱橫不在摩詰下蕭爽直與洋州敵玉堂學士欣見之濃墨大書真崛竒森然一片鐵石筆妙甚七字瓊瑰詞此詩此畫今兩絶把玩微風動毛髮只應真宰泣雕鏤一夜山忩冷秋月崑山寺在吉安崑山突兀摩空蒼寺幽更枕山之陽松杉髙出人境外樓閣半在天中央日照簷楹分杳靄風回廊廡添清涼谷聲逺合蒲牢韻林近時聞薝蔔香紅塵咫尺到不得黃金地面生輝光我疑意在融結際真宰用意非尋常雲埋煙蔽嵗月古未與時會猶潛藏一旦寶像頓發見果聞玉磬鳴髙岡二生開示此經始源流既濬深必長乃知景物不自勝惟人方可存其綱休洗紅二首休洗紅洗紅紅在水新紅換作裳舊紅翻作裏回黃倒緑無定期世情翻覆君所知休洗紅洗紅紅減色雖好不如新著時須愛惜阿母嫁女不擇人雞飛狗走長苦辛悲寒風夜漫漫風凛凛嚴霜下寒更甚狐鳴鬼嘯有今夕倉卒劍戟生髙枕神光墮地摧白虹嗚咽英雄淚空飲蛻菴集卷一
