顧軀驚魂碎骨仍攜扶九原瞑目已無憾舊血勿湔身上襦千秋節義傳鄉閭我猶膽怯見畫圖健婦果勝一丈夫向來馮婦有不如城南城南北風朝卷沙将軍開宴樹大牙黄鬚健兒飽酒肉十十五五來将車盡驅丁男作生口鬼妾鬼馬充其家嗚呼上天不可問道旁觀者徒咨嗟范寛山水憶昔往尋剡中山南明天姥相縈盤客路上頭穿鳥道行人脚底踏風湍旦寒露重多成雨洩霧濛雲互吞吐僕夫相呼巖谷間空響譍人作人語溪窮㟁斷地忽平石門壁立如削成隔水無數山花明中有人家雞犬聲向來老眼曽到處此境俱作桃源行百年留在范寛筆水墨精神且蕭瑟上有翰林學士之院章恐是宣和舊時物林猿野鶴應自在令我相見猶前日時平㑹乞閒身歸一壑得專吾事畢張師䕫為郭子靜作終南山色因題終南山色秀可食中有㳺雲動凝碧華嶽西面仙掌髙仙都下射金精白紺宫琳館慿險阻渭水晴川來咫尺古木深藏魍魎寒隂厓曉入蜿蜒黒幽人舊隠依青壁蘿徑紫籬閉寥闃野橋揷岸何處船落日無人獨歸客櫟翁筆法追郭熈逺意欲寄烟霞微半生江海屢驚夢萬里風塵能化衣捷徑無媒既愁寂故山好在曷遄歸尚說於今明月夜時有簫聲臺上飛天香室為四明定水復見心禪師賦寺有楊誠齋題定水山中多古桂老璘結茅來避世囊中少試蒸花法正藉烟霏作輿衛誰令作詩傳世人一時攪動聲聞塵百年公案結未了復翁拈起還清新唱開石壁壁成字百顆明珠照天地不關旃檀林下風薰破枯禪半邊鼻吾聞佛家别有衆香國我亦三生學禪客若為一洗六根空從子歸來分半席題趙文敏公木石有先師題於上呉興筆法妙天下人藏片楮無遺者南陽詩律動江湖一篇才出人爭寫二老風流傾一時只今傳畫仍傳詩清涵月露秋見影黒入雷雨寒無姿仇山黄鶴去不返苕溪鷗波嵗俱晚好呼鐵爪夜錚錚刻向青珉照人眼題武林姚氏頥夀堂有地須種木蘭花有樹好宿雙啼鴉木蘭女兒能代父慈鴉之雛能哺母姚家堂中如畫圖鶴髪髙居彩衣舞當年兵塵暗鄉關扶攜藳砧烟瘴間天留晚福在平世去家萬里仍生還有兒有婦供滫瀡書聲歌聲動隣里板輿不待魚軒列鼎不如負米中有至樂物莫比酌彼金罍酒起為頥顔壽堂前日日春風和棘心之詩豈足多我今獨無空爾羡如此堂中蘐草何題雪溪待渡圖晉陽山下蒲村渡斷坂連岡疊烟樹横汾水落流更急客子西歸廹秋暮朔風轉雨作雪飛倚盖沙頭泥没屨後來者誰須我友望望津船出前溆濕雲撲地邊鴻驚危橋挂岸征馬生樵家有逕凍葉平土牀火煖無人聲亂峯倒倚白石爛空壑半壓氷槎横歸來想像猶眼底詎擬褐夫能畫此溪明雪凈古色起一片荒寒在忩几嵗晚逺㳺吾倦矣題李早女真三馬扇頭金源六葉全盛年明昌正似宣和前寳書玉軸充内府時以李早當龍眠想當畫院供奉日飽閲天閑萬竒骨等閒㳺墨落宫扇駿氣凌風欲超忽霧鬛風􅐢剪剔新郎君丰格玉為人四帶紗巾綉衣領醉鞭踏盡燕臺春一聲白雁黄河暮豈料征蹄竟南渡回首西風障戰塵女仙空抱琵琶去題陳所翁九龍戱珠圖兩龍頡頏出重淵白日移海空中懸一龍回矯一倒起側磔胡髯怒歕水火珠炎炎如彈丸爪底雲頭爭控摶一龍仰首逆鱗露兩龍旁睨蒼崖蟠怪風狂電浩呼洶天吳倅立八山動一龍後出尤崛竒半尾戲繞蜿蜒兒兒生未角已神猛一顧却走千蛟螭陳翁硯池藏霹靂往往醉時翻水滴便覺天瓢入手來雨氣模糊渾是墨我嘗見畫多巨幅簸蕩驚濤駭人目何如此筆窮變化三尺微綃形勢足是翁前身定龍精故能吸歘奔精靈卷圖還君慎封鐍但恐破壁飛空㝠題侍郎秋江捕魚圖秋江水多魚唯唯海風驅潮葭菼靡輕舠競載罛網出欲向中流截魴鯉巨鱗有神不可獲騰踏波濤脫泥滓最憐濡沫笭箵間小白針頭尖如指釣璜渭叟晚終遇西塞𤣥真徴不起若人自是隠者徒豈比沙島漁蠻子髙髯能畫得𤣥理塗抹山川㳺戲耳千巖萬壑堆白雲稍看人家喬木底眼中之景何所似富春澤畔鸕鷀里兩臺蕭瑟秋風髙脚底灘聲蕩清泚我當扁舟衝雁過彷彿厓根舊曽艤自知世外漁者村只合投竿老烟水巨緇未辦五十犗草屩撈蝦從此始畫馬後有宋思陵押封以御寳睿思殿中萬㡬暇縹帶犀籖閲名畫君王愛此神駿姿筆勢不在韋韓下五雲御押手自封玉窠蟠屈宸篆紅百年重遭赤馬刦散落不逐兵塵空誰歟傳之能愛惜尺楮蕭蕭開古色驪驄玉面蹄腕白青絲絡腦黄金勒風􅐢半散頭怒側一團渥洼雲氣黑緋衫圉郎𦂳控持直恐驕騰收不得向來南渡小朝廷虎視欲與金源爭蜀襄馬塲能㡬匹尚想按圖心膽傾只今萬里龍沙道㳺牝千羣飽豐草天閑上駟皆乘黄駑蹇紛紛世空老贈呉士桑饒呉興一士氣貎醇儒冠落魄甘長貧醫家諸書總貫穿有病有藥即與人山中僦屋不肯出苦厭城市多囂塵得錢沽酒飲即醉指㸃富貴如浮雲時來西湖住㡬日所宿隨夜飡隨晨過門與我談抵掌百無一偽皆天真疾惡如讐每憤激正坐時命遭其屯人生除貧貧則已五鬼到此安能神天以清名補寒餓昔之隠者人皆聞聖賢法則吾豈敢鄉里小兒安足云况君能醫當濟世未歎行路常踆踆伸眉一笑索我别北風吹雪來繽紛溪畔無錢附歸去垂橐不管妻子嗔青山白石大自在且復挂子頭上巾江湖多蘆識者少嵗晚逺㳺須待春君不見舎中之長眼眥肉豈解善事長桑君題泰東山藏主十八開士圖環瀛茫茫去不窮大鯨吹浪鼓颶風樓船如山不敢過况在泛葦浮萑中西方十八大尊者徑渡萬里猶乘空犀行水開蛟蜃露直下踏入天呉宫龜魚背髙盂錫穏中流正與靈槎同怪頭達四罔象一單舁出龎眉公鼻端噓氣作飛塔舌上彈呪招降龍兩僧促膝披貝葉一衲裏足須山童雪毛白鹿岐角健斑尾黒虎雙睛紅最後坐禪如古佛從渠摶控何神通吾聞浮屠多善幻作詩自賞畫者工君不見海波横潰鬼神惡我無其術安能東重賦明山歌送胥式有儀還武昌山式從其師曽堅子白讀書處盱母城南隠居者一生耕鑿盱南野何年移入明山來築樓山顛雲在下環山小塢三十六中有清池䕃桑竹日髙塢口烟霧消稍見行人出深谷池頭古井穿石空絶底暗與江流通井中鯉魚長尺半人不敢取疑蛟龍隠居何人曽子白誰其從者胥生式先生喜與山為徒意不在仙在樓居胥也來讀山中書溪翁野老時時一相過有筐盛蕨兮有酒盛壺興酣題詩滿青壁墨痕入石青模糊華盖浮丘石門麻姑鄰峯丘壑可逰衍山中之樂足以遄吾軀生今掉頭不肯住京塵茫茫嵗云暮豈知卬亦愛山人未辦山貲得歸去曽先生㡬時把袂明山行洒掃樓上聽松聲黄精飽啖一千日飛上丹梯朝玉京息齋竹石古木為㑹稽韓季博士題上有歐陽原功承㫖題老竹葉稀多秃枝新竹碧潤含幽姿籜中龍子振春蟄突出雷雨頭參差旁蹲怪石石罅裂裂處恍惚疑龍穴山中有樹皆十圍活榦撑青死槎折霜皮食盡乾蘚文半頂斬立雙椏分最後一枝身出羣垂枝倒走隂崖雲李侯標致不可得小字親題别塗黒縱横不在摩詰下蕭爽直與洋州敵玉堂學士欣見之濃墨大書真崛竒森然一片鐵石筆妙甚七字瓊瑰詞此詩此畫今兩絶把翫微風動毛髪只應真宰泣琱鏤一夜山忩冷秋月崑山寺在吉安崑山突兀摩空蒼寺幽更枕山之陽松杉髙出人境外樓閣半在天中央日照檐楹分杳靄風回廊廡添清凉谷聲逺合蒲牢韵林近時聞薝蔔香紅塵咫尺到不得黄金地面生輝光我疑意在融結際真宰用意非尋常雲埋烟蔽嵗月古未與時㑹猶潛藏一旦寳像頓發見果聞玉磬鳴髙岡二生開示此經始源流既濬深必長乃知景物不自勝惟人方可存其綱休洗紅二首休洗紅洗紅紅在水新紅換作裳舊紅翻作裏回黄倒緑無定期世情翻覆君所知休洗紅洗紅紅減色雖好不如新著時須愛惜阿母嫁女不擇人雞飛狗走長苦辛悲寒風夜漫漫風凛凛嚴霜下寒更甚狐鳴鬼嘯有今夕倉卒劍㦸生髙枕神光墮地摧白虹嗚咽英雄淚空飲蛻菴集卷一
