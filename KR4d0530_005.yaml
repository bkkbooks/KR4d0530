body:
  text: 蛻菴集卷五元張翥撰七言律詩雪中早朝北風吹雪浩漫漫曉出津橋立馬看春入上林花樹早水連平地海波乾金城萬雉微茫濕月闕雙龍贔屓寒今日天顔知有喜紫宸朝下散千官過李陵臺分教上京路出桓州山縵回僕夫指是李陵臺樹遮望眼仍相弔雲結鄉愁尚未開海上羝羊秋牧罷陵頭石馬夜嘶哀英雄不死非無意空遣歸魂故國來喜雪簡社友廣陵今朝臘日初飛雪一白先期報嵗豐坐見洪荒還太古信知造化自虛空詩情畫意天機外和氣歡聲帝力中便欲訪君僧舍去凍泥晴滴阻西東清明日大風雨陰霾連日惡風生老去愁多骨亦驚天色昏昏轉黃濁春光冉冉又清明鄰家醁酒初開甕遊女香車不出城須為杏花賒一醉誰家園裏有鶯聲西興渡攜家迢遞過西陵江霧微消海日升帆影晝驚沙上鴈船聲斗落岸頭氷果園霜後初分橘漁浦潮平各下罾嵗晚不思行路倦剡中佳興正堪乘送春答何髙士湖山不見暮雲渾楊栁風寒早閉門情在舊遊花歷歷酒淹殘睡雨昏昏種桃道士今何處采芍騷人不返魂欲識傷春無限意杜鵑枝上有啼痕夕次楊村煙中帆影落舸峩繫纜沙邊已夜過風驟數聲來海樹月移半暈入天河得歸始覺形神王望逺空留感慨多坐聽舟人語明發蘆花秋水正增波清明雨晴遊包山龍華寺過慈雲䫈當年玉輦此經行古寺猶題扈從名龍鳯讖空山氣歇馬牛劫換海波平野桃著雨春紅落嶺路埋雲濕翠生日暮人歸煙樹黑飢鼯啼雨上宫城雷火焚故宫白塔辛未二月十三日聲聲起蟄乍聞雷驟落千山白雨來恐有怪龍遭電取未應佛塔被魔災人傳妖鳥生訛火誰覓胡僧話劫灰豈復神靈有遺恨冷煙殘燼滿荒臺中秋樂陵驛玩月考官李狀元王助教同行西風吹盡馬蹄塵涼夜中庭暫解巾華月團團生兔腹黑雲片片散魚鱗鬢毛老去如黃葉詩思秋來滿白蘋樂飲與君須達曙舉杯相屬恰三人家居九日時余祝子類值酒禁丁未歲也病餘瘦骨不勝秋早起驚寒已索裘安得酒酬佳節醉從教花為老人羞螟蛉有子寧嫌祝蛺蝶無知底用愁却笑江湖舊詩客凄涼猶憶少年遊喜雪答鶴齋薛逸人曉雪初飛應嵗華因風吹起整還斜石田不種皆成玉瑤界非時自雨花道士擁爐衣類鶴麻姑送酒髻如鴉懸知此際神逰處只在蓬萊海上家七月二十七日書所見杏花樹底血猶紅一宿星痕雨洗空鳯闕追班聽帝詔羽林坐甲衛皇宫天官占候徴玄象國士精誠貫白虹引領雲間望笙鶴朝來佳氣已蔥蔥辱井欄為御史所破好事能收斷石存摩挲堪憶古雲根樓空野燹鐘何在宫沒寒蕪井已眢古篆半留欄上字妖姬猶有墓中魂試捫凹處殷紅濕不是胭脂是血痕十一月六日大明殿賀清祀禮成大明宫殿彩雲間花底微風響佩環陛戟九重周虎士御筵咫尺望龍顔犬牙磐石諸侯國豹尾鈎陳百辟班漏下五門朝退晚日邊佳氣滿西山存道元帥師宗感時及陡遡山俟刀寨入貢次韻二詩送歸關戍徼外頻傳羽檄飛將軍三起著戎衣空山狐兔無藏窟平陸龍蛇有殺機已見趙他知漢德更令孟獲識天威此行整頓蠻荒了箐雨瀘煙好賦歸羣蠻連嵗閧滇中陡遡山前喜挂弓萬里籌邊頻却敵半生憂國早成翁塞垣烽火方無警幕府文書已上功奏賦歸來五雲閣漢庭不獨數嚴終送謨侍者還江陰禪裓無塵錫杖青一龕天竺更南屏楊枝遍灑瓶中水貝葉時翻笈內經舊業池菱秋漠漠歸舟江樹曉冥冥今朝又作蕪城别何處鐘聲入夜聽寄陳敬初郯九成憶昨閶門綰栁條逺煩相送過楓橋夕陽陌上東西路春水江頭早晚潮老境此心惟白社英年何處不青霄詩林别後應俱進時遣郵筒慰寂寥寄俊上人不見俊公今十年武林留偈竟茫然苕溪寺已空塵劫蒲室燈還有别傳晒衲石根隨夕照題詩竹裏濕秋煙何時近一牛鳴地老去山中伴夜禪寄智及上人故人逺在越江南何日相尋過海帆少借禪房一十笏全翻經藏五千函寒爐撥火冝煨芋夜月裁詩定倚杉擬結願香歸未得碧蓮花老補陀巖寄見心上人次韻自入赤墀青瑣間舊逰禪侣亦闌珊青山只憶招提境白首初辭供奉班馬為空羣猶蹻蹻鳥能求友自關關終期一舸相尋去知在姚溪第幾灣見説錢塘别築城凄涼風景若為情湖堤栁盡曽遊路石壁苔荒舊刻名老我無能如燭武何人可飲勝公榮沃洲勝會還容續即擬山中隱計成懷翟文中君留越甸長懷我我在京華幾夢君佳句每從愁裏得逺書忽向病中聞船來海口人爭岸兵滿淮南火照雲今日臨風倍凄斷白頭清淚共紛紛江山覽勝樓白雲東南相蕩浮中有隱者之飛樓千峰影落華蓋晚一水寒通彭蠡秋鮫人機杼或聞響山鬼窟宅疑藏幽為問仙家借黃鵠我欲題詩來上頭寄别陳渭叟空山花發春事幽道人結屋居上頭胡麻隨水有時得杏子成林誰敢偷金銀氣雜丹光現澗壑響帶松聲流寄語黃鶴一相别獨立蒼茫歌逺逰遊天竺寺石梁濺水濕蒼苔陰洞傍穿澗底回殿閣金銀從地湧山林圖畫自天開龍隨僧到分雲住猿任人呼下樹來逰興未闌斜日盡馬頭呼酒尚徘徊西湖之西天竺深天香滿風多桂林老猿引子下髙樹流水與雲來逺岑上方已變劫灰黑古澗長帶秋嵐陰清輝娛人且歸去後夜明月來重尋通玄觀內侍劉敖修真結菴於此髙宗御書通玄二字榜之賜名能真羽蓋翩翩下九重江鄉秋晚滯仙蹤信傳真府憑青鳥劍舞瑤臺走碧龍頃刻風雲興五嶽須臾雨澤慰三農殷勤欲問參同契雙舄遄飛未易從題張外史馬塍新居窈窕丹房古澗阿長松修竹繞層坡桃園隱者時相遇茒洞仙人夜或過沆瀣杯寒供曉食青冥笙響答空歌白雲浮出池痕滿知是龍泓宿雨多登六和塔江上浮屠快一登望中煙岸是西興日生滄海橫流外人立青冥最上層潮落逺沙羣下鴈樹欹髙壁獨巢鷹百年等事豪華盡怕聽興亡懶問僧上清薛茂𢎞虞內翰以鶴齋號之為賦羽人新得虞翁號歸築衡茒並翠微丹室有風鳴夜帳斗壇多露濕秋衣畫中昨者薛少保華表當年丁令威直擬身形鍊相似玉笙吹上白雲飛登金山吞海亭了翁韻賦危亭突兀戴鼇頭俯視滄溟一勺浮龍伯衣冠藏下府梵王臺殿起中流扶桑夜色三山日灧澦江聲萬里秋老我惜無吞海句但磨崕石記曽逰寄成居竹隱居青袍朝士困京華此老蕭間竹滿家山壓窮愁詩強項海枯渴肺酒槎牙商巖未採芝如草彭澤將歸菊有花孤負江頭理漁事短篷春雨夢漚沙題唐子華畫王師魯尚書石田山房秋水橋邊紅葉林數家茒屋傍青岑岡頭種玉朝煙暖隴上鋤雲宿雨深摩詰輞川宜入畫少陵韋曲自成吟束薪嵗晚來同煮應許山中道士尋賦中書左曹小瀛洲東曹地迥集名郎宛是仙家紫翠房閶闔上通天咫尺蓬萊移出海中央金波日暖浮鳷鵲玉樹春濃下鳯凰幾度夢回清夜直此身如在五雲鄉三月望日逰虎丘寺題小吳軒海湧峰前雲樹盤佛宫飛閣出巑岏虎來古冢金精白龍卧秋池劍影寒禪老説空留壞石鬼仙題雨下虛壇憑髙不盡登臨興更借西山晚翠看題舒嚕存道元帥平師宗三州卷後不用牙璋逺出師將軍憑軾下邊陲僰酋爭歃金盤血漢使髙懸玉帳旗司馬文章傳太史武侯威略震南夷只今父老蘭滄上擬刻寧蠻第一碑送李孟端奉祀天妃祠北歸萬里函香出漢廷楚江南下越山青祠光夜現天妃火騎氣秋瞻使者星三島鳯麟環碧海九關虎豹隔青冥君才冝掌絲綸美為述文章襲六經虛齋贈四明王道士髙齋聞在荔枝林曲几方牀宴坐深大道無形元寓器至人於物不容心三山雲氣通寥泬一室天光入照臨我欲壺中收藥去石田瑤草共相尋吳江坐倚風檣看太湖波濤澒洞半三吳寒通上畍咸池氣黑入中流水伯都雲暗蛟龍應起立雪深鴻鴈自驚呼望亭有酒宵堪醉買得漁家一尺鱸寄題杜原父懷友軒尺五城南近世紛移家本並武夷君他年功業誰青史此日山林自白雲石氣曉侵書幌濕溪聲時雜棹歌聞故人已有同棲約仗䇿行穿虎豹羣題黃州管氏懷坡堂玉局仙人雲錦裳騎龍一夕下黃岡峩峩冠蓋生陳迹落落江山有耿光謫宦六年名益重懷賢千古意何長君侯此舉誠佳事未數儋州載酒堂瓜州與成居竹王克純登江風山月亭風起西津斷客艘熊家亭上得憑髙雲移鳥影沈江樹雨帶龍腥出海濤開闢自天留壯觀登臨如我老英豪放舟擬就金山宿一夜清寒襲錦袍奉答新仲銘禪師吳楓初冷鴈連天夢在江南野水邊詞客欲歸嗟老大美人不嫁惜嬋娟豺狼正爾當官道龍象於今護法筵我識新公老禪衲一燈蒲室是真傳贈馬易之萬里征帆渡越江兹遊奇觀世無雙海中蓬島金銀闕天上玉堂雲霧窗吾道政須求柱石詩壇從此避旌幢青林白谷歸休地懷抱因君得暫降氷蟾為金齊賢賦老蟾素魄稟金精千嵗玻璃幻結成明水夜零隂隧凍丹書秋滿肉芝生腹凝寒露藏虛白影入銀河浴太清擬問姮娥乞靈藥與君騎向廣寒行吳江王氏水雲深處潮平天濶開詩境冝著幽亭俯碧潯間許釣徒分半席靜饒沙鳥占全林青連河漢秋無極黑入菰蒲晚易陰更好扁舟明月夜醉攜長笛寫龍吟送式無外歸髙麗三韓山水有靈暉秀出斯人了佛機嶽寺禪餘留偈别王城齋罷戴經歸瓶收滄海降龍入錫度秋空近鶴飛只恐故林雲卧後一鐙秋老木棉衣散木軒為陳則虛髙士賦散木軒中一散仙形雖如稿氣蒼然路松正自為明誤社櫟還因不用全梁棟無心聊閲世山林有地可長年碧窗日靜忘機事悟得南華第四篇送宋本禮部狀元調選還京聖主求賢禮數崇策名髙步冠南宫乘槎析木天津上奏賦甘泉鹵簿中染翰墨凝仙掌露護衣香散御爐風只今帝業熙千載正待儒臣黼黻功春日懷柯博士建章鶯囀曙光初上直門開漏點疏花擁西清森仗衛星臨東壁煥圖書漢庭長者多推轂楚國騷人早卜居為問五雲仙閣吏綵毫春咏近何如題張性之提舉靜學齋隱者城南水竹居蕭然一室白生虛傳聲吳會名家後探道農黃邃古初日影上簾晴晒藥露涼侵戶夜翻書元知靜裏工夫大欲乞靈方一起豫送劉侯赴大理萬里南雲入馬蹄蠻酋迎拜過阿黎將軍拔劍歌玄武使者乘軺祀碧雞六詔星文開井絡兩關鳥道插天梯聖朝謀帥先詩禮努力籌邊息鼓鼙送柯敬仲之京給事先皇禁邸中歸來空抱小臣弓魚龍夜落黃河水鴻鴈秋征白霫風郢國善歌推宋玉漢庭能賦待揚雄如君必用才優俊重見金閨尺籍通題逺碧樓江上樓居景自清闌干朝暮傍陰晴數峰殘雨雲間濕一水斜陽島外明樹隔釣歌分浦出風移帆影近窗行綵衣白髮冝春酒更喜田園樂事成二月望日湖上值風疾風吹浪滿重湖雲掩西山一半無黃帽牽船依岸過蒼頭按鶻繞林呼鶯花世界如春夢煙雨樓臺是畫圖童稚兹逰今白髮斷橋斜日重踟蹰寄觀志能照磨鼇背三山最上峰美人手把玉芙蓉仗圍泰畤傳宵燎漏下層城踏曉鐘錦瑟無塵飛刻鴈金壺有墨灑雕龍老懷已託王郎道早晚歸營北澗松十二月二十七日雪寒奉旨賜宴史局聖主恩榮六賜筵玉音躬聽相臣宣史裁東觀何殊漢人在瀛洲總是仙御酒如春浮浩蕩宫花與雪鬬嬋娟微生此日沾休澤祇望丹宸祝萬年初度日病起不能飲諸友載酒集書樓偶賦見意細雨東風泛曉煙草痕青過竹籬邊春當揆度靈均日老及知非伯玉年病眼紛紜花似霧吟懷跌宕酒如泉諸君有意留迂叟擬買雷塘百畝田五言長體題辜德中瑞竹亭江館當西澨山堂向北隅舊樊聊補壞新竹復噓枯嘉此神明勞森然雨露濡賢才世閩海之子冠洪都生意原無息休徴固有符渾涵由地脈騰達即天衢故業詩書逺能官俊造須材稱人似玉賔待鳳將雛照映丘園重流傳賦咏俱擬同嘉樹傳來作瑞筠圖送成禮部誼叔察訪守令河南山東厯數開千載明良會一時朝廷嚴守令宵旰為黔黎南服方多故東州復阻飢郎官膺簡拔使者出詢咨此命於今重如君衆論推直承亷察往肯作畏難辭靈雨隨華轂流風度綵旗草兼驄一色栁與轡同絲梁宋分淮甸青齊並海涯政苛嗟虎猛民散念鴻離罷軟寧勝任姦貪只自私中牟因雉見單父得魚知或有隳其職誰能慎所司張絃從急緩朗鑒各妍媸治道誠先務皇心實在兹俱為良吏選足慰逺人思空濶青雲步孤髙玉樹姿暫傾冠蓋餞行赴簡書期事業懸鐘鼎光華映羽儀歸來前席問請入史臣詞送彭大年真人祀東海東嶽東鎮國典崇常祀名山仰岱宗聖王欽所遣使者肅惟恭禮自唐虞秩神知造化鍾天門開􅏭嵲日觀上巃嵸零雨行清道浮雲起蕩胸宿齋分鶴帳朝饗發鯨鐘吹溢安歌進靈來衛仗從御香分暗靄佩玉響瑽瑢美薦懷椒糈精誠奠璧琮東流瞻巨海列鎮到諸峰瀛島遙相望仙人或此逢嶽祇調虎豹水怪帖魚龍星墜祠光白煙涵瑞氣濃振衣臨濬壑飛蓋拂長松庶物消餘沴洪河復故蹤年祥報齊魯地寶出雷澭嘉澤羣方洽明時百職供回車冝訪問弭節可從容世祚祈千億元功贊九重禁庭歸福處有待頌東封寄題顧仲瑛玉山詩一百韻治理逢熙運欽明仰聖皇至仁侔覆載上德配軒唐大業勤宏濟元臣協贊襄賢科收俊造庭實璨圭璋入貢徠符拔儀韶下鳳凰普天均雨露絶域總梯航每念京師食遙需漕府糧神妃所芘護颶母敢飛揚前隊貔貅發先驅罔象藏冷颷鼓萬舵朱火耀連檣帝敇申嘉惠祠官按典常賞勞兼湛濊時賜省臣漕臣酒幣旌烈特巍煌僕本中林士久陪東觀郎遂叨乘驛傳遍與禮靈場簜節雕龍飾華旗畫隼翔衝流度鄞越陟險過泉漳緬彼湄洲嶼嶄然巨海洋蛟穿崕破碎鯨蹴浪撞搪震鼓轟空濶奔帆截渺茫島衣迎使舸瘴霧避天香嘉薦歆芬苾陰功助翕張精誠致工祝景貺答禎祥賈舶傾諸國輿圖奄八荒身雖距閩嶠志已略扶桑裴洞三生夢溫陵十月涼兹遊平昔冠夙願一朝償女髻皆殊製蠻音各異鄉地偏宜荔子人最貴檳榔釀鹿肥漂酒蟯蠔液滿房招賢簇車騎揮掃積縑緗窮臘才竣事暄春始趣裝劍津傳警急汀賊起狓猖獠寨旋戡定藩垣慎扞防思親彌切切行役更遑遑狐死嗟奚首龜占喜允臧封崇晏塢內木拱計峰旁仲春至杭卜山于武康克襄先藏塢在計籌山下即豫新墳薄宦祇牽率孤蹤易感傷暫為江左客誰灑墓頭漿逝矣川塗阻凄其涕淚滂南轅恰啼鴂北路復鳴螿粵若婁東邑由來漢太倉機雲存故宅吳會畫雄疆遁迹晞髙士謂有梁鴻山遺風挹讓王厥田尤沃衍比歲適豐穰老我張承吉新知顧辟強聞君占形勝築室恣徜徉鐵笛留嚴客青錢乞泰娘杏韉紅叱撥蘭柱繡鴛鴦闢徑通佳處栽桃帶栁塘修梧羽葆蓋美竹碧琳琅列岫濃螺色澄湖淨鏡光鳥邊嵐漠漠魚外水泱泱鶴駐逰仙館鸞鳴種玉岡投竿釣月檻隱几讀書牀雲結芝英秀花團桂樹蒼舫齋青篠箔漁舍緑苔牆棟宇環相屬園池鬱在望直疑金谷墅還似輞川莊未獲窺詩境相邀到草堂開樽羅綺饌侑席出紅妝婉態隨歌板齊容綴舞行新聲緑水曲穠豔大隄倡宛轉纒頭錦淋漓蘸甲觴弦鬆調寶柱笙咽炙銀簧倚䇿驂聨轡鈎簾燭繞廊僰僮供紫蟹庖史進黃麞卜晝寧辭醉留歡正未央分司莫驚坐刺史欲無腸是集俱才彥虛懷共頡頏珠璣散咳吐律吕應宫商鄭老經術富于仙詞翰長琦初燈並照郯華驥同驤璧色箋毫健吟篇綵繪張拈題爭點筆得句倐盈箱徑敵千鈞彀精逾百錬鋼語奇凌鮑謝體變失盧楊瑛甫早有譽亨衢那可量摶扶看怒翼騰達待蜚黃既篤朋情重仍持雅道昌披襟視肝膽刻琰播文章永契欣依託衰蹤頓激昻盍簮承偉餞授簡藉餘芳自鄙冥搜拙徒令屬對忙端如享敝帚何異貯奚囊談笑聊堪接賡酬曷足當吾猶鄶以下公等楚之良瓠落渾無用艱難實備嘗擬為覂駕馬竟作觸藩羊筋力頻馳騖功名幾慨慷不嫌成晚合深幸際時康邂逅因斯會暌違又一方匆匆把别袂眷眷賦河梁鴻鴈清秋日蒹葭昨夜霜關山凝朔氣星斗麗寒芒疾病家多難歸休嵗亦陽苦心甘寂寞短髮任蒼浪漏屋愁荷蓋塵衣惜蕙纕杜陵非固懶賀監豈真狂回首長追憶緘詩逺寄將乾坤浩今古此意詎能忘元日靈臺官以初四日己酉時享遂以嵗除日受誓於中書乃免朝賀紀詩八韻清廟當春享彤庭放早朝扈鳴更厯正龍集轉寅杓瑞日開黃道卿雲映絳霄八方周象譯九奏舜簫韶爐暖香生术杯紅酒泛椒新符鬱壘換候琯女夷調有待寬書下行看戰甲銷衰年今可隱歸老故山樵分題送京兆趙耕師尹之臨安路帥府照磨得通海湖萬頃平湖碧浮光映泬漻秀山純漫影滄海暗通潮瘴黑雲相蕩春澄雪未銷潤沾蒙部濶川合洱河遙粳稻收田利蒲魚入市饒雨歸龍氣濕晴浴鶴媒驕夾樹迷深箐流花落野椒氊來蠻婦漂船放僰僮橈帥府開荒甸英才屈下僚此心同逝水日夜向東朝送劉貞庭總管之嘉禾御史宣徽院判牧守膺民寄循良不數公使君新建隼御史近乘驄內府聲華著専城控制雄老成歸物望清切簡宸衷紫綬盤銅虎朱幡擁畫熊焚香迎父老騎竹走兒童檇李名藩古勾吳地利通粵從師次後俱在震鄰中水暗臺隍月雲寒鼓角風蠻氛猶漲黑戰血未消紅聖主方圖治台司亦即戎頻煩綸綍下次第甲兵空公等宜宣力王臣固匪躬關防先武備國計務農功黃霸徴當最陽城考欲同蒼旻飄徑氣白日照精忠萬象天樞北三山海市東旱龍俄作雨時喜得雨故及陽鳯已鳴桐善政風須變虛襟理自融平生經世志要似節軒翁福唐張氏永思堂自昔閩多士吾宗世有人共聞兩孝子永慕百年親僾若音容在巍然棟宇新秋筵仍几杖溫鼎自淳珍草娛稱觴地花迎戲綵辰流芳變春雨精思動秋旻風教關民俗文章藉史臣聲詩播休美正為盛時陳成居竹有書報甥傅君亮至揚州言其家與外表舅吳仲益及婦家二叔學生韓與玉全家無恙喜甚有懷始得平安信渾紓悵望心爭看尺素字絶勝萬黃金危甚初秋警幾於平陸沈蜂屯昱嶺上豨突浙江潯縱爾驅鋒鏑能逃磔斧砧官軍俄克復亂首即成擒城市半焦土親朋多好音已知生有路暫免淚沾襟老子歡殊劇家人酒快斟狂歌敲手板醉倒脫頭簮黎庶思蘇息皇天願照臨國威雖震疊兵氣尚蕭森自顧形骸纍仍嗟嵗月侵懷歸畏吏議承乏念官針虎豹關非逺龍蛇水更深豈無黃石略虛遣白頭吟落日耿殘雪浮雲生夕陰枯萁聞齕馬疏樹見棲禽松竹荒須理茒茨破可尋前身本道士不是戀山林七言絶句送林崇髙還武夷山雲巖巖下聘君家長記宵談到曙霞今日隴頭誰灑飯鷓鴣啼老白桐花武夷山中毛竹多神君一去奈山何松風猶帶琅璈響散入遺音作棹歌七月望日徐勉自武林來得兩訃音海舟隔嵗望回音及得回音恨更深從此逺書無用寄九原蕪沒轉傷心外來喪逝訃音來女嫁桐陵亦告哀老眼今朝方是哭百年心事總成灰豫京居草稔始置屋靈椿坊衰老畏寒始製青鼠袍且久乏馬始作一車出入皆賦詩自志五槐濃緑蔭門前東宇西房數十椽不是衰翁買屋住歸時留作雇船錢青鼠毛衣可禦寒秃襟空褎放身寬遮頭更著狐皮帽好箇儂家老契丹淺淺輕車穩便休何須髙蓋與華輈短轅不作王丞相下澤聊為馬少遊讀瀛海喜其絶句清逺因口號數詩示九成皆實意也一日糧船到直沽吳罌越布滿街衢新詩將作如干首為問郯郎有買無接糧御史性情真斷事官來苦怒嗔索酒索錢橫生事遭風遭浪肯知人客窗昨夜北風髙猶似乘船海上濤明發先宜覓貂鼠喚人來作禦寒袍虎賁坐甲夜傳更千步廊街鼓柝聲未許離人眠得熟馬蹄車鐸又天明拂郎之馬走千里獨立長嘶凡馬空昔在江南看圖畫今來天廏識真龍賽娘十五解新聲楊栁腰肢怯囀鶯好寫潘郎胡十八教伊傳唱滿京城長川妓子早晨來戴笠騎驢帕擁腮總在狹斜坊裏住教坊日日聽差回杖履尋花虎丘寺壺觴按曲館娃宫阿成殺受吳中樂請入風沙海浪中結束黃騮粉畫韉更投西市買長鞭知儂已有南歸日户部來催助燕錢大風塵土漲天飛遮眼烏紗拍馬歸還是洞庭湖水好待郎來浣舊征衣大年小景一川風栁緑傞傞古木茅茨近澗阿漢上無人船不渡水禽飛處夕陽多春淡空山不自聊幽花老畫國香銷只今愁絶沅湘路誰與侯芭賦楚招采采幽芳不盈把好收風露入銅瓶虎丘老衲今何在思見蘭芽石上青幼暗宗師以詩招賞海棠文申有詩見約次韻自是仙家春日遲紫綿無數裊柔絲憑君多置看花酒肺渴如今似漏巵環樞堂上遲明來要向花前不放杯只恐狂風無顧藉盡將春色委蒼苔好懷日近少曽開心憶湖山曽屢回不是故人多雅致誰能相約看花來亷子祐歸省金陵且就秋試作三絶句贈别故園歸思浩無涯更聽啼鵑惱客懷後夜月明應有夢先隨潮水過秦淮陌上吹衣栁絮風憑君莫放酒杯空歸舟總是傷情處一路殘山剩水中自昔髙科取俊英布衣徒步到公卿廟堂今日求材切正待諸君䇿治平王杲東白墨蘭樵題詩用韻其左并寓所懷光風葉葉露香新欲采幽芳惜暮春幾度玉笙吹夜月瀟湘雲斷不逢人早出北城迎社稷香輿我如老馬怯征鞍推起東窗欲起難昨日風雷驅雹過滿衣明月五更寒偶成二絶句簡魯威學士雲物凄涼小雪初半庭殘菊蝶來疏連朝筆硯多忙事借得東泉學士書病起頭顱不可風南窗晴日正融融天憐老境無差使乞與詩篇酒盞中小遊仙詞清華公子並騎龍直過蓬萊第一峰親見海中城闕好半栽玉樹半芙蓉五色煙中玉女窗鳯歌鸞舞一雙雙除是飛瓊方教得紫簫吹徹不成腔來不分明去不言紅椒花露濕妝痕巫娥已逐夢魂斷十二碧峰愁暮猿月圃羣芬次第開步前紅露下瑤階摴蒱偶共真妃博賭得雙頭白燕叉道人寄我紫邏山時復賣藥來人間石潭薄晚有龍鬬滿谷濕雲無路還五嶽真官立帳前露蕪香靄落瓊筵夜深醮罷各歸去一一馬聲嘶上天美人臨水笑相邀自解羅巾擲作橋同覓雲間仙伴侣杏花壇上聽吹簫月帳新開蘂輦過桂花涼露灑天河雙星一夜敘離别狼藉碧蓮秋露多招韓伯清泛湖南園攜手賞芳紅喚取能歌盛小叢傳與春風留杏萼明朝開向曲聲中段橋春水緑初柔便有羣鳬來上遊好借鴟夷盛酒去玉簫吹上畫船頭蛻菴集卷五蛻菴集跋右潞國張公詩集若干卷廬陵沙門大杼北山之所編集也先是潞公於元季多故之際薨於燕都由其無後北山為之經紀葬事未幾天兵北伐燕都不守北山取其遺藁歸江南凡選得九百首將刋板以行于世或有問於余曰北山釋之有道者宜視身為外物而乃汲汲於故人詩集得非未能遺情乎余謂之曰至人不遺情古之髙僧猶不能免如梁慧約以苦行得道為帝王師而哭其亡友甚哀至賦詩曰我有兩行淚不落三十年今日為君盡併灑秋風前北山念潞公無後平日交友又皆異世淪謝懼其泯沒無傳故仗義而為之然亦何害於道其與約之情則一也當元統甲戌間余識潞公於金陵後會於燕都于錢塘蓋三十餘年固非一日之好觀北山斯舉豈能無動於中謹書卷末如此若潞公之詩名震耀海內不俟余之稱美故勿論洪武十年冬天界善世禪寺住持天台釋宗泐識
