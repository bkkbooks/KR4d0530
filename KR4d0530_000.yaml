body:
  text: 蛻菴集别集類四元提要臣等謹案蛻菴集五卷元張翥撰翥字仲舉晉寧人至元初用隱逸薦召為國子助教分教上都尋退居淮東㑹修宋遼金三史起翰林國史院編修官纍遷翰林學士承㫖致仕加河南行省平章政事給俸終身事蹟具元史本傳案金明昌承安間亦有張翥字曰仲陽劉祁歸潛志記其矮窗小户寒不到一爐香火四圍書西風了却黃花事不管安仁兩鬢秋諸句稱其浮艷諸書援引或誤為一人非也翥嘗從學於李存傳陸九淵之說詩法則受於仇逺得其音律之奧其詩清圓穩貼格調頗髙近體長短句極為當時所推然其古體亦伉爽可誦詞多諷諭往往得元白張王之遺亦非苟作王士禎居易録曰蛻菴元末大家古今詩皆有法度無論子昻伯庸輩即范德機揭曼碩未知伯仲何如其論當矣史稱翥遺稿不傅傳者有律詩樂府僅三卷王士禎則稱蛻菴集四卷明洪武三年錫山郎成抄本此本乃朱彛尊所藏明初釋大杼手抄本前後有來復宗泐二人序跋蓋大杼與翥為方外交元末翥沒無嗣大杼取其遺稿歸江南别為選次而録存之考元音乾坤清氣集玉山雅集諸書所録翥詩尚有出此集之外者則亦非全本也乾隆四十六年十總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀蛻菴集原序嗚呼詩豈易言也哉大雅希聲宮徴相應與三光五嶽之氣並行天地間一歌一咏陶冶性靈而感召休徴其有關於治教功亦大矣然自刪後至於兩漢正音猶完建安以來寖尚綺麗而詩道微矣魏晉作者雖優不能兼備諸體其鏗鍧軒昂上追風雅所謂集大成者惟唐而後有之降是無足采焉逮及於元靜修劉公復倡古作一變浮靡之習子昻趙公起而和之格律髙深視唐無愧至若德機范公之清淳仲𢎞楊公之雅贍伯生虞公之雄逸曼石揭公之森嚴更唱迭和於延祐天厯間足以鼓舞學者而風厲天下其亦盛矣哉河東仲舉張公生於數君子之後以詩自任五十餘年造語命意一字未嘗苟作至正丙午春其方外友廬陵北山杼禪師以公手藁選次而刋行之來徴言為序余猶記公之言曰王者迹熄而詩亡詩未嘗亡也而所以為詩者亡矣善賦之士往往主乎性情工巧非足尚蓋性情所發出於自然不假雕繪觀公之詩知公之所蓄厚矣春空游雲舒斂無跡此其冲淡也崑崙雪霽河流沃天此其渾涵也灝氣橫秋華峰玉立此其清峭也平沙廣漠萬馬驟馳此其俊邁也風日和煦百卉競妍此其流麗也寫情賦景兼得其妙讀之使人興起誠為一代詩豪矣顧余謭材何足以鋪張盛美然託契於公非一日而又重北山之髙誼不得辭始僭叙之以冠篇首云豫章沙門釋蒲菴來復序蛻菴集原序
