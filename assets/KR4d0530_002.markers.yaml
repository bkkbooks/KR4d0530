  - {type: variant, offset: 8862, length: 1, content: 鄭, SBCK: 隊紫髯都護酒如泉時廵􅀊􅀊還京樂别換新聲􅀍筦絃逺山平野浩茫茫曽是當時古戰􅂣飲馬水乾沙窟白射雕塵起磧雲黄中郎節在仍歸漢校尉城空罷護羌今日車書逢混一不辭垂老看氈郷三月二日賞杏花光岳堂分韻柳色􅀄靑草漸茸春寒猶勒杏花風新烟院落清明後過雨園林罨画中洛社衣冠今日再蘭亭觴咏此情同吾年最老身仍健更向尊前借酒紅秋日偕成竹居秦景桓游蜀岡萬花園九曲池平帶蜀岡吴公臺逺隔雷塘閒㝷遺蹟懐千古迴立髙丘望八荒黄落山川秋廣大青冥風露日凄凉一尊不慰登臨地朔鴈南雲恨更長春日㳺王公亮南墅人家星散住村墟苐二港頭潮水􅀄蛺蝶一闌花院落烏犍千畒雨犂鉏養魚巳得陶朱法種􅀣還抄汎勝書興熟不辭歸路逺醉扶斜日上柴車臘日飲趙氏亭城上高亭一再過毎看風物費吟哦近詩頗效寒山}
  - {type: page-break, offset: 8862, content: '', id: KR4d0530_SBCK_003-5a}
  - {type: variant, offset: 8864, length: 0, content: '', SBCK: 往事徒成春夢婆賸買十千燕市酒閑聴二八越娘􅁔梅花枉報春消息秖遣經年别恨多伏日陪吴興諸府公宴魯公池上芙容池上㑹群公滿意華筵咲語中虹影連蜷山外雨荷香澹蕩晩来風􅁔催銀甲筝逾急凉入金尊露易空我亦玉堂揮翰手題詩合在水精宫刋史局雨凉陪韓左丞叔亨小集㫁烟踈雨散秋虹古木高堂納晩風青史文章千古上紫微星象五雲中前朝無似于今盛群彦難期此㑹同凉思滿簾宜觧帶好懐寧放酒盃空中秋張外史招賞失約賦以謝之明月中天雲霧消酒醒凉思正飄飄星河不動秋空闊鍾鼓無聲夜寂寥露下逺山皆落木風来滄海欲生潮仙家玩事無縁到虚􅀒瓊樓聴玉簘辛巳二月朔登憫忠閣百級危梯遡碧空馮䦨浩浩納長風金銀宮􅆣諸天上錦綉山川一氣中事往前朝僧自老魂来滄海􅀑猶雄只憐春色城南苑寂漠餘花落舊紅蚤發潞陽驛征車如水轡如絲望入金河欲曙時萬里山川環拱抱九天宫􅆣起參差風}
  - {type: page-break, offset: 8864, content: '', id: KR4d0530_SBCK_003-5b}
  - {type: page-break, offset: 8864, content: '', id: KR4d0530_SBCK_003-6a}
  - {type: variant, offset: 8865, length: 0, content: '', SBCK: 泥泥秋多露野淀稜稜曉有凘三十餘年􅀚國願白頭今日到京師上京即事灤河東出水縈廻曡坂曽岡擁復開金柱鎮龍僧呪罷玉輿馭象帝乗来中天星斗朝黄道塞漠雲山繞紫臺欲儗兩京為賦頌白頭平子愧無才舟發浙江夜泊廟山驛風帆東上浪冥㝠鐘鼓山前近驛亭江海秋生河漢白魚龍夜没水雲青誰􅀙三島求仙藥自信􅀌查應客星好喚呉兒叩舷起浩歌呼酒月中聴豫章山房為見心復公賦剱江寺裏古樟樹百尺如盖青童童山靈長此護林壑雷電不許蔵蛇蟲掃石僮来秋葉後譚經僧坐晝隂中題詩禪房更瀟洒便與王城祇樹同四明寓}
