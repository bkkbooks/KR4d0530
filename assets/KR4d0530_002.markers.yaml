  - {type: variant, offset: 8874, length: 6, content: 秋色裏把酒菊, SBCK: 川星紀外故王臺榭水雲中舩来蠻賈衣裳恠潮上海鮮鱗鬛紅不向旗亭時一醉行人愁殺柳}
  - {type: variant, offset: 8881, length: 8, content: 前人境殊多事吾廬, SBCK: 風上清山中烟景空明石路微千年草木駐光輝山中觀􅆣金銀氣天上神仙黼黻衣赤日大溪魚欲化青雲玄圃鶴長飛只今浩劫頻来往未信滄洲與願違臺城運盡黄旗晉國開天星俄復拆三台方驚掘地双鵝起巳見浮江五馬来草暗離宫碑仆土雨殘戰地骨生苔當時一匊新亭淚猶帶寒潮日暮回冶城此地先皇駐六龍鼎成龍去杳無踪御床羅帕塵空暗輦道朱門草巳空題榜侍臣留帝􅃙築亭真士記天容}
