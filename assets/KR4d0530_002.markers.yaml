  - {type: variant, offset: 8854, length: 0, content: '', SBCK: 悠􅀉玄賞耳孫風骨猶䔥爽逺􅀙丹丘渡滄海􅇷挹神蹤欲長往何人想像圖真形曡厓隂洞髙林青上摩金天之帝京下􅄃玉女之明星峯邪麓邪两莫極虎豹呌絶烟霏冥仙家樓􅀚超}
  - {type: variant, offset: 8855, length: 0, content: '', SBCK: 住遥認微茫是征路丹梯銕鎖不可攀直喚茅龍上天去懶拙道人苕溪曉望圖憶昔薄遊苕之城溪光近秋山晚晴連峯接嶂望不及惟有白雲縦復横漁村無火林樹黒微風忽起菰蒲聲月􅀙太湖東畔出直射西塞山前明人家碧玉壷中有野舫銀河天上行酒酣時豈發長嘨水底直遣魚龍驚老暉郷亦此盤礴安知今我非三生盡捜萬􅁚入竒筆畫與詩境俱峥嶸吾家苕中有茅屋京塵滿髩難為情頓令扁舟夜入夢萬頃漚波㱕濯纓金宣孝太子墨竹少海神光射天起中有蟠龍龍有子混同江聲何處来捲作琳琅墨池水蜿蜒欻起鱗鬣張蛻骨立化千篔簹一朝侍臣抱髯泣鶴駕不㱕雲路長百年梁􅁐陵谷變㳅落人間能幾見明昌内府應秘蔵小字親題保成殿吁嗟帝子真天人此君亦作天人真君不見洋州老太守揮洒雖工無此神緑玉連環歌為邢從周典簿作于闐河頭夜光發赤髯賈胡采明月中有美璞凝寒晶惟許􅀑工能琢成伊誰得此邢公子示我緑玉双連理怳如空碧虹氣垂半隐青瑶蟾一規展之兩環不逾尺曡作􅇛團小蒼璧􅂖文錯落映雷文宛是昆吾寳刀刻廬陵學士癖好竒辨古重以瓊琚詞􅃢瑚佩鈎詎可數我疑制自金源時集賢仙公丈人行鳯}
