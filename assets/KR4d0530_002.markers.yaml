  - {type: variant, offset: 7617, length: 1005, content: 大風徹晝風何急避行陵樹傍驚沙撲面黒野日暎人黄科斗旱未出栗留寒欲藏窮途淚易下不是阮生狂七月旦立秋風雨夜寒練裯不解暖已索絮衾眠老疾日漸退餘生天所憐蝎行忩紙響蛾撲燭花偏喜見沽頭報江南有到船黙坐時俸支降真香黙坐觀浮世何殊起滅雲猿寒夜嘷母鴉急晚追羣應俗神嗟耗經冬足苦皸俸香吾獨喜日可炷爐薰除夕坐玩羣兒戲閒供一笑歡朱丸那却鬼白酒不禁寒官索題春帖鄰分饋嵗槃歸期知㡬日謾檢厯頭看初三日夜翫月至中秋日得詩化工金鑄巧又換一鈎新逺道傷逰子深閨喜拜人影縣秋半破明遡日西淪正擬排宵看裁詩莫厭頻其二新月過初弦氷輪次第圓空中真見相清極恍如仙舊雨蒼苔地新寒白露天匡牀延佇久不覺屢移前悼太平公晨起洒杯酒北風吹淚痕豈徒歌楚些端欲呌天閽碧化萇𢎞血春歸杜宇魂千秋一史筆誰辨逐臣寃梅隠為蕃禧觀余道士作二首隠者多幽事鋤雲自種梅㡬盤山徑術强半雪莓苔拾藥泥丹竈浮香入酒杯時時霞上友清曉踏寒來其二茒屋西林下逋仙恐是君支笻鶴外見哦句竹邊聞老樹春常早空山雪不分道人無夢久何處覓梨雲寄雲門僧若邪溪兼題其松風閣二首聞道邪溪叟髙年出寺遲眉毫長㡬許布衲破多時挂錫鶴移樹繙經花滿池相望一江水嵗晚赴幽期其二閣外老松子蕭蕭虛籟生定從何處起寧有不平鳴我耳固師耳風聲是樹聲他時叩禪寂衲破睡天明識趣齋為山隂魏仲逺賦夏盖湖濱宅幽然水竹開荘前魚市合山下酒船來把釣雲移樹尋詩步石苔相羊縂成趣直待醒心回送泐季潭逰天台并送淵侍者歸天台二首來從石城寺去訪石橋僧錫杖空山路禪龕獨夜燈道知文暢得詩識皎然能到日西巖下應吟瀑布淜其二解夏回天竺尋真問石橋鄰房留偈徧歸路載經遙瀑壯秋懸雨江明日上潮題詩寄相憶何處覓山寮送蒲空叙本中往住長蘆寺在嘉禾杖錫風塵際師行戒畏途故人懐檇李春水到長蘆舍利藏金塔袈裟繫寳珠禪房大自在應念室中蒲謁儀則堂上方觀聽續撰釋氏通鑑平生方外朋今識故鄉僧史有春秋筆談空大小乘香厨朝飯麫古殿晝燃燈歸路煙蕪外斜陽下道陵北山以雪忩墨蘭竹石求題次韻幽蘭出楚畹美竹自湘濱共友三生石俱涵太古春山林空見相氷雪老通神長作禪房供毋令墮世塵清溪濯足圖黄塵滿雙足宜賦故山歸解屨就清泚舉頭看翠㣲林猿下窺膝石蘚欲霑衣更覓漁竿伴閒來就釣磯觀潮海口潮初上江流湧不行大風生氣勢烈日奪光晶鷁首來何駛䲭夷怒未平呉兒誇壯觀車馬暮填城送䝉古僧印空巖黄龍寺受戒于天目山髙僧明廷秀受業自南宗心訣提為印禪機捷若鋒爐香來化鶴瓶水豢降龍弟子經忩外應占舊偃松其二古刹西江外師居最上方山神出䕶法天女下焚香久客霜髭滿歸舟雲樹長秋期到天目容我借禪牀, SBCK: ''}
