  - {type: page-break, offset: 8857, content: '', id: KR4d0530_SBCK_003-3b}
  - {type: variant, offset: 8861, length: 0, content: '', SBCK: 剰携芳酒共幽尋暮春有感次劉􅁥丞二鳥寧容一處囚能鳴何似不鳴休来今往古無窮事剰水殘山捴是愁欲賦碧雲須麗句儗裁白雪欠名謳強顔未得投簮去一濯塵纓萬里流上京大雨驟寒飲周􅀙道所暮年巳􅁲園田去豈意猶歌行路難且復酒杯同旅次不堪人事捴憂端山林茅屋三生逺風雨氈裘六月寒吾友有家應此住老夫何地挂吾冠游鳯凰山故宮至高禖臺鴻鴈池衰草寒烟老木風南朝佳氣落然空璧来山􅀑􅃒秦使槃泣仙人出漢宮壊埒尚傳祠乙鳥荒池曽見射飛鴻騷人自古多荆思長在登臨感􅁣中春日偕監中士友游南城樓閣參差紫翠間微風不動彩雲閑柳垂禁禦絲千尺水繞宫溝玉一環春樹鳥鳴圎似筦夕陽駝影兀如山醉鞭緩緩吟歸去燈火城東未掩􅀜上京秋日三首山前􅀌戍水􅁁營落日無人巳㫁行區脫数家門蚤閉轒温千帳火宵明白摧野草狼同色秋入􅀜榆鴈有聲最是不禁横􅅇怨海天秋月不勝情水遶雲廻萬里川鳥飛不下草連天歌殘敕勒風生帳獵罷焉支雪没韀紅頰女兒花}
