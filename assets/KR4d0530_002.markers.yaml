  - {type: variant, offset: 8853, length: 0, content: '', SBCK: 蛻庵詩卷之一蛻菴詩卷之二衡山釋大杼北山編集七言古詩題昌化陳孝子傳百丈山前妾辭主禮賢鎮中子逢母三十餘年昨日同白髮相看涙如雨阿􅭊去時未㫁乳児壮得知心獨苦清湖老嫗天所留逆旅主人神使語㱕来桑竹溪之滸婦前持觴児起舞双􅀲生祥表秋圃豈用旌書動官府呉人買妾紛莫数歳滿母㱕遺子女巷南巷北不相覓況復山川兩脩阻嗚呼千秋復萬古孝子之名在寰宇丗上滔滔忘母人不媿唐昌一抷土題銕石􅍡馬圖神厓黒龍時出水游此何年得其子是何毛骨如積銕㢠立長風獨竒偉霜蹄白鼻散五花倐見馬中真騄耳羙髯奚官能剪拂不遣雲鬉涴泥滓少施控勒即飛騰唾尚不敢况敢捶馬生豈在粟一石不飽寧能見材美朝燕晡越信汝良安得壮士同生死阿師一室巾錫外時展此圖臨燕几三生似是支遁林愛馬苦心同􅀂此平原豐草秋漠漠怳惚寒沙颯然起英雄有志在青霄老眼因之空萬里題趙文敏公畫馬君不見漢家􅀅軍求善馬戰骨縦横血流野㱕来作歌薦宗廟寧悲􅀑哭宛城下何如聖代徳所懐入獻磊落皆龍媒右牽者誰鬈者偲萬里知自宛沙来銀光鏡懸蹄腕促老奚識性仍善牧時廵之外游幸稀飽秣原頭春苜蓿呉興學士藝絶倫妙處直以曺􅀅軍只今有馬無此筆誰與冩之􅀓丗人爲君甘老駑駘群題牧牛圖去年苦旱啼􅃻塊今年水多深没鼻爾牛觳􅑌耕得田水旱無情力皆廢􅀞中見此東臯春牧児超揺犢子馴手持鴝鵒坐牛背風柳烟蕪閑殺人児長犢壮湏盡力豈惜辛勤供稼穡縱然喘死死即休不願徴求到筋角題李白觀泉圖玻瓈杯中春酒緑醉墨淋漓牡丹曲平生合置七寳床白苧烏紗美如玉阿瞞荒宴百不理寧計宫花㗸野鹿何物老嫗生此児偷向金鷄帳中􅀫髙􅀅軍􅂊奴􅀠耳誤使脫鞾吾所辱要㽞汗韈蹋鯨魚䑕子何堪煩一蹴尋常溝瀆不可濯何處容伸遭汙足翩然却下匡廬雲五老峯前看飛瀑題郝内翰書所作夢􅀚瓊花賦後釣魚山前龍上天武昌城外走蜀船老姦欺國馳露布使者坐囚吞雪氊潰兵一夜甲填水血汙木綿花下􅀑豈知老仙方卧游鶴背天風扶夢起頽雲挾月光西㳅玉簘聲断江聲愁露革泣盡瓊樹死廣陵春色寒於秋百年遺賦人争重勁墨遒毫精爽動節旄苓落喜生還回首江南巳如夢花神換根春更芳想像月色扃餘香楚招無人青鳥去公不少㽞空涕滂題趙仲穆怪石竒木君不見岳陽城南老樹能化人又不見草中巨石如卧虎樹逢仙客授還丹石誤􅀅軍飲飛雨海寧太守提健筆與丹通靈箭角力山精木魅寒睒暘千年醜怪匿不得衘瘤半裂雷火出隠入雲綃露竒蹟猝然一見心膽驚氣盡畫工俱辟易挂之髙堂風動揺古色一片秋䔥䔥待侯硯池卷東海㱕冩扶桑與沃焦題長孫皇后諌獵圖黄門曉出西清仗秋色滿天鷹大王虎落遥連渭水南鸞旗直渡河槗上日􅁁雲氣五色文虬鬚天子真天人羽林猛士森成列六氣不驚清路塵太平無征帝神武豈爲禽荒􅀅按旅巳知哲后佐興王不數樊􅁎能覇楚從容數語即罷田六宫迎􅀏花如烟蹕回那待外廷䟽聴諌由来同轉圜天寳神孫隳大業錦繍五家争蹀􅉜可憐風雪􅌐山宫政與真妃同射獵題華山圖華岳連天向西起澒洞秦川三百里巨靈髙掌削夫蓉影落黄河一􅁝水雲臺霧谷巢神仙羽衣金莭時周旋㱕来失脚白騾背㱕来石上長鼾眠千載}
