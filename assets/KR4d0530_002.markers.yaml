  - {type: variant, offset: 8857, length: 2, content: 歙鄭, SBCK: 子作歌歌憤激眼中太行如動色安得壮士射烏弓為落􅍴搶連太白劉道􅁠為李逺子微作青山似洛山圖為作歌係之石頭城中有眇􅆌之秦淮秦淮東㳅入江逺其上曡巘連層崖牛頭双闕雲間開三山北山鬰烟霾六朝遺跡猶在眼千古往事徒興懷昔人謂此洛中似四面青山圍二水劉侯熟識此景勝况復愛畫入骨髄五尺長􅁓繭不如乗興破墨塗成圖漁梁茅屋昏欲無壞陵荒隴迷楸梧寒潮巳落㫁岸闊行人不渡扁舟􅀌嵩邪邙邪漫漶那可辨但見招提林杪直下蔵村墟憶我覉游石城日江雨山烟正䔥瑟横塘酒家好新酒醉􅀝船窓看竒崛只將健句冩㱕来却恨此時無此筆吴儁仲傑横河精舎圖亦道􅁠作一巢拂衣拂著􅀫鶴背掛劍踏落長松稍空濛杳靄迷處所豈復漂摇畏風雨既非鳥窠老衲子無乃中林古巢父填窓擁户晝不開神光隐見金銀臺雲之君􅀆鳯為馬往往玉簘吹月来道人幾年游上國賣藥壷中人不識洞玄宫舘剛中所建宫名一􅁰殊靈秀似與仙都敵故巢未破㱕便得㱕到玉山多美石我詩母刻刻此圖留照千秋山水碧剛中永豐縣人送崔譲士良都事江淮行省時平乆不脩武俻一旦盗賊起跳踉南窺荆鄧北徐汝紅巾直来據武昌摧城破壁官吏走九江太守能死守赤眉銅馬終殄除此賊游魂那得乆天兵势􅀂風雨来直掃四野無氛埃廟謨最先擇􅀅帥國計莫重完江淮堂堂中書開外省幙府人材􅀝公等崔侯如刃新發硎鋒銳所當無肻綮金湯表裏元有捷正藉全籌申薄伐草茅有䇿可採用義士多方須教閱酒酣客起征馬鳴壮氣滿髯肝膽傾浩歌把劍徒激烈老矣莫賦􅀙軍行爲古紹先題劉平妻胡氏殺虎圖沙河岸􅁁秋草白棗陽城頭落日黑老兵辛苦踐更来林下稅車聊一息黄蘆颯颯中夜鳴倀􅀑呌嘨悲風生虎飢得人怒不置婦急徒手危相争直前死力持虎足呼児進刀屠虎腹但知有夫豈知虎視之何殊机上肉當時一擊寕頋軀驚魂碎骨仍携扶九原瞑目巳無憾舊血勿湔身上􅃭千秋莭義傳郷閭我猶膽怯見畫圖健婦果勝一丈夫嚮来馮婦有不如城南北風朝捲沙􅀅軍開宴樹大牙黄須健児飽酒肉十十五五来􅀅車盡駈丁男作生口􅀑妾􅀑馬充其家嗚呼上天不可問道旁􅀚者徒咨嗟范寛山水憶昔往㝷剡中山南明天姥相縈盤客路上頭穿鳥道行人脚底􅂿風湍旦寒露重多成雨􅂥霧濛雲互吞吐僕夫相呼岩壑間空響譍人作人語溪窮岸断地忽平石門壁立如削成隔水無数山花明中有人家雞犬聲向来老眼曽到處此境俱作桃源行百年留在范寛筆水墨精神且䔥瑟上有翰林學士之院章恐是宣和舊時物林􅆐野鶴應自在令我想見猶前日時平㑹乞間身㱕一壑得專吾事畢張師䕫為郭子静作終南山色因題終南山色秀可食中有游雲動凝碧華嶽西囬仙掌髙仙都下射金精白緇宫琳舘馮險阻渭水秦川来咫尺古木深藏魍魉寒隂厓杳入蜿蜒黒幽人舊隐依青壁蘿逕柴閉寥閴野槗挿岸何處船落日無人獨㱕客檪翁筆法追郭熈逺意欲􅀉烟霞微半生江海屢驚夢萬里風塵能化衣捷徑無媒既愁寂故山好在􅂚遄㱕尚􅀃于今明月夜時有簘聲臺上飛天香室爲四明定水復見心禪師賦寺有楊誠齋題定水山中多古桂老璘結茅来避丗嚢中少試蒸花法正藉烟霏作輿衛誰令作詩傳丗人一時攪動聲聞塵百年公案結未了復翁拈起還清新喝開石壁壁成字百顆明殊照天地不関旃檀林下風薫破枯禪半􅁁鼻吾聞佛家别有衆香國我亦三生學禪客􅀂爲一洗六根空􅀙子㱕来分半席題趙文敏公木石有先師題于上吴興筆法妙天下人蔵片楮無遺者南陽詩律動江湖一篇才出人争冩二老風㳅傾一時只今傳畫仍傳詩清􅆂月露秋見影黒入雷雨寒無姿仇山黄鶴去不返苕溪鷗保􅀊俱晚好呼銕爪夜錚錚刻向青珉照人眼題武林姚氏頥壽堂有地須種木蘭花有樹好􅀫双啼鴉木蘭女児能代父慈鴉之雛能哺母姚家堂中如畫圖鶴􅄠髙居綵衣舞當年兵塵暗郷関扶携藁砧烟瘴間天留晚福在平丗去家萬里仍生還有児有婦供滫􅔱書聲歌聲動鄰里板輿不待魚軒列鼎不如􅀒米中有至樂物莫比酌彼金罍酒起爲熈壽􅁔慈顔日日春風和􅁄心之詩豈足多我今獨無空尓羡如此堂中萱草何題雪溪待渡圖晋陽山下蒲村渡㫁坂連岡曡烟樹横汾水落㳅更急客子西㱕迫秋暮朔風轉雨作雪飛􅀝盖沙頭泥没屦後来者誰須我友望望津船出前溆濕雲撲地􅁁鴻驚危槗掛岸征馬生樵家有徑凍葉平土床火煖無人聲􅅍峯倒􅀝白石爛空壑半壓氷槎横㱕来想像猶眼底詎擬􅄄夫能盡此溪明雪净古色起一片荒寒在窓几􅀊晩逺㳺吾倦矣題李早女真三馬扇頭金源六葉全盛年明昌正似宣和前寳書玉軸充内府時以李早當龍眠想當畫院供奉日飽閱天閑萬竒骨䓁閒㳺墨落宫扇駿氣凌風欲超忽霧鬛風鬉剪剔新郎君玉為人四帶紗巾繍方領醉鞭踏盡燕臺春一聲白鴈黄河暮豈料征蹄竟南渡囬首西風障􅀾塵女仙空抱琵琶去題陳所翁九龍戯殊圖兩龍頡頏出重淵白日移海空中縣一龍囬矯一倒起側磔胡髯怒歕水大珠炎炎如彈丸爪底雲頭争控摶一龍仰首逆鱗露兩龍旁睨蒼厓蟠恠風狂電浩呼洶天吳倅立八山動一龍後出􅀹崛竒半尾戯繞蜿蜒児児生未角巳神猛一頋却走千蛟螭陳翁硯池蔵霹􅆮往往醉時翻水滴便覺天瓢入手来雨氣糢糊渾是墨我嘗見畫多巨幅􅉫蕩驚濤駭人目何如此筆窮變化三尺微綃形势足是翁前身定龍精故能吸欻奔精靈卷圖還君慎封鐍但恐破壁飛空冥題侍郎秋江捕魚圖秋江水多魚唯唯海風駈潮葭菼靡輕舠競載罛罔出欲向中流截魴鯉巨鱗有神不可􅀗騰沓波濤脫泥滓最憐濡沫笭箵間小白鍼頭尖如指釣璜渭叟晚終遇西塞玄真徴不起􅀂人自是隐者徒豈比沙島漁蛮子髙􅏋能畫得玄理塗抹山川游戯耳千岩万壑堆白雲稍看人家喬木底眼中之景何所似冨春澤畔鸕鷀里兩䑓䔥瑟秋氣髙脚底灘声蕩清泚我嘗扁舟衝鴈過彷彿厓根舊曽檥自知丗外漁者村只合投竿老烟水巨緇未辨五十犗草屩撈蝦􅀙此始畫馬後有宋思陵押封以御宝睿思殿中萬幾暇縹帶犀籖閱名畫君王愛此神駿姿筆势不在韋韓下五雲御押手自封玉窠蟠屈宸􅂐紅百年重遭赤馬劫散落不逐兵塵空誰欤傳之能愛惜尺楮蕭蕭開古色􅌐􅍡玉面蹄腕白青􅁝絡腦黄金勒風鬉半散頭怒側一􅇛渥洼雲氣黒緋衫圉郎緊控持直恐驕騰収不得向来南渡小朝廷虎視敢與金源争蜀襄馬􅂣能幾匹尚想按圖心膽傾只今萬里龍沙道游牝千群飽豐草天閑上駟皆乗黄駑蹇紛紛丗空老贈呉士桑饒呉興一士氣貌淳儒冠落魄甘長貧毉家諸書捴貫穿有病有藥即與人山中僦屋不肯出苦厭城市多囂塵得錢沽酒飲輙醉指􅀧富貴如浮雲時来西湖住数日所􅀫隨夜湌隨晨過門與我談抵掌百無一偽皆天真疾惡如讐毎憤激正坐時命遭其迍人生除貧貧則巳五􅀑到此安能神天以清名􅀘寒餓昔之隐者人皆聞聖賢法則吾豈敢郷里小兒安足云況君能毉當濟丗未歎行路常踆踆伸眉一􅀏索我别北風吹雪来繽紛溪船無錢附歸去垂槖不管妻孥嗔青山白石大自在且復掛子頭上巾江湖多盧識者少􅀊晩逺游須待春君不見舎中之長眼眥肉豈觧善事長桑君題泰東山蔵主十八開士圖環瀛茫茫去不窮大鯨吹浪􅄓鼓風樓船如山不敢過况在汎葦浮蕉中西方十八大尊者徑度萬里猶乗空犀行水開蛟蜃露直下踏入天呉宫􅀛魚背髙盂錫穏中流正與靈槎同怪頭逹枿四罔象一單舁出厖眉公鼻端嘘氣作飛塔舌上彈呪招降龍兩僧促膝披具葉一衲褁足須山僮雪毛白鹿岐角健斑尾黒虎双睛紅最後坐禪如古佛從渠􅅮控何神通吾聞浮屠多善幻作詩自賞􅀞者工君不見海波横潰􅀑神惡我無其術安能東蛻菴詩卷之二蛻菴詩卷之三衡山釋大杼北山編集七言律詩八月十六夜對月蟋蟀梧桐秋滿庭浮雲散盡月踈星仙人脩月渾無迹使客乗槎自有靈一道銀河通碧海三更白露下靑冥西風忽起吹黄鵠夢㫁瑶池醉未醒中秋次友生玩月韻華月光浮玉色醪凉飈時拂紫綈􅂁河通閣道流雲急星繞天樞出地高按舞豈無仙跨鳯縦吟聊放客揮毫扁舟近憶樟亭下曽看魚龍送夜潮閏九月㳺錢塘南屏諸山山僧領客興何長慧日峯前俯大荒舊俗尚傳三令節人生難遇兩重陽丹楓換葉隨秋老黄菊留花過閏香更與摩崖訪陳迹西風吹冷薜蘿裳閏中秋是日白露莭河漢雲消溢素光重開罇酒據胡床嫦娥斟酌猶前夕老子婆娑且醉郷風信兩畨生緑桂年華一寸入黄楊恠来詩思清難忍早鴈聲中露欲霜七月望對月新秋月色􅀄圎夜逺客樓中獨坐時却數只驚身老大相看聊與影栖遲神仙宫􅆣開三島牛女星河淡兩旗不是呉剛頻伐樹西風應長出輪枝中秋廣陵對月散盡浮雲月在東白蕉衫冷小庭空星河夜影尊罍裏城郭秋聲鼓角中落葉有光時墜露鳴蛩無響不含風此生五十三回見只遣姮娥􅀏秃翁上元􅀫通州楊原誠寓宅禁城東下一川平杳杳烟蕪澹澹晴風衮暗塵羊角轉水披殘凍鴨頭生􅄐居有酒春堪醉小市無燈月自明還憶故園今夕賞玉人花底共吹笙丁亥元日梅花院落雨聲中窓外春寒淰淰風臘酒撥醅浮玉螘夜燈挑烬落金蟲星環甲紀驚身老雪觧寅朝驗􅀊豐還喜驛書催上路寸心長在日華東中秋玩月崇真萬壽宫西風吹月出雲端松栢流光繞石壇上國山河天廣大仙家樓􅀚夜高寒似聞玉杵鳴玄兔疑有瑶笙下翠鸞只把酒盃供醉賞不知零露滿金槃四月旦雨中送春苦筍櫻桃次第来雨餘官樹緑連街白纓蚯蚓歌幽草赤幘蚍蜉穴古槐短髮欲星愁有效幻身如電事無涯人間恩怨何須論􅇛扇清風又入懷乙酉月二十七日大雪寒甚有㫖賜宴史局聖主恩隆六賜筵玉音躬聴相臣宣史裁東􅀚何殊漢人在瀛洲捴是仙御酒如春浮浩蕩宫花與雪闘婵姢微生此日霑休澤祇望丹震祝萬年述古真人壽席爲賦龍虎山中有洞天長生見此老彭籛羽衣小作金門客玉籙元書紫府仙藥竈夜光丹似日壽尊春色酒如泉未須便覓雲林隠更閱人間八百年春日汎湖陪李旻徳融席上作春来渾不到湖邊偶逐東風上晝船花氣暖流黄烏岸水光晴展白鷗天緑樽興極頻呼酒銀筦聲高正輥絃我比放翁應更放看花不獨海棠顛雪後苦寒雪後北風尤苦寒燎爐起擁􅂴頭冠謾懐學士酴醾酒仍對先生苜蓿盤戎馬尚驚塵衮衮客查空往海漫漫向来事是今朝夢底用悲吟且自寛喜雨乆旱苦蝗日氣如焚土氣腥黒雲當午忽冥冥雨工分下旗千隊神姥携来酒一瓶牛馬長河迷渚涘龍蛇平陸起雷霆快看一洗飛蝗盡猶及秋田晚稼靑清明日到陳荘出郭東門古道斜獨􅀐欵叚稳於車春纔三月已兩月村舊百家無十家山徑低飛􅀑蛺蝶野塘競噪官蝦蟆東風不柰晚愈悪吹散滿衣楊白花東西馬城春行柬平湜伯容淸明時節每多隂楊柳人家花滿林潑火乍収連日雨賞春長􅀒百年心鳬翁一一塘蒲暖雉子斑斑隴麥深爲報能詩平}
