  - {type: page-break, offset: 8855, content: '', id: KR4d0530_SBCK_002-4a}
  - {type: variant, offset: 8856, length: 0, content: '', SBCK: 舎人文有様請君㽞束宫錦􅂁待看揮毫玉堂上并州歌送張彦洪使畢還河東吾郷故人苓落盡見子老成殊慰心祥金百煉乃利器桐尾半焦方賞音河東臬府幙下士飛傳来作朝正使太和嶺上盗巳空旗旌盡是官軍紅殺人如麻道路絶朝狐暮梟競巢穴嚴風欻起霜倒飛塞日黯淡寒無輝子来未幾遽言㱕使我東望淚沾衣豈不聞并州少年游侠子手携玉龍最輕死并州􅀅軍劉越石夜半登臨長嘨起汾河直来繞郡城鴈門離石寒峥嶸老旻四葉彈丸地大梁全師勞再征一朝征賊輙破碎大􅀅不誅天失刑}
