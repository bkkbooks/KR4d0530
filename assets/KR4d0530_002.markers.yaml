  - {type: variant, offset: 7090, length: 0, content: '', SBCK: 徹晝風何急避行陵樹旁驚沙撲面黒野日暎人黄科斗旱未出栗㽞寒尚蔵窮途淚易下不是阮生狂七月旦立秋風雨夜寒綀衾不解暖巳索絮衾眠老疾日漸退餘生天所憐蝎行窓􅁓響蛾撲燭花偏喜見沽頭報江南有到船嘿坐時俸支降真香嘿坐􅀚浮丗何殊起㓕雲㹻寒夜嘷母鴉急晩追群應俗神嗟耗經冬足苦皸俸香吾獨喜日可炷爐薫除夕坐玩群兒戯閑供一􅀏懽朱丸那欲􅀑白酒不禁寒官索題春帖鄰分饋􅀊樂歸期知幾日謾檢暦頭看􅀄三日夜玩月至中秋得詩二首化工金鑄巧又換一鈎新逺道傷遊子深閨喜拜人影懸秋半破明遡日西淪正擬排宵看裁詩莫厭頻新月過􅀄弦水輪次第圎空中真見相清極恍如仙舊雨蒼苔地新寒白露天胡床延佇乆不覺屢移前悼太平公晨起洒杯酒北風吹淚痕豈徒歌楚些端欲呌天閽碧化萇弘血春歸杜宇䰟千秋一史筆誰辨逐臣􅁈梅隠為蕃禧􅀚余道士作二首隠者多幽事鉏雲自種梅幾盤山徑術強半雪莓苔拾藥泥丹竈浮香入酒盃時時霞上友清曉踏寒來茅屋西林下逋仙恐是君支笻鶴外見哦句竹􅁁聞老樹春常早空雲雪不分道人無夢乆何處覓梨雲識趣齋為山隂魏仲逺賦夏葢湖濱宅幽然水竹開荘前魚市合山下酒船来把釣依雲樹尋詩歩石苔相羊総成􅃐直待醒心囬􅀉雲門僧􅀂耶溪兼題其松風閣二首聞道耶溪叟髙年出寺遲眉毫長幾許布衲破多時掛錫鶴移樹繙經花滿池相望一江水歳晚赴幽期閣外老松子䔥蕭虚􅄜生定從何処起寕有不平鳴我耳固師耳風声是樹声他時扣禅寂衲破睡天明送泐季潭遊天台并送淵侍者歸天台二首来從石城寺去訪石橋僧錫杖空山路禅龕獨夜灯道知文暢得詩許絞然能到日西岩下應吟瀑布氷觧夏囬天竺㝷真問石橋隣房留偈徧歸路戴經遥瀑壮懸秋雨江明日上潮題詩􅀉相憶何処寛山寮送蒲室殺本中往住長芦寺嘉禾人丈錫風塵傺師行戒畏途故人懷檇李春水到長芦舎利藏金塔袈裟繫珤珠禅房大自在應念室中蒲謁儀則堂上方􅀚听續撰澤氏通鑑平生方外朋今識故郷僧史有春秋筆談空大小乗香厨朝飯麫古殿晝然灯帰路烟蕪外斜陽下道陵北山以雪窓墨闌竹石求題次韻幽蘭出楚畹美竹自湘濵共友三生石俱凾太古春山林空見相氷雪老通神長作禅房供毋令墮丗塵送蒙古僧印空岩还黄龍寺印受戒于天目山二首高僧明庭秀受業自南宗心法捷為印禅機捷􅀂鋒炉香来化鶴瓶水豢降龍弟子經窓外應占舊偃松古刹西江外師居最上方山神出護法天女下焚香乆客霜髭滿歸舟雲樹長秋期到天目容我借禅房北山以着色蘭贈西昌堯如淵永題}
