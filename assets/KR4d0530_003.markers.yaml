  - {type: variant, offset: 0, length: 3277, content: 欽定四庫全書蛻菴集卷三元張翥撰七言律詩無題見時略略望遙遙有月䦨干待袖招得巧蜘蛛絲縷細傳聲鸚鵡舌關嬌仙家絃管寜無譜天上星河亦有橋雲雨或時消息斷不如朝暮石城潮聞笛何人吹笛傍江干木落淮南夜色寒三弄水邊人艤棹一聲雲杪客凭欄梅花􅉡􅉡吹應落楊栁依依折欲殘惆悵緑珠何處在綺忩深鎖月漫漫臺城運盡黄旗晉祚開天星俄復坼三台方驚掘地雙鵞起已見浮江五馬來草暗離宫碑仆土雨殘戰地骨生苔當時一掬新亭淚猶帶寒潮日暮廻冶城此地先皇駐六龍鼎成龍去杳無蹤御牀羅帕塵空暗輦道朱門草已空題榜侍臣留帝勅築亭真士記天容自憐不及窺弓劍愁絶寒城響暮鐘鹿苑寺千古南朝㡬劫灰蕭梁寺額獨崔嵬化蛇妬婦餘空井刺虎将軍有舊臺江口山紅寒照没石頭樹白暝烟來滿衣落葉西風急更為凴髙送一杯瓦棺寺脩竹長松晝寂然梵宫髙閣起中天虎頭妙畫空餘刻鴟吻名書竟不傳石柱至今標宿莽瓦棺何處葬寒烟凴髙更盡䦨干曲及取江山未暮前石頭城用薩天錫韻逶迤石路帶城遙古寺殘僧蘚半凋一自降王歸上國空餘故老說前朝壊陵鬼剽傳金盌畫壁仙妝剝鳯翹更欲留連盡竒觀夕陽江上又生潮秦淮晚眺赤欄橋下暮潮空逺火疎舂晻靄中新月半天分落照斷雲千里附歸鴻嚴城鼓角秋聲早故國山川王氣終莫訝時來一長望越吟荆賦思無窮八月十六夜對月蟋蟀梧桐秋滿庭浮雲散盡見踈星仙人修月渾無跡使客乘槎自有靈一道銀河通碧海三更白露下青㝠西風忽起吹黄鵠夢斷瑤臺醉未醒七憶憶錢塘平湖十里碧漪風歌舫漁舟逺近同天竺雨餘山撲翠海門潮上日蒸紅傷心花月隨年換回首閭閻委地空白髪故人零落盡浮生悵望夢魂中憶姑蘇讓王城外暮雲黄忍使行人哭戰塲臺上麋逰香徑冷陵頭虎去劍池荒竹枝夜月歌仍怨蓴莱秋風興漫長不是不歸歸未得五湖烟水正茫茫憶㑹稽千巖秋色徹層霄憶昔來乘使者軺翠袖屢扶蓬閣醉籃輿時赴寳林招山隂客已無春㑹溪上風猶送暮樵此恨古今銷不盡西陵寂寞又回潮憶維揚蜀岡東畔竹西樓十五年前爛漫逰豈意繁華今劫火空懐歌吹古揚州親朋未報何人在戰伐寧知㡬日休惟有滿襟狼藉淚何時歸洒大江流憶金陵昔年曽上鳳凰臺二水三山眼界開六代繁華春草歇千年興廢暮潮哀燈忩禪坐時聨句山館仙逰㡬引杯最是令人愁絶處夕陽雙燕自歸來憶呉興憶汎苕華溪上船故人為我重留連半山塔寺藏雲樹繞郭樓臺住水天白榜載歌明月裏青帘沽酒畫橋邊計籌山下先塋在欲往澆松定㡬年憶閩中漫漫漲海際天涯萬里曽乘使者槎梓澤重尋仙客洞草堂頻醉故侯家人多熟酒燒紅葉市有生蠻賣象牙安得夢中真化蝶翩然飛上刺桐花中秋次友生玩月韻華月光浮玉色醪涼颸時拂紫袍河通閣道流雲急星繞天樞出地髙按舞豈無仙跨鶴縱吟聊放客揮毫扁舟近憶樟亭下曽看魚龍送夜濤閏九月逰錢塘南屏諸山山僧領客興何長慧日峰前俯大荒舊俗尚傳三令節人生難遇兩重陽丹楓換葉隨秋老黄菊留花過閏香更與摩崖訪陳跡西風吹冷薜蘿裳閏中秋是日白露節河漢雲消溢素光重開樽酒據繩牀嫦娥斟酒猶前夕老子婆娑且醉鄉風信兩番生綠桂年華一寸入黄楊怪來詩思清難忍早雁聲中露欲霜七月望對月新秋月色初圓夜逺客樓中獨坐時却數只驚身老大相看聊與影栖遲神仙宫闕開三島牛女星河淡兩旗不是呉剛頻伐樹西風應長出輪枝中秋廣陵對月散盡浮雲月在東白蕉衫冷小庭空星河夜影樽罍裏城郭秋聲鼓角中落葉有光時墜露鳴蛩無響不含風此生五十三回見只遣嫦娥笑秃翁上元宿通州楊原誠寓宅禁城東下一川平杳杳烟蕪淡淡晴風滚暗塵羊角轉水披殘凍鴨頭生離居有酒春堪醉小市無燈月自明還憶故園今夕賞玉人花底共吹笙丁亥元日梅花院落雨聲中忩外春寒淰淰風臘酒撥醅浮玉螘夜燈挑燼落金蟲星環甲紀驚身老雪解寅朝騐嵗豐還喜驛書催上路寸心長在日華東中秋玩月崇真萬夀宮西風吹月出雲端松柏流光繞石壇上國山河天廣大仙家樓觀夜髙寒似聞玉杵鳴𤣥兔疑有瑤笙下翠鸞只把酒杯供醉賞不知零露滿金盤四月旦日雨中送春苦筍櫻桃次第來雨餘官樹緑連街白纓蚯蚓歌幽草赤幘蚍蜉穴古槐短髪欲星愁有效幻身如電事無涯人間恩怨何須論團扇清風又入懐述古真人夀席為賦龍虎山中有洞天長生見此老彭籛羽衣小作金門客玉籙元書紫府仙藥竈夜光丹似日夀尊春色酒如泉未須便覓雲林隠更閱人間八百年春日泛湖陪李旻徳融席上作春來渾不到湖邊偶逐東風上畫船花氣暖流黄鳥岸水光晴展白鷗天緑尊興極頻呼酒銀管聲髙正輥絃我比放翁應更放看花不獨海棠顛雪後苦寒雪後北風尤苦寒燎爐起擁懶頭冠謾懐學士酴醿酒仍對先生苜蓿盤戎馬尚驚塵滚滚客槎空望海漫漫向來事是今朝夢底用悲吟且自寛喜雨久旱苦蝗日氣如焚土氣腥黒雲當午忽㝠㝠雨工分下旗千隊神姥攜來酒一瓶牛馬長河迷渚涘龍蛇平陸起雷霆快看一洗飛蝗盡猶及秋田晚稼青清明日到陳荘出郭東門古道斜獨騎欵段穏于車春纔三月已兩月村舊百家無十家山徑低飛鬼蛺蝶野塘競噪官蝦蟆東風不奈晚愈惡吹散滿身楊白花東西馬塍春行柬平湜伯容清明時節每多隂楊栁人家花滿林侵晚乍收連日雨賞春常負百年心鳬翁一一蒲塘暖雉子斑斑麥隴深為報能詩平處士剩攜芳酒共幽尋暮春有感次劉監丞二鳥寧容一處囚能鳴何似不鳴休來今往古無窮事剩水殘山縂是愁欲識碧雲須麗句擬裁白雪欠名謳强顔未得投簪去一濯塵纓萬古流上京大雨驟寒飲周從道所莫年已卜田園去豈意猶歌行路難且復酒杯同旅次不堪人事總憂端山林茒屋三生逺風雨氈裘六月寒吾友有家應此住老夫何地挂吾冠逰鳳凰山故宫至髙禖臺鴻雁池衰草寒烟老木風南朝佳氣落秋空璧來山鬼遮秦使盤泣仙人出漢宫壊埒尚傳祠乙鳥荒池曽見射飛鴻騷人自古多離思長在登臨感慨中春日偕監中士友逰南城樓閣參差紫翠間㣲風不動綵雲閒栁垂禁籞絲千尺水繞宫溝玉一環春樹鳥鳴圓似筦夕陽駝影兀如山醉鞭緩緩吟歸去燈火城東未掩關上京秋日三首山前孤戍水邊營落日無人已斷行甌脫數家門早閉轒温千帳火宵明白摧野草狼同色秋入榆關雁有聲最是不禁横笛怨海天秋月不勝情水繞雲廻萬里川鳥飛不下草連天歌殘勅勒風生帳獵罷閼氏雪没韀紅頰女兒花作隊紫髯都䕶酒如泉時巡嵗嵗還京樂别換新聲被管絃逺山平野浩茫茫曽是當年古戰塲飲馬水乾沙窟白射雕塵起磧雲黄中郎節在仍歸漢校尉城空罷䕶羌今日車書逢混一不辭垂老看氊鄉三月二日賞杏花光岳堂分韻栁色初青草漸茸春寒猶勒杏花風新煙院落清明後過雨園林罨畫中洛社衣冠今日再蘭亭觴詠此情同吾年最老身仍健更向尊前借酒紅臘日飲趙氏亭城上髙亭一再過每看風物費吟哦近詩頗效寒山子往事徒成春夢婆賸買十千燕市酒閒聽二八越孃歌梅花枉報春消息祗遣今年别恨多秋日偕成竹居秦景桓逰蜀岡萬花園九曲池平帶蜀岡呉公臺逺隔雷塘閒尋遺跡懐千古逈立髙丘望八荒黄落山川秋廣大青㝠風露日凄涼一尊不慰登臨地朔雁南雲恨更長春日逰王公亮南墅人家星散住村墟第二港頭潮水初蛺蝶一䦨花院落烏犍千畆雨鉏犂養魚已得陶朱法種樹還抄汜勝書興熟不辭歸路逺醉扶斜日上柴車秋日陪呉興諸府公宴魯公池上芙蓉池上㑹羣公滿意華筵笑語中虹影連蜷山外雨荷香澹蕩晚來風歌催銀甲箏逾急涼入金樽露易空我亦玉堂揮翰手題詩合在水晶宫刋史局雨涼陪韓左丞叔亨小集斷煙疎雨散秋虹古木髙堂納晚風青史文章千古上紫㣲星象五雲中前朝無似於今盛羣彦難期此㑹同涼思滿簾宜解帶好懐寧放酒杯空中秋張外史招賞月失約賦以謝之明月中天霧氣消酒醒涼思正飄飄星河不動秋空濶鐘鼓無聲夜寂寥露下逺山皆落木風來滄海欲生潮仙家玩事無縁到虛負瓊樓聽玉簫辛巳二月朔登憫忠閣百級危梯遡碧空凴䦨浩浩納長風金銀宫闕諸天上錦繡山川一氣中事往前朝僧自老魂來滄海鬼猶雄只憐春色城南苑寂寞餘花落舊紅早發潞陽驛征車如水轡如絲望入金河欲曙時萬里山川環拱抱九天宫闕起參差風林泥泥秋多露野淀稜稜曉有澌三十餘年觀國願白頭今日到京師上京即事灤河東出水瀠洄叠坂層岡擁復開金柱鎮龍僧呪罷玉輿馭象帝乘來中天星斗朝黄道塞漠雲山繞紫臺欲擬兩京為賦頌白頭平子愧無才舟發浙江夜泊廟山驛風帆東上浪㝠㝠鐘鼓山前近驛亭江海秋生河漢白魚龍夜没水雲青誰從三島求仙藥自信孤槎應客星好喚呉兒扣舷起浩歌呼酒月中聽豫章山房為見心復公賦劍江寺裏古樟樹百尺如盖青童童山靈長此䕶林壑雷電不許藏蛇龍掃石僮來秋葉後談經僧坐晝隂中題詩禪房更瀟洒便與王城祗樹同上清山中煙景空明石路㣲千年草木駐光輝山中觀闕金銀氣天上神仙黼黻衣赤石大溪魚欲化青雲𤣥圃鶴長飛只今浩劫頻來往未信滄洲與願違四明寓居即事郡城重鎮浙江東徼道荒蕪雉堞空於越山川星紀外故王臺榭水雲中船來蠻賈衣裳怪潮上海鮮鱗鬛紅不向旗亭時一醉行人愁殺栁花風, SBCK: ''}
