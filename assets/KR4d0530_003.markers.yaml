  - {type: variant, offset: 6650, length: 1, content: 闕, SBCK: 買五湖烟水正堪乗愛松老禪安稳無水西外史近何如後身莫論前身事今歳才収去歳書山寺鼓羮末下江亭魚飯憶王餘浮雲蹤影􅀙南北神自相親跡自踈浙僧饒雲石至京即囬山僧業在臨平寺面面軒窓画障開渌水一川紅菡蓞青林千樹紫楊梅戴經偶作王城出卷衲還思故苑囬應是峯頭老黄鶴月明長待錫飛来用丁仲容韻送季潭泐公歸龍翔南歸還挂舊携藤古寺東􅁁是􅃽陵齋罷江山延睌眺禪餘鐘鼓報晨興􅀅詩却訪天台客别偈長㽞日本僧歳晚雲房㑹相見一杯春茗煮溪氷􅀉荅㝎水見心禪師三首自入赤墀青􅃈間舊遊禪侣亦䦨􅃢青山只憶招提境白首􅀄辭供奉班馬為空群猶蹻蹻鳥能求友自􅀜􅀜終期一舸相㝷去知在姚溪第幾湾見􅀃錢唐别築城凄凉風景􅀂為情湖堤柳盡曽㳺路石壁苔荒舊刻名老我無能如燭武何人可飲勝公榮沃洲勝㑹還容續即儗山中隠計成古刹鐘魚振一方山中禪伯法中良蒲編金地菴十笏墨寫石厓詩數行龍公聴講能変化魔􅀑避呪無災祥遥知㝎起佛鐙外童子蒸花香滿裳師號蒲菴故云次林伯昇游天童寺韻禪􅀜一到二十里􅀍嶺連雲皆古松海近仙洲通弱水山来佛國捴靈峯市開虚日家家酒僧飯齋時寺寺鐘勝㮣非詩誰冩得紫霞青靄一重重}
