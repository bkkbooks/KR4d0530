  - {type: variant, offset: 9800, length: 1, content: 箋, SBCK: 牋病疽席上屠蘇歳􅀊同只憐醉後飲衰翁半生客路江湖裏十日春愁雨雪中黄道雲消晴見斗青陽氣轉曉占風欲題彩帖無佳句思遶蓬莱最上宮􅀄度日八十一翁烏角巾尊前才放自由身病須善藥休離手衰借嘉醪可養神誰謂仲連為侠士或傳方朔是仙人行當小築西洋墅種杏栽桃作好春癸酉􅀄度真率㑹分韻得杏花風煖破春隂一􅀏幽齋喜盍簮人事萬端相聚少酒杯百罰不辭深生辰值月方􅄤斗故國􅀚星正在參多謝諸君為我壽滿牋佳句敵南金乙亥􅀄度是􅀊仍改至元此生重見至元年白髮垂垂巳滿顛仕愧買臣無印綬歸思靖莭有園田菜挑渚雪氷茸滑柑剥吳霜玉腦圎終結一菴湖上去老来閑送佛前錢病痁肉黄皮皺髪毛枯一病支離困壯夫痛要小奴搥臂􅂰冷㝷破㡌褁頭顱鄰翁教誦禳灾呪道士来書禁瘧符車轍馬蹄勞客問藥嚢糜盌乏吾須炎火寒氷忽暗投肺膓日與藥為謀儗尋畫史圖師子安得詩人咏髑髏月色自如閒度夜蟲聲無頼􅅍吟秋便當一起幽憂疾濯髪西風萬里流自喻狎鷗不下解知幾蟋蟀先鳴能表微人海無涯俱汎汎佛天有相亦非非試論前軰今誰在欲問何山老可歸嚴瀬磻溪各求志豈関出處在漁磯憶山中買山宴塢近天根遥憶春深正灌園一樹爛紅櫻著子滿林鮮碧竹生孫少陵只擬還韋曲安石端宜得謝墩歸老㑹㝷凌道士采芝燒藥了晨昏感興􅀙来豪傑願風塵奮臂干戈肯頋身司馬諸王祗􅅍晉祖龍二丗竟亡秦祠旁􅀑火狐鳴惡橋下天寒鶴語神千古汗青㽞感慨山中輸与種桃人}
