  - {type: variant, offset: 9806, length: 0, content: '', SBCK: 叨讀卷官進士擢科従古盛大臣考䇿得才難芳年荏苒聞鶗鴂花事􅀙容到牡丹明發禁扄當撤鎖文光髙動五雲端翰林三朝御容戊戌仲冬朔把香前宮嘉禧殿前􅀄日高瑞光先映赭黄􅂁雲間端露収金掌仗外微風颺彩旄黄鶴仙人周子晉碧鷄使者漢王褒禁園尚覺餘寒在未放春紅上小桃甲午禮闈白雪青天映日紅樓臺高下玉光中佳城正際新春晦薄冷猶吹向曉風萬國衣冠朝北􅇅一時文獻集南宫吾皇方此求賢俊載筆寍慙奉至公九月朔迎駕大口大駕今朝至上都期門罕畢巳前駈錦衣照日環龍衮翠盖凌雲覆象瑜萬里山河開白道兩京宫􅆣入黄圖縦􅀚父老心應喜知有天恩免過租庚辰十月朔奉迎明宗􅁽寳至石佛寺明日壬辰迎至太廟清祀禮成賦以紀事寳􅁽香輿出法宫非烟御路曉濛􅄥仗齊劒佩千官裏金奏簫韶九廟中宣室􅀑神徴賈誼太常禮樂属孫通下臣有幸逢熈事散作恩波四海同圎丘禮成改直翰林敕書告廟祝板捧􅁽先期􅈼太宫聖孫翼翼孝心同霓旌曉絢香輿日鶴駕晴薫彩仗風一代皇猷昭黼黻萬年寳歴卜延鴻舞階行見干戈戢並在穹祇叶相中黼黻青城煥景光紫壇黄道藹天香鳯韶曲變􅀄終奏龍衮衣明上下章共喜聖時脩曠典更􅀙春享議明堂吾皇飲福神􅂕畢却進公卿萬壽觴送太傅丞相出師平徐方南征諸􅀅乆無功丞相親勞出捴戎虎士嚴兵屯玉帳龍庭大宴賜􅊮弓萬年社稷収長筭百􅀾旌旗得勝風幕府如雲盡才彦荆徐指日捷書同直延春閣蓬莱海上苐三山仙掌雲間十二槃鷄樹烟深殊窅窱鳯樓天近自髙寒銅壷傳漏聲相應紫詔封泥墨未乾願祝君王千萬壽坐施雄㫁濟艱難􅀉寳林同别峯㝎水復見心寳林老子虎耽耽㝎水道人蒲作菴歸老尚須㳺越絶㝷師先儗到精藍娥江碑在當重讀禹穴書蔵㑹一探我亦三生學環者㝎從佳處結禪龕}
