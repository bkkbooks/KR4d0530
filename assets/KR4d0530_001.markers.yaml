  - {type: variant, offset: 0, length: 8748, content: 欽定四庫全書蛻菴集卷一元張翥撰五言古詩堂堂朝為堂堂吟暮為堂堂謳堂堂徒爾竒堂堂徒爾憂不見膏與蘭煎燔祗自休勿以不遇故棄捐經與史勿以勢利故棄捐亷與恥勿以行役故棄捐山與水謂夜未遽央已復明星明仰視何煌煌白露忽沾裳懐人攪余心何以勿永傷江北亦為客江南亦為客為客多偪兀何以安所適上有君與親下有妻與息在山則種榆在隰則種蒲馬牛必維婁舟航必繻袽富貴富貴友貧賤貧賤徒嵗月來者多江湖逝者逺所得不可逝所期不可返幸此世累輕歸去衡門偃雜詩先人有夙訓聞在幼壮時豈意衰暮日乃復新騐之茫茫上天理詎可私臆知百年大化中流浪從推移信彼杞憂者徒為衆所嗤叔子鄰家兒探環記前身次律求師後一悟了宿因我亦清源洞蛻骨巖下人誤堕聲利區驅馳喪其真所以付樽酒都忘賤與貧惜無還丹術髙舉遺世塵悠悠笙鶴期曠望三山津寒日廹縣車寸隂老愈惜晨趨理公務暮返親墳籍究往發孤憤思來抱深惕理惬復相忘神劬聊一息湛然擁襟坐栩栩鼻端白千齡與化終不朽在方策聖哲有明訓學道庶自益寒夜何皛皛中庭積繁霜天風下河漢萬里流玉光羽衣四三人各乘白鳯凰笙響發空際㳺雲髙馳翔無縁執霞佩攬結雙明璫願托月中桂終古有餘芳隴坂何﨑嶇行人且復止直上望晴川遥遥憶鄉里流離肝腸斷悲歌不能已一身已遐征永念同室子何殊轉蓬科随風四散起雖得同根生不得同根死吾洒古今淚多於隴頭水春江采瑶草将以伸繾綣初期拾翠洲復道滋蘭畹美人隔花深歌竟瑶瑟偃臨流不可見恍忽心未穏佳時難驟得鶗鴂鳴已晚祇有千古思綿綿楚波逺黎丘之丈人歸路逢竒鬼既為鬼所惑又復鬼其子夏南滑蜀梁俯影明月裏背走謂伏鬼而又鬼諸已此皆非鬼者特以疑故死憧憧奸佞徒情状實鬼爾匿迹不自慚胡為滿朝市河淮厭兵禍城邑多荒榛百里無㡬家但見風起塵燕雀歸果樹豺虎饑食人鄉來脂膏地死骨今如銀流亡使復業牛種當及春安得百龔召錯落為拊循征討尚未息奈何爾遺民前出軍五首前軍紅衲袍朱絲繫彭排後軍細鎧甲白羽攅鞲靫輜車左右馳萬馬擁長街送行動城郭斗酒飲同儕壮士當報國毋為故鄉懐鍜鐵作佩刀磨石為箭鏃中軍把轅門前䜿十丈纛朝上蘆溝橋夕次泃河曲超乘既誇勇騁馬復齊足男兒不封侯百年同視肉昨日發萬軍今日發萬軍明日發萬軍梟騎來羣羣馬蹄所經過黄埃蕩成雲堆糧與作飯倒樹與作薪道途行者絶那得有居人大軍北庭來部伍各有屯放馬原隰枯磨刀河水渾行行且射獵雉兎不復存野次羣駞卧弓箭挂車轅幽幽笛聲起日暮傷人魂京師少年子膽氣乃麤豪傾金售寳劍厚價買名刀白氊作行帳紅綾製戰袍結束往從軍談笑取功勞當時霍嫖姚豈在學戎韜後出軍五首歩卒傖楚健長刀短甲衣大呌前搏敵跳蕩如鳥飛左提血髑髏右奪賊馬歸黄金得重賞顧盼生光輝爾輩疾歸命将軍足天威我軍城東門呼聲震屋瓦百萬山壓來此賊何足打狂鋒尚力拒轉鬬血噴洒城中有暗溝多陷人與馬将令毋輕入明當一鼓下先鋒才攻門後軍已登陴拔都不怕死直上搴賊旗馬前獻逆首脚下踏死屍長河走敗船疾遣飛将追幕中作露板應有傅脩期行行鐵兠鍪隊隊金駱駝嗚嗚吹銅角來來齊唱歌縂戎面如虎指顧揮琱戈馬踶無賊壘手箠可填河王師本無敵安用戰圖多魔賊生汝亳獠賊起於海嬰鋒天狗觸堕網奔鯨駭徐方一戰收振旅已奏凱江浙塵既清豫章圍亦解諸将如竭力削平行可待獨酌謡有酒且一醉有歌且一謡杯盡當再酌歌闋須重調生足意自適身榮心苦焦所以黎首人放浪樂漁樵一謡仍一酌且復永今朝明朝未可料况乃百嵗遙但願花長開美酒長滿瓢静疑太古調散覺神理超近識南郭叟得酒時見招盡醉即髙卧誰能慕松喬古鏡古鏡色如墨照人不見形我照乃見心洞徹天地明此明非外來此明非内有自是世上人惟将照妍醜題林大用隠居飯牛山山田多白石陽陂足豐草瘦地費牛力飯之當宿飽近午牛背熱出耕須及早解紖休樹隂念此觳觫老隠居抱正學逍遙事幽討商歌干齊侯戚也豈知道中秋望月當年見明月不飲亦清歡詎意有今夕照此長恨端近聞錢塘破流血城市丹官軍雖殺賊斯民已多殘不知親與故零落㡬家完徘徊庭中影對酒起長歎死生兩莫測欲往書問難仰視雲中雁安得托羽翰凄其衰謝踪有淚徒汍瀾山中松筠地棄置誰與看河漢變夜色西風生早寒累觴不能醉百念摧肺肝送客齊化門東馬上口號白楊多悲風黄葉滿行路荒溝寒水碧亂石且無數我興逺送别駐望生百慮欲往豈不懐畏此簡書故遙遙墟烟上歴歴鳴雁度秋景倐己短歸人驅車去勞歌一凄然回首重愁暮陽曲義士薛氏旌表詩卷至正二年事十二年其里人趙時照求題上天久無雨南風日吹沙旱氣彌蟲蟲六月稻不花晉土素磽瘠如此嵗食賖上官方勸分義士起嘆嗟發帑捐積鏹糴粟來連車吾鄉忍溝壑哺爾萬口呀厚澤田里被頌聲父老誇預備世勿務征斂惟紛拏遂令活人功乃出一士家不知時有司視此無愧耶我作義薛詩好徳良可嘉願言講荒政生意當無涯安童都事字鼎新號太虛徴余賦之集賢院太虛本無象何有倪與端至理妙自然萬化孰控摶天地亦一物而在虛空間所以豪傑士不受世網干脫迹形氣表出入凌汗漫鸞鵠為我導雲飇作之翰仰扳霄衢轡俯濯龍池瀾綠文粲瑶軌髙咏瀛洲山㝠心合𤣥想坐以空洞觀琳腴薦朝食紫金咀神丹無待無窮外浩然與之還漷農歎漷南有農者家僅一兩車王師征淮蔡官遣給軍儲翁無應門兒一身老當夫勞勞千里役泥雨半道途到軍遭焚烹翁脫走故閭車牛力既盡户籍名不除府帖星火下爾乘仍往輸破産不重置笞箠無完膚翁復徒手歸涕洟滿敝襦問家墻屋在榆桞餘殘株野雉雊梁間狐狸穴階隅老妻出傭食四顧筐篋無有司更著役我實骨髓枯仰天哭欲死醉吏方歌呼題述律萬户澹樂軒惟澹有至樂此樂世罕知誰能味無味舍彼甘與肥君侯文武才面有虎豹姿被甲起上馬出入百萬師西來樹功勲獻頌白玉墀方将大将權繞帳羅旌麾紛華艶人目孰不為朶頥顧於方寸間物累乃若遺齋居寄遐賞而無山林期處樂寜易言豈獨靜者宜始知豪傑士自有絶世資悠哉澹中趣吾道同所歸送黄中玉之慶元市舶昔我逰四明壮觀溟海波褰裳寳山頂曙色寒嵯峨日輪鎔生金涌出萬丈渦雲氣忽破碎朱光相盪摩决眥蓬萊宫攜手扶桑柯羣仙迎我笑佩羽紛傞傞颶風歘驚潮騰擲鱷與鼉浮槎徑可擥從此超天河精神動百靈上下煩撝訶歸來已十載逺夢時一過君家賢父兄儒術傳世科薄言捧省檄舶署聊婆娑是邦控島夷走集聚商舸珠香雜犀象税入何其多權衡較低昂心計寧有訛資閱須歴試壮圖詎蹉跎惟君官事隙為訪巖之阿懸想仙者徒往往笑且歌遐征渺不見空響遙相和因聲兩黄鵠持我紫玉珂豈無滄洲興奈此塵刼何門有車馬客行坐秋雨思秋風仰眎白日雲中彼美一人誰容秉心鬱其忡忡為客一鼓云何慷慨起舞悲歌巨魚出聽凉波鳴鳥徘徊庭柯有客有客在門崔嵬髙葢華軒起欲與之語言已叱僕夫回轅寜不少忍須臾謂我巷不容車北望豪家是趨堂上有箏有竽盛衰相尋無端媒勞恩絶則然還坐自樂我閒勿謂無知絶絃七言古詩古促促辭促促何促促丈夫生兒美如玉長城㳺蕩不思歸令我隻身守空屋不願汝學班定逺不願汝學馬相如定逺生不入玉關相如死不還成都但如塞翁父子長相保得馬失馬何足道又如龎公攜家隠鹿門遺安遺危俱不論貴而衣貂不如貧而緼枲離而食肉不如聚而飲水身雖促促心得寛為汝白頭屋中死北風行長河風急波浪惡青天晝黄塵漠漠瓠􅕧渡中舟盡泊官船撦帆與水爭牽馬毛寒撾不行秃樹挂戛枯蓬驚夜深風定浪聲死忩光倒搖天在水前伴相呼随雁起帽絮不暖衣生稜老貿不語愁河氷上閘下閘應蹙凌篙師指直失増减明星欲明霜似糁館陶城南鼓紞紞螢苑曲楊花吹春一千里獸艦如雲錦帆起咸洛山河真帝都君王自愛揚州死軍􅋔小隊皆美人畫龍韀汗金麒麟香風搖蕩夜㳺處二十四橋珠翠塵騎行不用燒紅燭萬㸃飛螢炫川谷金釵歌度苑中來寳帳香迷樓上宿醉魂貪作花月荒肯信劍㦸生宫墻斕斑六合洗秋露尚疑怨血凝晶光至今落日行人路鬼火狐鳴隔烟樹腐草無情亦有情年年為照雷塘墓城西路城西路多少人從此中去昨日紅顔美少年今朝白骨委黄泉縱令藏金比山積鬼伯不受人間錢少年何用誇豪富來看城西送人處發古城舖黄蒿古城風捲沙澗頭衰樹啼寒鴉嵗云暮矣霜露積夜如何其星漢斜滿衣落月行人起馬上夢魂猶在家王貞婦青楓嶺頭石色赤嶺下􅖣江千丈黒數行血字尚斕斑雨蕩霜磨消不得當時一死真勇烈身入波濤魂入石至今苔蘚不敢生上與日月爭光晶千秋萬古化為碧海風吹斷山雲腥可憐薄命良家女千金之軀棄如土姦臣誤國合萬死天獨何為妾遭虜古來喪亂何代無誰肯将身事他主兵塵澒洞迷天台骨肉散盡随飛埃楓林景黒寒燐堕精靈日暮空歸來堂堂大節有如此正當廟食依崔嵬君看􅖣江之畔石上血與湘江之竹淚痕俱不㓕題昌化陳孝子傳百丈山前妾逢主禮賢鎮中子逢母三十餘年昨日同白髪相看淚如雨阿㜷去時未斷乳兒壮得知心獨苦清湖老嫗天所留逆旅主人神使語歸來桑竹溪之滸婦前持觴兒起舞雙瓜生祥表秋圃豈用旌書動官府呉人買妾紛莫數嵗滿母歸遺子女巷南巷北不相覓况復山川兩脩阻嗚呼千秋復萬古孝子之名在寰宇世上滔滔忘母人不愧唐昌一抔土題鐵石驄馬圖神厓黒龍時出水㳺牝何年得其子是何毛骨如積鐵逈立長風獨竒偉霜蹄白鼻散五花倐見馬中真騄駬美髯奚官能剪拂不遣雲鬟涴泥滓少施鞚勒即飛騰唾尚不敢况敢捶馬生豈在粟一石不飽寜能見才美朝燕晡越信汝良安得壮士同生死阿師一室巾錫外時展此圖臨燕几三生似是支道林愛馬苦心同若此平原豐草秋漠漠恍惚寒沙䬃然起英雄有志在青雲老眼因之空萬里題趙文敏公畫馬君不見漢家将軍求善馬戰骨縱横血流野歸來作歌薦宗廟寜悲鬼哭宛城下何如聖代徳所懐入獻磊落皆龍媒右牽者誰鬈者偲萬里知自宛沙來眼光鏡懸蹄腕促老奚識性仍善牧時巡之外㳺幸稀飽秣原頭春苜蓿呉興學士藝絶倫妙處直似曹将軍只今有馬無此筆誰與寫之傳世人為君甘老駑駘羣題牧牛圖去年苦旱蹄𫾣塊今年水多深沒鼻爾牛觳觫耕得田水旱無情力皆廢畫中見此東臯春牧兒超搖犢子馴手持鴝鵒坐牛背風栁烟蕪愁殺人兒長犢壮須盡力豈惜辛勤供稼穡縱然喘死死即休不願徴求到筋骨題李白觀泉圖玻瓈杯中春酒緑醉墨淋漓牡丹曲平生合置七寳牀白紵烏紗美如玉阿瞞荒宴百不理寧記宫花銜野鹿何物老嫗生此兒偷向金雞帳中宿髙将軍纔奴𨽻耳誤使脫鞾吾所辱要留汙襪踏鯨魚䑕子何堪煩一蹴尋常溝瀆不可濯何處容伸遭汙足翩然却下匡廬雲五老峰前看飛瀑題郝内翰書所作夢觀瓊花賦後釣魚山前龍上天武昌城外走蜀船老奸欺國馳露布使者坐囚吞雪氊潰兵一夜甲填水血污木棉花下鬼豈知老仙方卧㳺鶴背天風扶夢起頽雲抉月光西流玉簫聲斷江聲愁露華泣盡瓊樹死廣陵春色寒於秋百年遺賦人爭重勁墨遒毫