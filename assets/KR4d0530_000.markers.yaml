  - {type: variant, offset: 912, length: 1, content: 蜕, SBCK: 右潞國張公詩集若干卷廬􅁜沙門大杼北山之􅀁編集也先是潞公扵元季多故之際薨于燕都由其無後北山為之􅀴紀塟事未㡬天兵北伐燕都不守北山取其遺槀歸江南凡選得九百首将刋板以行于世或有問扵余曰北山釋之有道者宜視身為外物而乃汲汲扵故人詩集得非未􅀎遺情乎余謂之曰至人不遺情古之髙僧猶不􅀎免如梁慧約以苦行得道為帝王師而哭其亡友甚哀至賦詩曰我有兩行涙不落三十年今日爲君盡併灑秋風前北山念潞公無後平日交友又皆異世淪謝懼其泯􅃿無傳故仗義而為之然亦何害扵道其與約之情則一也當元統甲戌間余識潞公于金􅁜後㑹于燕都于錢塘盖三十餘年固非一日之好觀北山斯舉豈􅀎無動于中謹書卷末如此若潞公之詩名震耀海内不俟余之稱羙故弗論洪武十年冬天界善世禪寺住持天台釋宗泐蛻}
  - {type: page-break, offset: 912, content: '', id: KR4d0530_SBCK_000-3a}
