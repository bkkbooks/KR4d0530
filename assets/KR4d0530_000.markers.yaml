  - {type: variant, offset: 914, length: 0, content: '', SBCK: 詩卷之一衡山釋大杼北山編}
  - {type: variant, offset: 915, length: 0, content: '', SBCK: 五言古詩獨酌謡有酒且一醉有歌且一謡杯盡當再沽瑟罷須重調生足意自適身榮心苦焦所以􅀺首人多在於漁樵一謡仍一酌且復永今朝明朝未可料況乃百歳遥所願花長開羙酒長滿瓢静疑太古調散覺神理超近識南郭叟得酒時見招盡醉即高卧誰能慕松喬古鏡古鏡色如墨照人不見形我照乃見心洞徹天地明此明非外来此墨非内有自是丗上人惟􅀅照妍醜題林大用􅀮居飯牛山山田多白石陽坡足豐草痩地費牛力飯之當􅀫飽近午牛背􅀬出畊須及早觧紖休樹隂念此觳觫老􅀮君抱正學消摇事幽討商歌千齊覇戚也豈知道安童都事字鼎新号太虚徵予賦之集賢院太虚本無象何有倪與端至理妙自然萬化孰控摶天地亦一物而在虚空間所以豪桀士不受丗網干脫迹形噐表出入􅇒汗漫鸞鵠為我導雲飊作之翰仰攀霄衢轡俯濯鳯池瀾緑文粲瑶匭高咏瀛洲山冥心合玄想坐以空洞觀琳􅃾薦朝食紫金咀神丹無待無窮外浩然與之還中秋望月常年見明月不飲亦清歡詎意有今夕照此長恨端近聞錢唐破㳅血城市丹官軍雖殺賊斯民巳多殘不知親與故零落幾家完聚囬庭中影對酒起長歎死生兩莫測欲往書問難仰視雲中鴈安得託羽翰凄其衰謝踪有泪徒䦨干山中松筠地棄置誰與看河漢變夜色西風生早寒累觴不成醉百念摧肺肝送客齊化門東馬上即賦白楊多悲風黄葉滿行路荒溝寒水碧􅅍石且無數我興逺送别駐望生百慮欲往豈不懐畏此簡書故遥遥墟烟上歴歴鳴鴈度秋景倐巳短歸人駈車去勞歌一悽然囬首重愁莫陽曲薛義士旌表詩卷至正二年事十二年其里人趙時昭求題上天乆無雨南風日吹沙旱氣彌􅍵􅍵六月稲不花晉土素墝瘠如此歳食何上官方勸分輔也薛義土名起歎嗟發帑捐積鏹糴粟来連車吾郷忍溝壑哺爾萬口呀厚澤田里􅀍頌聲父老誇具備丗弗務征歛惟紛拏遂令活人功乃出一士家不知時有司視此無愧耶我作義薛詩好徳良可嘉願言講荒政生意當無涯前出軍五首前軍紅衲􅂁朱􅁝擊彭排後軍細鎧甲白羽攅鞴靫輜車左右馳萬馬擁長街送行動城郭斗酒飲同儕壯士當報國母為郷故懷鍜銕作佩刀磨石為箭鏃中軍把轅門前豎十尺纛朝上盧溝槗夕次泃河曲超乗既誇勇騁馬復齊足男兒不封侯百年同視肉昨日發萬軍今日發萬軍明日發萬軍梟􅀐来群群馬蹄所經過黄埃蕩成雲堆粮與作餘倒樹與作薪道途行者絶那得有居人大軍北庭来部伍各有屯放馬}
