  - {type: variant, offset: 21, length: 418, content: 翥撰翥字仲舉晉寧人至元初用隠逸薦召為國子助教分教上都尋退居淮東㑹修宋遼金三史起翰林國史院編修官累遷翰林學士承㫖致仕加河南行省平章政事給俸終身事蹟具元史本傳案金明昌承安間亦有張翥字曰仲陽劉祁歸潛志記其矮窻小户寒不到一爐香火四圍書西風了却黄花事不管安仁兩鬢秋諸句稱其浮艷諸書援引或誤為一人非也翥嘗從學於李存傳陸九淵之説詩法則受於仇逺得其音律之奥其詩清圓稳貼格調頗髙近體長短句極為當時所推然其古體亦伉爽可誦詞多諷諭往往得元白張王之遺亦非苟作王士禎居易錄曰蜕菴元末大家古今詩皆有法度無論子昻伯庸輩即范徳機揭曼碩未知伯仲何如其論當矣史稱翥遺稿不傅傳者有律詩樂府僅三卷王士禎則稱蜕菴集四卷明洪武三年錫山郎成抄本此本乃朱彛尊所蔵明初釋大杼手抄本前後有來復宗泐二人序跋蓋大杼與翥為方外交元末翥沒無嗣大杼取其遺稿歸江南别為選次而録存之考元音乾坤清氣集玉山雅集諸書所錄翥詩尚有出此集之外者則亦非全本也乾隆四十六年十總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀, SBCK: ''}
