  - {type: variant, offset: 44, length: 1, content: 乾, SBCK: 純碧涷無痕此生未了文章業何處堪㝷水竹村凖擬杏園携酒去滿前怊悵不須論院和御史李起巖明舉韻山繞神京海作池萬年天子夀無期諸生入對陳三䇿廣殿賔賢設九儀治道直超}
  - {type: variant, offset: 46, length: 0, content: '', SBCK: 大㝎人才不數宋淳熈老儒叨佐春官選竟日􅀙容出院遅春色先囬鴻鴈池郎君已及看花期磨崖欲作中興頌于澤􅀅行大射儀弱柳過風殊媚嫵輕雲籠日更光熈綉衣妙絶陽春曲自惜衰才属和遅次韻劉希曽師魯避兵病懷滄海珠沈劍去􅀌百年同夢化人都山雲時認䰟歸惡壟樹遥憐泪洒枯􅀒米仲由那復得弄烏莱子欲誰娱􅅍􅄐我亦傷心乆忍讀君詩向坐隅送四明道士陳士元敬止歸玄妙觀絳莭南歸越海涯四明山下有仙家羽人傳是中黄子閣史真成蔡少霞瓊笈瑣雲蔵玉籙白泥封竈養丹砂歩綱壇上空歌處想見神霄落花其師王致和新建宝閣曰通明内府以香旛賜之崔行之為求豐道士余剛中作林泉釣艇圖求題道人何處不天㳺時把漁竿放碧流一卷黄庭舩子上數椽白屋水􅁁頭磯空下峴雲猶夕鶴去􅀌山月自秋無限林泉如畫裏雨簑烟笠好歸休送崑山強仲賢照磨之南海元帥府看君才氣夐無双徃佐賔筵鎮海􅀖未報美人青玉案且盛壮士碧油幢喚舩椰葉迷蠻驛對酒蕉花映客窓别後平安須越使鴈飛不過嶺頭瀧送貴溪彭伯峕教授之髙州􅀩古學都門柳色緑紛紛惆悵南轅此送君嶺海驛程須給傳國朝字學要同文鼓来野廟迎蠻􅀑火燎山田落瘴雲藉有㯽榔与藤酒冷官聊復送朝曛樂平劉復􅀄隐居四詠景陽之父東臯南畒雨新晴杏花欲開菖葉生田婦蒸藜来午餉鄰翁荷鍤趂春畊烏犍引犢村村出布榖催人處處鳴歸與兒孫共閒夜一窓燈火讀書聲右畊田決決寒流底處㝷但傳幽響出空林石根雲竇元多罅風􅄜松篁共一音醉夢聒醒春枕熟詩懷清徹夜窓深中郎别有青溪曲更冩潺湲入素琴右聴泉醸法傳􅀅道士家春醪一味採松花常時野坐開新瓮幾度山行載後車忤客有誰焚醉日學仙何處飲流霞明朝又覓南鄰伴還汲清泉洗石窪右飲酒􅃞􅃞清波浮紫鱗一筇閑􅀝樹􅁁身我疑濠上漆園老誰識江頭漁丈人細草㽞連還可藉野鷗来徃自相親此中正得悠然樂何用扁舟把釣綸右觀魚成居竹有詩見􅀉因郯九成行用韻荅之歸隐山林嘆未能強支丗故力難勝少狂欲作􅇷風驃老退還如􅀍涷蠅賦客有愁逾萬斛兵厨無酒可三升與君㑹結東家社珎重衰年護寢興送燕山楊文周之汾州敎授􅀜河迢逓入汾陽暑雨􅀄収陌樹蒼名士多為文學􅁺此州今有狀元坊鴈来霜塞秋聲急鳥去烟臺野色荒試問西河讀書處因君石室重輝光怒浪蹙天摧漕舟疾風吹雨黒中㳅海神躍馬火明㓕龍伯連鰲山蕩浮安得􅂕查通漢使㫁無竒藥採瀛洲丈夫政要經艱險不􅀒平生亦壮逰景􅀄押粮至成山􅇜風沈米六萬石得小舟以免我憶括山老徴士卷霧飛談那可當髙致何如漆園吏幽居真是鄭公郷未能即去楚氛惡毎一相思雲樹長欲覓双魚問消息越来溪逺水茫茫鄭明徳匡山道士軀幹小豪氣直壓香爐峯池􅁁呪劒出金虎峡頂放舡飛白龍老我毎推詩俊逸何時相見話􅀙容散仙萬一煙塵外爲報巢雲􅀂个松于彦誠近報崑岡亦􅀍兵知君撫劍氣峥嶸夫差強弩風生海姑蔑􅀾旗雲遶}
