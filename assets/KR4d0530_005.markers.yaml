  - {type: variant, offset: 52, length: 0, content: '', SBCK: 千樹春紅照地明原隰使華来煥爛河山風物入經營馮君更冩千岩}
  - {type: variant, offset: 53, length: 0, content: '', SBCK: 與聴笙鸞夜夜聲白鷹愛此精神頋盻雄扶餘遥隔海濤東俊含金氣翎如雪直上秋雲骨有風絛鏇五坊禽獻後錦貂千􅀐獵圍中平原側目多狐兔安得真拳一擊空庚子元日早朝大明殿小飲自述玉殿齊班對正衙退朝冠盖滿東華青天徹曉無雲氣黄道囬春轉日車閑染彩毫題帖子喜􅀅緑酒汎椒花老身只待承平了携取来書問故家仙興騫林樹樹玉成圍皓鶴彩鵉中自飛玄石山人千日酒上清仙子六銖銖道心不動方歸樸物化無方緫入機自炷蕪香明月夜露壇東向禮􅂕威自悼并􅇷和二首十二樓空月自明一圎一}
