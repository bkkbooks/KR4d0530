  - {type: variant, offset: 7249, length: 607, content: 小㳺仙詞清華公子並騎龍直過蓬萊第一峰親見海中城闕好半栽玉樹半芙蓉五色煙中玉女牕鳯歌鸞舞一雙雙除是飛瓊方教得紫簫吹徹不成腔來不分明去不言紅椒花露濕妝痕巫娥已逐夢魂㫁十二碧峰愁暮猿月圃羣芬次第開步前紅露下瑤階摴蒱偶共真妃博賭得雙頭白燕釵道人寄我紫邏山時復賣藥來人間石潭薄晚有龍鬬滿谷濕雲無路還五嶽真官立帳前露蕪香靄落瓊筵夜深醮罷各歸去一一馬聲嘶上天美人臨水笑相邀自解羅巾擲作橋同覓雲間仙伴侣杏花壇上聽吹簫月帳新開蘂輦過桂花涼露洒天河雙星一夜叙離别狼藉碧蓮秋露多招韓伯清泛湖南園攜手賞芳紅喚取能歌盛小叢傳與春風留杏萼明朝開向曲聲中段橋春水綠初柔便有羣鳬來上㳺好借鴟夷盛酒去玉簫吹上畫船頭蜕菴集卷五蜕菴集跋右潞國張公詩集若干卷廬陵沙門大杼北山之所編集也先是潞公於元季多故之際薨於燕都由其無後北山為之經紀葬事未幾天兵北伐燕都不守北山取其遺藁歸江南凡選得九百首將刋板以行扵世或有問於余曰北山釋之有道者宜視身為外物而乃汲汲於故人詩集得非未能遺情乎余謂之曰至人不遺情古之髙僧猶不能免如梁慧約以苦行得道為帝王師而哭其亡友甚哀至賦詩曰我有兩行淚不落三十年今日為君盡併洒秋風前北山念潞公無後平日交友又皆異世淪謝懼其泯沒無傳故仗義而為之然亦何害於道其與約之情則一也當元統甲戌間余識潞公於金陵後㑹於燕都于錢塘盖三十餘年固非一日之好觀北山斯舉豈能無動於中謹書卷末如此若潞公之詩名震耀海内不俟余之稱美故勿論洪武十年冬天界善世禪寺住持天台釋宗泐識, SBCK: ''}
