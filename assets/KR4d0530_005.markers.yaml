  - {type: variant, offset: 111, length: 2, content: 羝羊, SBCK: 城夢中常苦不分明天上人間各有情桃葉竹枝無限思􅂕芝瑞露可憐生􅈍蘭謾織回文字鸚鵡猶傳響板聲欲得近音何處問風烟􅃒断武林城悼亡日是早題􅀞梅一幅夜夢梅花盛開有感剪水裁雲聚作花直敎顔色冠芳華一双仙子玉條脫三尺天家香辟邪南國好音􅀅過鴈西窓殘夢巳啼鴉年年此日傷春思忍把歸心賦落霞病中小兒舞䄂斈齋郎大女咲看旁鼓簧狂客有時来獵酒老夫無事坐焚香前家後家雜􅁔􅂘南斗北斗相低昻病卧經旬不出戸墻角青青春薺長遣興七十蛻翁衰病餘一室􅌂􅀂維摩居孔方無神可使􅀑毛穎巳秃不中書江湖天逺道塗断鼓柝街寒風雪􅀄糠紇明年恐未飽欲於何地托吾廬至後暴日火暖氈床擁病翁遣懷篇翰底求工視悲歌徒能壯斈坐禪僧要自空渇旦猶鳴天有雪爰居巳去海無風只留一段思郷意不見詩中見夢中九日書似北山上人先夜雷􅀨老年􅀹惜過芳時籬下黄花值閏遅夜雨有愁如濕絮}
  - {type: page-break, offset: 111, content: '', id: KR4d0530_SBCK_004-19b}
  - {type: page-break, offset: 111, content: '', id: KR4d0530_SBCK_004-20a}
  - {type: variant, offset: 114, length: 3, content: 牧罷陵, SBCK: 風無髪可吹􅁝勞䰟数数還郷夢往事茫茫感興詩滿腹精神渾减盡一杯誰与共􅁭期中秋望亭驛對月代祀北還月色滄波共渺茫驛亭雜坐看湖光仙家刻玉青蟾兔帝子吹笙白鳯凰芦葉好風生晚思桂花清露濕空凉囬查使者秋懷闊倒㵼銀河入酒觴春日小軒獨坐江南椶笋正時新滋味還思養病身暮雨過雲􅀄有電老鶯啼樹巳無春虚名晚合徒多累同輦生存僅数人净掃虚軒炷香坐只􅀅篇什擬心神清明日杏園獨坐底事東風太放顛為花渾廢夜深眠賞心不有閏三月老眼應虚春一年歌舞盡傳天上曲咲譚同是酒中仙歸時更愛東城道月在秋千影外圎長至日偕諸友遊故宫皇天有数混南􅀖組練長駈萬里江内井龍沉軍檄在西郊􅄦泣帝車降河開故道穿宫籞殿鏁秋塵暗佛幢欲問㒷亡遺老盡晚風鈴語白摐摐中秋雨明日晴明玩月有作今夕清光不􅀒公更無雲氣碍虚空晴遲一日秋才望看到三更月正中蟾兎影寒天下露魚龍魄動海生風故人别有蕉山約未放扁舟一鶴東正月九日夜雪甚寒雪後西山照眼青早寒微霰又飄零昨非未必今皆是衆醉何由我獨醒斈􅂐毎朝臨碧落有神長夜養黄庭􅀂為喚得瀛䑓侣相與吹簘上杳冥長至後一日小集張氏小軒留題金殿當}
