  - {type: indent, offset: 0, content: 　, id: KR4d0530_krp_005-bkkind1}
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 賢逺引奉簡一章時吕左丞歐丞旨司尚書繼亡故亡相看逐逝波思歸無路欲如何􅀅軍每咲檀公䇿朝士徒悲穆氏歌南海明珠来貢少中原健馬出征多先生似􅀃将髙舉不遣㝠鴻到罻羅題馮士啓士可蔵書堂不惜黄金為買書要令弦誦􅀍郷閭聖賢事業千年上經史文章萬}
  - {type: page-break, offset: 3, content: '', id: KR4d0530_SBCK_004-9a}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 餘借送詎論鴟有酒収蔵長愛螙無魚它時許下成精舍岳麓匡山恐未如分韻􅀲歩送司執中之江西憲府照磨山前古驛草䔥蕭候吏沙頭候畫橈采石晚風人渡急歴城煙樹鳥飛遥時平烽火沈江戍市早魚鹽散浦槗目送征帆謾相億秪􅀅􅄐恨􅀉囬潮分題投書渚送沙彦文架閣之江西髙人豈作置書郵盡棄函封向石頭故迹不随煙草没遺風長與大江流悲臺鷹下川雲暮别國龍回岳雨秋君過渚旁須檥棹題詩相􅀉莫沈浮分題􅀂耶溪送胡一中允文録事之紹興}
  - {type: indent, offset: 5, content: 　　　　　　　, id: KR4d0530_krp_005-bkkind2}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 雲溪水碧縈湾純浸蓬莱郡裏山金躍冶鑪龍巳化箭空仙的鶴長閑棹歌洲渚夫容外人在樓臺罨畫間唫賞捴輸賢録事樵風日暮送舟還􅀉題睢陽張文昭存齋之子山房結數楹静無塵累已攖寜此心炯炯同千載吾道皇皇有六經雨後儀刑山更好窓前意思草長青功夫要在存存熟便是齋居座右銘題四皓商山圖兵塵澒洞繞函􅀜不到商於六里間赤幟頻傳秦楚蹶白雲自與綺園閑龍虵陸起嗟何在鴻鵠冥飛竟不還千載髙風無復見空餘芝草滿空山玉山墨工魏}
  - {type: page-break, offset: 5, content: '', id: KR4d0530_SBCK_004-9b}
