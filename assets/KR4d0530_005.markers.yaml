  - {type: variant, offset: 854, length: 3, content: 已蔥蔥, SBCK: 巳葱葱過李陵䑓分敎上京路出桓州山縵迴僕夫指是李陵䑓樹遮望眼仍相弔雲結郷愁尚未開海上抵羊秋牧罷陵頭石馬夜嘶哀英雄不死非無意空遣歸魂故國来雪中早朝北風吹雪浩漫漫曉出津槗立馬看春入上林花樹早水連平地海波乾金城万雉微茫濕月闕双龍贔屓寒今日天顔知有喜紫宸朝下散千官夕次楊村烟中帆影落軻峩繫䌫沙邊巳夜過風驟数声来海樹月移半暈入天河得歸始斍形神王望逺空留感慨多坐聴舟人語明發芦花秋水正増波西興渡携家迢逓過西陵江霧微消海日昇帆影畫驚沙上鴈舩声斗落頭氷果園霜後􅀄分橘漁浦潮平各下罾歳晚不思行路倦剡中佳㒷正堪乗}
