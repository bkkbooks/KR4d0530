  - {type: variant, offset: 13, length: 0, content: '', SBCK: 魏郎應得庭珪法未數松泉林嵩與}
  - {type: variant, offset: 14, length: 0, content: '', SBCK: 堂吳宇萬杵熟􅑟香入劑一螺􅀧漆黒生光論材合致圖書府㽞價争傾翰墨塲我有詩嚢須剰襲草玄歸去老山房山友爲金閣山田道士作山人愛与山為友住得山前地幾双為納白雲長掃室欲延青嶂别開窓嵐}
  - {type: page-break, offset: 14, content: '', id: KR4d0530_SBCK_004-10a}
  - {type: variant, offset: 15, length: 1, content: 早, SBCK: 笻跡粘苔磴風外琴聲瀉石缸應是烟霞數仙侣月明時復下旌幢望江是􅀊台越飢寒潮巳退大江空不見来鷗與去鴻半嶺彩霞􅅶落日一川紅樹照西風魯連蹈海英􅂕逺王粲登樓感慨同徑欲投竿㑹稽石得魚為飽制河東􅀊晏竒寒癡坐氍毹􅀋凍蠅霜風吹折布衣稜爐翻􅀫火随􅁅䧟杯覆燖湯到地凝虎豹凍埋山盡雪魚龍寒縮水連氷濁醪最觧強人意吟短西窓一寸燈􅀉荅莫惟賢景行故人音問乆相踈忽􅀉新詩良起予半捲長牋欹枕讀盡拈佳句繞窓書此生舘閣嗟留滯何日兵戈見掃除歸覓南屏山下隱酒杯茶竈共閑居荅馬易之編脩病中作喜君近疾已平安楮帳緜衾且避寒飯顆任嘲詩骨瘦糟丘能遣客懷寛天街鐘罷}
