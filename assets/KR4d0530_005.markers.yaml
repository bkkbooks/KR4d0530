  - {type: variant, offset: 24, length: 0, content: '', SBCK: 􅀉成居竹黄舜臣歳月峥嶸春又来歸心遥在故園梅十年厭見風塵惡萬事徒增耳目哀大漠平鋪沙雪去逺山直枕海雲開近懷欲報成夫子強起題詩對酒盃一見君詩倍黯然薊南吳北各風煙故人漸似星􅀅}
  - {type: variant, offset: 25, length: 0, content: '', SBCK: 塵丗真成海變田桂在謾吟招隐曲鶴歸還記去家年虎丘山水知無恙有待先期置酒泉至日微雪家人盡上􅃁獨坐小酌忽忽又逢長至日此心寒似琯中􅁅尋思一日老一日得飲數杯還數杯鵲知太歳改巢去雨􅀍北風吹雪来醢兔羞鴽良不惡餕餘聊遣凍顔開送普顔彦仁都事還蜀兼柬文時可郎中送君一􅀐發長安王事方殷肯避難使者好㝷巴道路遺民思覩漢衣冠江来灌口聲􅀄放雲接峩眉翠不乾為報郎中勉勛業逺音時遣破憂端題括士朱榘方火五松隐君業在括溪東種就長松翠􅀝空一夕蛟龍起春雨滿山鱗甲動天風也知造物生来異未許煙霞畫得同想見青田舊巢鶴時時来唳白雲中吾廬吾廬幽似野人家時􅀝南軒玩物華亦有君臣槐腹蟻也能鼓吹沼中蛙鄰翁来送新篘酒堂吏求抄舊草麻早晚乞骸尋舊隐不妨高卧傲烟霞歙江希仲罕代自雄新二州警曹話其風土為賦越鳥巢南漲海東地兼夷夏氣惟雄洞深屋壘曽厓上龍險舩行亂石中春樹濕雲生桂蠧瘴茅經雨落沙蟲宦游最數蠻荒惡羡子歸来面更紅病起偶題丁未閱丗悠悠八十餘此身天地一蘧廬季鷹只愛生前酒司馬空㽞後丗書野散未歸鳴澤鴈水煩徒噞在淵魚可堪濩落風塵裏兩髩霜毛頓覺踈飲故相園宅相君池舘舊撝訶今日還容野老過裂地商於真已矣積金郿塢竟如何胡僧謾演寅朝偈女􅀑空悲子夜歌起向春風酹盃酒青蕪滿地雨紅多監中暮歸時廣帥進鰐魚放之潞河滿林木皆梟鳴日夜不止己亥歳也扶桑銅柱􅀂為標南望兵氛乆未銷秋水漲河􅀄放鰐晚煙籠樹盡鳴梟枕戈未睹栖於越舞羽曽聞格有苗河北諸侯捴戎翰好宣忠力佐王朝次韻閩僧秀嵓􅀉竹溪僧峯北峯南法界中丈藜来往夕陽鍾時過花洞逢㳺鹿夜呪珠臺放釣龍七字詩才清似水三生骨相古于松羡師方外渾無事只箇蒲團又過冬望入南雲無去鴻馮誰持餉一缾空詩来萬里燕臺下寺在三山冶縣東戯瓦室中惟見水掛旛窓外自揺風我今也擬辭簮紱去作嵓居三老翁送監生聶讓省兄山後譲父死王事書劍翩翩送子歸原頭想見脊今飛北風􅀜路雪雲暗落日客亭烟火微血立忠臣頭上髪線㽞慈母手中衣老夫惟有銷兵望早遣平安到虎闈東坡淮口墨跡卷後有黄䇿詩䇿號随縁子潮落潮生沙岸頭布帆来往幾經秋山川如故人何在天地無情水自流敗壘荒墟非昔畫野煙寒照捴新愁只應千古清淮月曽照東坡此喚舟壽許集賢可用予同年少七月圭塘諭徳真壽星斑衣戯舞滿中庭同年咲我雌爲甲上壽看君老復丁壷有仙公新授藥厨㽞長史舊傳經它時􅀂許相依住願割西山一半青病瘡少愈睹桃樹含蕚少遣春思􅀫隂􅀄觧見朝暾拄杖扶持強}
