  - {type: variant, offset: 48, length: 3, content: 雉㣲茫, SBCK: 竅風聲皆地􅄜一窩春意自天根老夫只待干戈息歸問西湖水竹村送偰元魯降香南岳南海天開朱岳奠炎方地入南􅈚接大荒使者肅脩時典祀神明冝護國封疆仙臺雲散峯巒碧瘴嶺春囬草木香珎重詞臣致誠禱願消昏癘降休祥試院泰甫兵部既荅和拙作且示佳章僕以汨扵校文遂稽貂續仍韻見趣所考既就格輙綴四首録奉一咲堆牀朱卷考􅀄分衛士傳呼夜瑣門泛駕巳多東野馬摶扶應有北溟鯤熟衣乍喚寒猶薄倦枕􅅻馮睡易昏願冋斯文求俊乂大廷行對帝王尊樓頭㬪鼓巳三嚴起聴秋聲滿四簷山葉落頻風繞樹露蛬吟苦月當簾烟寒銅獸催香換漏促金徒報箭添咲我元無食肉相只思蓴鱠薦吴鹽倦眼空花漫不分偶隨群彦集金門扁舟只擬􅇷張翰一壑還須置謝鯤楓葉舊詩多冷落梅花歸夢幾黄昏与君此去如休睱莫厭相過共酒尊詩律輸君敢闘嚴強摩老眼傍風簷鵠􅂁夜散遥持燭席舎朝開盡徹簾乆悟物機忘出入時存神火驗抽􅄈明當喚取弹筝手與唱新聲阿鵲鹽九月二日掲曉僕以朔旦始得間復成二詩録奉泰甫侍郎思齊御史本中都事道明敏文伯崇有志諸僚友觧送推君藻鑑分􅁄圍明發喜開門荆人自許山多玉莊叟虚談海有鯤過鴈風髙秋索索護霜雲薄曉昏昏郷来曽預春闈考猶記君王賜上尊西風漸急早寒嚴曉露俄晞日在簷滿鼎松聲烹活火半鈎花影捲踈簾菊黄又報秋期近髮白空驚老態􅄈未得山中覓茅屋去修丹竈養紅鹽汶上早行圖上清張道士冩絳莭前駈海日生川囬巳見汶陽城數峯曉翠和雲}
