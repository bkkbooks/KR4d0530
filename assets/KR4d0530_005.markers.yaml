  - {type: variant, offset: 920, length: 5332, content: 痕十一月六日大明殿賀清祀禮成大明宫殿彩雲間花底㣲風響佩環陛㦸九重周虎士御筵咫尺望龍顔犬牙磐石諸侯國豹尾鈎陳百辟班漏下五門朝退晚日邊佳氣滿西山存道元帥師宗感時及陡遡山竢刀寨入貢次韻二詩送歸關戍徼外頻傳羽檄飛將軍三起著戎衣空山狐兔無藏窟平陸龍蛇有殺機已見趙佗知漢徳更令孟獲識天威此行整頓蠻荒了箐雨瀘煙好賦歸羣蠻連嵗閧滇中陡遡山前喜挂弓萬里籌邊頻却敵半生憂國早成翁塞垣烽火方無警幕府文書已上功奏賦歸來五雲閣漢庭不獨數嚴終送謨侍者還江陰禪裓無塵錫杖青一龕天竺更南屏楊枝徧洒瓶中水貝葉時繙笈内經舊業池菱秋漠漠歸舟江樹曉冥冥今朝又作蕪城别何處鐘聲入夜聽寄陳敬初郯九成憶昨閶門綰栁條逺煩相送過楓橋夕陽陌上東西路春水江頭早晚潮老境此心惟白社英年何處不青霄詩林别後應俱進時遣郵筒慰寂寥寄俊上人不見俊公今十年武林留偈竟茫然苕溪寺已空塵刼蒲室燈還有别傳晒衲石根隨夕照題詩竹裏濕秋煙何時近一牛鳴地老去山中伴夜禪寄智及上人故人逺在越江南何日相尋過海帆少借禪房一十笏全繙經藏五千函寒爐撥火冝煨芋夜月裁詩定倚杉儗結願香歸未得碧蓮花老補陀巖寄見心上人次韻自入赤墀青瑣間舊逰禪侣亦闌珊青山只憶招提境白首初辭供奉班馬為空羣猶蹻蹻鳥能求友自關關終期一舸相尋去知在姚溪第幾灣見說錢塘别築城凄涼風景若為情湖堤栁盡曽㳺路石壁苔荒舊刻名老我無能如燭武何人可飲勝公榮沃洲勝㑹還容續即擬山中隠計成懐翟文中君留越甸長懷我我在京華幾夢君佳句每從愁裏得逺書忽向病中聞船來海口人爭㟁兵滿淮南火照雲今日臨風倍凄斷白頭清淚共紛紛江山覽勝樓白雲東南相蕩浮中有隠者之飛樓千峰影落華蓋晚一水寒通彭蠡秋鮫人機杼或聞響山鬼窟宅疑藏幽為問仙家借黄鵠我欲題詩來上頭寄别陳渭叟空山花發春事幽道人結屋居上頭胡麻隨水有時得杏子成林誰敢偷金銀氣雜丹光現澗壑響帶松聲流寄語黄鶴一相别獨立蒼茫歌逺逰遊天竺寺石梁濺水濕蒼苔陰洞傍穿澗底回殿閣金銀從地湧山林圖畫自天開龍隨僧到分雲住猿任人呼下樹來逰興未䦨斜日盡馬頭呼酒尚徘徊西湖之西天竺深天香滿風多桂林老猿引子下髙樹流水與雲來逺岑上方已變刼灰黒古磵長帶秋嵐陰清輝娛人且歸去後夜明月來重尋通𤣥觀内侍劉敖修真結菴於此髙宗御書通𤣥二字榜之賜名能真羽蓋翩翩下九重江鄉秋晚滯仙蹤信傳真府憑青鳥劍舞瑤臺走碧龍頃刻風雲興五嶽須臾雨澤慰三農殷勤欲問參同契雙舄遄飛未易從題張外史馬塍新居窈窕丹房古磵阿長松脩竹繞層坡桃園隠者時相遇茒洞仙人夜或過沆瀣杯寒供曉食青㝠笙響答空歌白雲浮出池痕滿知是龍泓宿雨多登六和塔江上浮屠快一登望中烟㟁是西興日生滄海横流外人立青冥最上層潮落逺沙羣下鴈樹欹髙壁獨巢鷹百年等事豪華盡怕聽興亡懶問僧上清薛茂𢎞虞内翰以鶴齋號之為賦羽人新得虞翁號歸築衡茒並翠㣲丹室有風鳴夜帳斗壇多露濕秋衣畫中昨者薛少保華表當年丁令威直擬身形鍊相似玉笙吹上白雲飛登金山吞海亭了翁韻賦危亭突兀戴鼇頭俯視滄溟一勺浮龍伯衣冠藏下府梵王臺殿起中流扶桑夜色三山日灧澦江聲萬里秋老我惜無吞海句但磨崕石記曽逰寄成居竹隠居青袍朝士困京華此老蕭閒竹滿家山壓窮愁詩强項海枯渇肺酒槎牙商巖未採芝如草彭澤將歸菊有花孤負江頭理漁事短篷春雨夢漚沙題唐子華畫王師魯尚書石田山房秋水橋邊紅葉林數家茒屋傍青岑岡頭種玉朝煙煖隴上鋤雲宿雨深摩詰輞川宜入畫少陵韋曲自成吟束薪嵗晚來同煑應許山中道士尋賦中書左曹小瀛洲東曹地迥集名郎宛是仙家紫翠房閶闔上通天咫尺蓬萊移出海中央金波日暖浮鳷鵲玉樹春濃下鳯凰幾度夢回清夜直此身如在五雲鄉三月朢日逰虎丘寺題小吳軒海湧峰前雲樹盤佛宫飛閣出㠝岏虎來古冢金精白龍卧秋池劍影寒禪老説空留壊石鬼仙題雨下虚壇憑髙不盡登臨興更借西山晚翠看題舒嚕存道元帥平師宗三州卷後不用牙璋逺出師將軍憑軾下邊陲僰酋爭歃金盤血漢使髙懸玉帳旗司馬文章傳太史武侯威略震南夷只今父老蘭滄上擬刻寧蠻第一碑送李孟端奉祀天妃祠北歸萬里函香出漢廷楚江南下越山青祠光夜現天妃火騎氣秋瞻使者星三島鳯麟環碧海九關虎豹隔青冥君才冝掌絲綸美為述文章襲六經虚齋贈四明王道士髙齋聞在荔枝林曲几方牀宴坐深大道無形元寓器至人於物不容心三山雲氣通寥泬一室天光入照臨我欲壺中收藥去石田瑤草共相尋呉江坐倚風檣看太湖波濤澒洞半三呉寒通上畍咸池氣黑入中流水伯都雲暗蛟龍應起立雪深鴻鴈自驚呼望亭有酒宵堪醉買得漁家一尺鱸寄題杜原父懐友軒尺五城南近世紛移家本並武夷君他年功業誰青史此日山林自白雲石氣曉侵書幌濕溪聲時雜棹歌聞故人已有同棲約仗䇿行穿虎豹羣題黄州管氏懐坡堂玉局仙人雲錦裳騎龍一夕下黄岡峩峩冠蓋生陳迹落落江山有耿光謫宦六年名益重懐賢千古意何長君侯此舉誠佳事未數儋州載酒堂瓜州與成居竹王克純登江風山月亭風起西津斷客艘熊家亭上得憑髙雲移鳥影沈江樹雨帶龍腥出海濤開闢自天留壯觀登臨如我老英豪放舟擬就金山宿一夜清寒襲錦袍奉答新仲銘禪師呉楓初冷鴈連天夢在江南野水邊詞客欲歸嗟老大美人不嫁惜嬋娟豺狼正爾當官道龍象於今護法筵我識新公老禪衲一燈蒲室是真傳贈馬易之萬里征帆渡越江兹遊奇觀世無雙海中蓬島金銀闕天上玉堂雲霧牕吾道政須求柱石詩壇從此避旌幢青林白谷歸休地懐抱因君得暫降氷蟾為金齊賢賦老蟾素魄稟金精千嵗玻瓈幻結成明水夜零隂隧凍丹書秋滿肉芝生腹凝寒露藏虚白影入銀河浴太清擬問姮娥乞靈藥與君騎向廣寒行呉江王氏水雲深處潮平天濶開詩境冝著幽亭俯碧潯閒許釣徒分半席靜饒沙鳥占全林青連河漢秋無極黑入菰蒲晚易陰更好扁舟明月夜醉攜長笛冩龍吟送式無外歸髙麗三韓山水有靈暉秀出斯人了佛機岳寺禪餘留偈别王城齋罷戴經歸瓶收滄海降龍入錫度秋空近鶴飛只恐故林雲卧後一鐙秋老木棉衣散木軒為陳則虚髙士賦散木軒中一散仙形雖如槁氣蒼然路松正自為明誤社櫟還因不用全梁棟無心聊閱世山林有地可長年碧牕日靜忘機事悟得南華第四篇送宋本禮部狀元調選還京聖主求賢禮數崇策名髙步冠南宫乗槎析木天津上奏賦甘泉鹵簿中染翰墨凝仙掌露護衣香散御爐風只今帝業熈千載正待儒臣黼黻功春日懐柯博士建章鶯囀曙光初上直門開漏㸃疎花擁西清森仗衞星臨東壁煥圖書漢庭長者多推轂楚國騷人早卜居為問五雲仙閣吏綵毫春咏近何如題張性之提舉靜學齋隠者城南水竹居蕭然一室白生虚傳聲吳㑹名家後探道農黄邃古初日影上簾晴晒藥露涼侵戸夜翻書元知靜裏工夫大欲乞靈方一起予送劉侯赴大理萬里南雲入馬蹄蠻酋迎拜過阿黎將軍拔劍歌𤣥武使者乗軺祀碧雞六詔星文開井絡兩關鳥道揷天梯聖朝謀帥先詩禮努力籌邊息鼓鼙送柯敬仲之京給事先皇禁邸中歸來空抱小臣弓魚龍夜落黄河水鴻鴈秋征白霫風郢國善歌推宋玉漢庭能賦待揚雄如君必用才優俊重見金閨尺籍通題逺碧樓江上樓居景自清闌干朝暮傍陰晴數峰殘雨雲間濕一水斜陽島外明樹隔釣歌分浦出風移帆影近牕行綵衣白髪冝春酒更喜田園樂事成二月朢日湖上值風疾風吹浪滿重湖雲掩西山一半無黄帽牽船依㟁過蒼頭按鶻繞林呼鶯花世界如春夢煙雨樓臺是畫圖童穉兹逰今白髪斷橋斜日重踟蹰寄觀志能照磨鼇背三山最上峰美人手把玉芙蓉仗圍泰畤傳宵燎漏下層城踏曉鐘錦瑟無塵飛刻鴈金壺有墨洒雕龍老懐已託王郎道早晚歸營北澗松十二月二十七日雪寒奉㫖賜宴史局聖主恩榮六賜筵玉音躬聽相臣宣史裁東觀何殊漢人在瀛洲總是仙御酒如春浮浩蕩宫花與雪鬬嬋娟微生此日沾休澤祇望丹宸祝萬年初度日病起不能飲諸友載酒集書樓偶賦見意細雨東風泛曉煙草痕青過竹籬邊春當揆度靈均日老及知非伯玉年病眼紛紜花似霧吟懐跌宕酒如泉諸君有意留迂叟擬買雷塘百畝田五言長體題辜徳中瑞竹亭江館當西澨山堂向北隅舊樊聊補壊新竹復嘘枯嘉此神明勞森然雨露濡賢才世閩海之子冠洪都生意原無息休徴固有符渾涵由地脉騰達即天衢故業詩書逺能官俊造須材稱人似玉賔待鳳將雛照映丘園重流傳賦咏俱擬同嘉樹傳來作瑞筠圖送成禮部誼叔察訪守令河南山東厯數開千載明良㑹一時朝廷嚴守令宵旰為黔黎南服方多故東州復阻飢郎官膺簡拔使者出詢諮此命於今重如君衆論推直承亷察往肯作畏難辭靈雨隨華轂流風度綵旗草兼驄一色栁與轡同絲梁宋分淮甸青齊並海涯政苛嗟虎猛民散念鴻離罷軟寧勝任奸貪只自私中牟因雉見單父得魚知或有隳其職誰能慎所司張絃從急緩朗鑒各妍媸治道誠先務皇心實在兹俱為良吏選足慰逺人思空濶青雲步孤髙玉樹姿暫傾冠蓋餞行赴簡書期事業懸鐘鼎光華映羽儀歸來前席問請入史臣詞送彭大年真人祀東海東嶽東鎮國典崇常祀名山仰岱宗聖王欽所遣使者肅惟恭禮自唐虞秩神知造化鍾天門開􅏭嵲日觀上巃嵸零雨行清道浮雲起盪胸宿齋分鶴帳朝饗發鯨鐘吹溢安歌進靈來衞仗從御香分晻靄佩玉響瑽瑢美薦懐椒糈精誠奠璧琮東流瞻巨海列鎮到諸峰瀛島遙相望仙人或此逢岳祇調虎豹水怪帖魚龍星墜祠光白煙涵瑞氣濃振衣臨濬壑飛蓋拂長松庶物消餘沴洪河復故蹤年祥報齊魯地寳出雷澭嘉澤羣方洽明時百職供回車冝訪問弭節可従容世祚祈千億元功賛九重禁庭歸福處有待頌東封寄題顧仲瑛玉山詩一百韻治理逢熈運欽明仰聖皇至仁侔覆載上德配軒唐大業勤宏濟元臣協賛襄賢科收俊造庭實璨圭璋入貢徠符拔儀韶下鳳凰普天均雨露絶域總梯航每念京師食遙需漕府糧神妃所芘護颶母敢飛揚前隊貔貅發先驅罔象藏冷颷鼓萬舵朱火耀連檣帝敇申嘉惠祠官按典常賞勞兼湛濊時賜省臣漕臣酒幣旌烈特巍煌僕本中林士久陪東觀郎遂叨乗驛傳徧與禮靈場簜節雕龍飾華旗畫隼翔衝流度鄞越陟險過泉漳緬彼湄洲嶼嶄然鉅海洋蛟穿崕破碎鯨蹴浪撞搪震鼓轟空濶奔帆截渺茫島衣迎使舸瘴霧避天香嘉薦歆芬苾陰功助翕張精誠致工祝景貺答禎祥賈舶傾諸國輿圖奄八荒身雖距閩嶠志已畧扶桑裴洞三生夢温陵十月涼兹遊平昔冠夙願一朝償女髻皆殊製蠻音各異鄉地偏宜荔子人最貴梹榔釀鹿肥漂酒蟯蠔液滿房招賢簇車騎揮掃積縑緗窮臘纔竣事暄春始趣裝劍津傳警急汀賊起狓猖獠砦旋戡定藩垣慎扞防思親彌切切行役更遑遑狐死嗟奚首龜占喜允臧封崇晏塢内木拱計峰旁仲春至杭卜山于武康克襄先藏塢在計籌山下即予新墳薄宦祇牽率孤蹤易感傷暫為江左客誰洒墓頭漿逝矣川塗阻凄其涕淚滂南轅恰啼鴂北路復鳴螿粤若婁東邑由來漢太倉機雲存故宅吳㑹畫雄疆遯跡晞髙士謂有梁鴻山遺風挹讓王厥田尤沃衍比歳適豐穰老我張承吉新知顧辟彊聞君占形勝築室恣徜徉鐵笛留嚴客青錢乞泰娘杏韉紅叱撥蘭柱繡鴛鴦闢徑通佳處栽桃帶栁塘脩梧羽葆蓋美竹碧琳瑯列岫濃螺色澄湖淨鏡光鳥邊嵐漠漠魚外水泱泱鶴駐逰仙館鸞鳴種玉岡投竿釣月檻隠几讀書牀雲結芝英秀花團桂樹蒼舫齋青篠箔漁舍綠苔牆棟宇環相屬園池鬱在望直疑金谷墅還似輞川莊未獲窺詩境相邀到草堂開樽羅綺饌侑席出紅妝婉態隨歌板齊容綴舞行新聲綠水曲穠豔大隄倡宛轉纒頭錦淋漓蘸甲觴弦鬆調寳柱笙咽炙銀簧倚䇿驂聨轡鈎簾燭遶廊僰僮供紫蟹庖史進黄麞卜晝寧辭醉留歡正未央分司莫驚坐刺史欲無腸是集俱才彦虚懐共頡頏珠璣散咳吐律吕應宫商鄭老經術富于仙詞翰長琦初燈並照郯華驥同驤璧色牋毫健吟篇綵繪張拈題爭㸃筆得句倐盈箱勁敵千鈞彀精逾百錬鋼語奇凌鮑謝體變失盧楊瑛甫早有譽亨衢那可量摶扶看怒翼騰達待蜚黄旣篤朋情重仍持雅道昌披襟視肝胆刻琰播文章永契欣依託衰蹤頓激昻盍簮承偉餞授簡藉餘芳自鄙㝠搜拙徒令屬對忙端如享敝帚何異貯奚囊談笑聊堪接賡酬曷足當吾猶鄶以下公等楚之良瓠落渾無用艱難寔備嘗擬為覂駕馬竟作觸藩羊筋力頻馳騖功名幾慨慷不嫌成晚合深幸際時康邂逅因斯㑹暌違又一方匆匆把别袂眷眷賦河梁鴻鴈清秋日蒹葭昨夜霜關山凝朔氣星斗麗寒芒疾病家多難歸休嵗亦陽苦心甘寂寞短髪任蒼浪漏屋愁荷蓋塵衣惜蕙纕杜陵非固懶賀監豈真狂回首長追憶緘詩逺寄將乾坤浩今古此意詎能忘元日靈臺官以初四日己酉時享遂以嵗除日受誓於中書乃免朝賀紀詩八韻清廟當春享彤庭放早朝扈鳴更厯正龍集轉寅杓瑞日開黄道卿雲映絳霄八方周象譯九奏舜簫韶爐暖香生术杯紅酒泛椒新符鬱壘換候琯女夷調有待寛書下行看戰甲銷衰年今可隠歸老故山樵分題送京兆趙耕師尹之臨安路帥府照磨得通海湖萬頃平湖碧浮光映泬㵳秀山純漫影滄海暗通潮瘴黒雲相蕩春澄雪未銷潤沾蒙部濶川合洱河遙秔稻收田利蒲魚入市饒雨歸龍氣濕晴浴鶴媒驕夾樹迷深箐流花落野椒氊來蠻婦漂船放僰僮橈帥府開荒甸英才屈下僚此心同逝水日夜向東朝送劉貞庭總管之嘉禾御史宣徽院判牧守膺民寄循良不數公使君新建隼御史近乗驄内府聲華著専城控制雄老成歸物望清切簡宸衷紫綬盤銅虎朱旛擁畫熊焚香迎父老騎竹走兒童檇李名藩古勾吳地利通粤從師次後俱在震隣中水暗臺隍月雲寒鼓角風蠻氛猶漲黑戰血未消紅聖主方圖治台司亦即戎頻煩綸綍下次第甲兵空公等宜宣力王臣固匪躬關防先武備國計務農功黄霸徴當最陽城考欲同蒼旻飄勁氣白日照精忠萬象天樞北三山海市東旱龍俄作雨時喜得雨故及陽鳯已鳴桐善政風須變虚襟理自融平生經世志要似節軒翁福唐張氏永思堂自昔閩多士吾宗世有人共聞兩孝子永慕百年親僾若音容在巍然棟宇新秋筵仍几杖温鼎自淳珍草娯稱觴地花迎戲綵辰流芳變春雨精思動秋旻風教關民俗文章藉史臣聲詩播休美正為盛時陳成居竹有書報甥傅君亮至揚州言其家與外表舅呉仲益及婦家二叔學生韓與玉全家無恙喜甚有懐始得平安信渾紓悵望心爭看尺素字絶勝萬黄金危甚初秋警幾於平陸沈蜂屯昱嶺上豨突浙江潯縦爾驅鋒鏑能逃磔斧砧官軍俄克復亂首即成擒城市半焦土親朋多好音已知生有路蹔免淚沾襟老子歡殊劇家人酒快斟狂歌敲手板醉倒脱頭簮黎庶思甦息皇天願照臨國威雖震叠兵氣尚蕭森自顧形骸累仍嗟嵗月侵懐歸畏吏議承乏念官箴虎豹關非逺龍蛇水更深豈無黄石略虚遣白頭吟落日耿殘雪浮雲生夕陰枯萁聞齕馬疎樹見棲禽松竹荒須理茒茨破可尋前身本道士不是戀山林, SBCK: 㾗}
