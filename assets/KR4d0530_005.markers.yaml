  - {type: line-break, offset: 0, content: '', id: KR4d0530_WYG_005-1a01}
  - {type: variant, offset: 0, length: 2, content: 欽定, SBCK: 憶廣陵舊事乙未君王昔在鎮南年賔客風流日滿筵上國旌旗分一半層臺歌舞􅀫三千豪華遽盡悲離􅁰形勝空存􅃤暮煙多少楚魂歸未得江流無際海連天懐清源洞舊游時方兵後漫漫漲海際天涯萬里乗来使者槎紫澤重㝷仙客洞碧山長醉故侯家人多熟酒燒藤葉市有生蠻賣象牙安得夢中時化蝶翩翩飛向刺桐花􅀉副樞董摶霄孟起時屯濟南王師前後壓瀛河萬里風雲入盪摩晉帥先宜謀郤縠趙人思欲用㢘頗枚衘突􅀐宵傳令鼓發縣門曉擁戈共待􅀅軍白羽扇歸来莫府上功多􅀉野菴察罕平章時攻淄鄆聖主中興大業難元戎報國寸心丹軍中諸將驚韓信天下蒼生望謝安露布北来兵氣盛樓船南渡海波寒擬􅀅舊直詞林筆細傳成功後丗看大軍下濟南総戎十萬銕鷂子殪賊一双金僕姑白日照開花不注􅅍雲飛盡大明湖数年父老囬生氣千里山川復舊圖巳喜武威平汴兖可傾東海洗兵無哀孝子夏永慶没海救父父出慶死年二十一翁已生全兒隕軀投文我欲詰天吳一時肝膽寧知死萬頃波濤視􅀂無骨塟夜泉鯨穴冷䰟歸故國蜃雲􅀌自今孝子流風在直與扶桑水到枯雲州龍門鎮韓母劉孝莭卷韓家門外立双楹丹染旌書照路明此媪何如陶母傳諸郎真是董生行春泉躍茗饒嘉味繞樹啼烏有喜聲孝莭従来貧始見秦臺那用築懐清真㝎王莭婦習氏青春忽掩鏡鸑悲女莭生全死不辭夫目九泉無瞑日妾身百􅀊有歸時天髙地厚心如石女嫁男婚髪巳絲東􅀚只今多直筆爲書青簡配桓􅊔上京睹陳渭叟􅀉友書聲及鄙人賦以荅之其詩曰紫雲編巳刋}
