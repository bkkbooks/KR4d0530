  - {type: page-break, offset: 0, content: '', id: KR4d0530_SBCK_004-3b}
  - {type: variant, offset: 3, length: 2, content: 庫全, SBCK: 卷忽憶江南古荘叟自號釣竿歸去拂􅃢瑚藥爐已熄勾庚火}
  - {type: variant, offset: 6, length: 2, content: 蜕菴, SBCK: 箧閑抛遁甲符欲与陳陶同啖鮓秪令張翰逺思鱸不知别後詩多少刋到雲編戊巳無不見故人今十載平安喜得上京書頋我真吟紇干雀羡君閒釣冨春魚山房夜雨青燈外沙塞秋風白鴈􅀄終儗携琴隠湖曲一官垂老欲何如授􅃏天子臨軒授􅃏頻東南何處不紅巾銕衣逺道三軍老白骨中原萬􅀑新烈士精􅂕虹貫日仙家談咲海揚塵只􅀅滿眼凄凉淚哭盡平生幾故人左丞􅀓夢臣歸老汾曲賦以壽之六朝名徳仰巍巍未許家園乆息機霖雨帝方思汝作衮衣人更望公歸南山一柱標中土左轄三星拱太微欲向賔筵頌眉壽寸心遥與白雲飛王􅁇學㢘使遷南臺侍御史詩以賀之天上歸来錦作􅂁幾陪春色醉仙桃銀河有路惟通鵲碧海無山不戴鰲卿月又臨仙掌動客星偏傍釣臺高廣陵此去金陵近擬拂塵埃望莭旄送西江胡允中之桃温萬户府學正遼水窮􅁁牟盖東鎮人今始識儒宫詩書直化三韓逺文􅁤須令萬國同隼度塞雲秋有雪鼇翻海浪晝多風知君囬首神州路一髪青山落照中余伯疇歸浙東簡郡守王居敬四明㳺客住京都旅舎青燈照影􅀌家信十年黄耳犬郷心一夜白頭烏却携長鋏辭金水直挂輕颿到鑑湖為問蠡吾王太守别来安穏有書無􅀉逹兼善經歴柯敬仲博士心憐旅寓各西東長憶樽前􅀏語同故國魚龍滄海上僊家鷄犬白雲中百年人物無多見一代文章有至公䓁是不禁惆悵事鬂絲黄葉共秋風宗人鳴善􅀅還武昌詩以叙別武昌城中官柳隂廣陵行客動歸心衣冠南渡悲豪傑江漢東流変古今多病馬卿㳺巳倦能詩杜老律尤深洞庭明月如相憶為寫清愁入楚吟次倪元鎮張伯雨錫山唱和之作鶴在青林鳯在阿騷人行處有吟窩西風落木秋来早南國浮雲日暮多欲賦朱華臨鄴水可堪白芷怨湘波期君不􅀒湖山約来聴吾儂襖靄歌荅謝看雲宗師壽帙綺叚之贈自信平生有道縁頻煩白鶴􅀉瑶牋錦分帝子機中織詩入真人誥内編予詩亦在刻中弱水蓬莱三萬里慶雲閶闔九重天擬抽玉刺􅀙飇御一到環樞問列仙送涂茂才北遊黄河十月巳流氷暫觧行裝駐廣陵逆旅壮懷銷斗酒故山歸夢入孤灯千金燕市方永馬萬里天池欲徙朋㑹是公卿有知已孝廉船上覓張慿荅韓伯清練溪見􅀉乆慙簮紱趋文舘擬問田園歸武林忼慨謾論當丗事衰遲空􅀒壮年心忘機白鳥何妨狎投老靑山不厭深聞道練溪春酒熟期君苕上共登臨醉郷半属華胥半酒泉封君惟有麴生權觥籌席上無多地風月壷中别有天千日夢醒如隔丗四時春盡不知年􅀙来此處蔵身好容我神㳺太古前送曹鑑克明自浙省貟外遷湖廣上流形􅀔控荆􅀭撾鼓飛帆入武昌莫府一時登俊桀朝廷今日際明良南樓詞翰題鸚鵡北斗旌旗下鳯凰好折椘芳遥􅀉與美人秋水逺相望越僧無涯號栖雲乞賦上方何處但聞鐘深護林扉翠幾重卧冷衲衣侵片石行随錫杖度千峰松晴毎下安巢鶴潭暮時㽞聴法龍更欲移禪沃洲去微茫嵓洞不曽封懷上饒祝蕃蕃逺時為建康學正聖皇端拱致時平妙選群才属汗青一代彌文懸日月萬方同軌走雷霆敢希太史紬金匱更待中郎冩石經出處與君俱有道不煩猿鶴謝山􅂕送歐陽遜老􅀙謙之湖閫照磨白雲親舎在湘東懷牒歸来晝繍同賔幕新趋元帥府朝班舊引大明宫劒横岩客南樓日瑟罷湘􅂕北渚風何處登臨最相憶江籬秋碧畹蘭紅送王季境還􅀭州兼述所懐逺憶淮南后土祠君歸春巳發瓊枝好㝷月下吹簘處猶及花前把酒時錦瑟金錢餘舊伴烏絲紅䄂有新詩故人相見如相問老盡當年杜牧之汪兖州叔志去思碑使君有道是民師惠政長㽞去後思秀麥不専稱漢史甘棠直欲􅁇周詩馴桑有雉童俱化攫肉無烏吏絶欺東魯自今應􅁓貴一時争打兖州碑臨川㽞别冝黄樂􅂎楚材當年携酒杏花春同是西江榜上人歳晚異香為客乆夜来歸夢到家頻鴈聲􅀌舘迢迢雨馬影斜陽漠漠塵悵望与君江海别幾時髙􅁩復相親􅀉荅張五丈師䕫明府時在莆田舊令龍溪有去思移家喜與土風宜人傳張籍妙樂府我識王維真畫師火米夏収畬稻早海椒春放瘴花遲客查不到天無鴈賴有輶軒可􅀉詩􅀉歸學士彦温時寓夏縣老筆攵章史漢間喜聞華髪映朱顔司空舊隠王官谷開府今稱􅁃子山一色黄身丹竈火十年清夢紫宸班與君歳晚須相見乆辦歸田䟽乞還􅀉韓文璵與玉自驚六十八年身老病蹉跎又見春京國􅀊􅀊稀雨雪江淮兵乆尚風塵郷書屢絶親知逺官俸常空僕馬貧只憶練溪韓與玉封詩􅀉與重傷神春闈和周伯温韻呈同院鼓角聲沉漏未終夜寒官燭屢銷紅百年海岳囬元氣一代文章有古風仙掌露漙金沆瀣觚稜雪散玉玲瓏秪慙白首河汾客得與群賢此㑹同􅀉郯九成即事自述豎儒無術善飛鈐鏡裏形容亦自嫌憂丗不堪才力弱告歸方畏簡書嚴風沙􅃤淡寒吹㡌星斗光芒夜近簾此際思君倍愁絶何山容得老夫潜􅀉成居竹時張㓂巳受詔而隂襲􅀭州戰骨填溝塵滿城尚書歸􅀃使人驚方期勃海民霑化豈意平涼賊畔盟何日皇天知悔禍中原故老望休兵傷心揚子洲􅁁月忍聴江流是􅂘聲髙沙失守􅂘知府李齊公平髙郵自昔號銅城一旦東門委賊兵殺氣倉黄迷野色怨魂嗚咽泣江聲廣陵瓊樹春仍在甓社珠光夜不明白首故人悲趙李臨風唯有泪􅀙横㕘政趙伯噐死泰州潼􅀜失守􅂘叅政述律􅇐存道十月三日天地昏􅀅軍拒賊死轅門火飛華岳三􅀜破血浸秦川萬馬奔望越伍胥徒抉目戰箕先軫不歸元北風吹盡英雄淚􅀝劍悲歌一愴䰟􅀉荅翟彬文中時避地慈溪往年使過慈湖上風景依稀可畫傳紅葉樹蔵秋水寺白頭僧渡夕陽舩竹林雨後山多筍漁浦潮来海有鮮藉是縣公能愛客不妨酧唱酒尊前陳麟為尹静對􅀌燈思往事偶聞踈雨落寒窓愁􅁁白髪三千丈夢裏青山十四双蜀魄有聲疑訴國楚招無些憶沈江只應詩思縁君苦唫㫁遥鍾巳曉撞食粥病齒入冬便食粥瓦瓶煮豆給晨庖鄰人新酒賖来醉道士竒方借得抄鴈喜随陽還北郷鵲知避􅀊巳南巢故園我亦無歸計且作齋居盖白茅聞歸}
