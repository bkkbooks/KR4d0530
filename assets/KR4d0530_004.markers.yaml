  - {type: line-break, offset: 0, content: '', id: KR4d0530_WYG_004-1a01}
  - {type: variant, offset: 0, length: 1223, content: 欽定四庫全書蜕菴集卷四元張翥撰七言律詩殿試翥與讀卷官老臣載筆侍金鑾自愧三叨讀卷官進士擢科從古盛大臣考策得才難芳年荏苒聞鶗鴂花事從容到牡丹明發禁扃當徹鏁文光髙動五雲端翰林三朝御容戊戌仲冬朔把香前宫嘉禧殿前初日髙瑞光先映赭黄袍雲間瑞露收金掌仗外微風颺彩旄黄鶴仙人周子晉碧雞使者漢王褒禁園尚覺餘寒在未放春紅上小桃甲午禮闈白雪青天映日紅樓臺髙下瑞光中佳辰正際新春晦薄冷猶吹向曉風萬國衣冠朝北闕一時文獻集南宫吾皇方此求賢俊載筆寧慚奉至公九月朔迎駕大口大駕今朝至上都期門䍐罼已前驅錦衣照日環龍衮翠蓋凌雲覆象瑜萬里山河開白道兩京宫闕入黄圖縱觀父老心應喜知有天恩免過租庚辰十月朔奉迎明宗册寳至石佛寺明日壬辰迎至太廟清祀禮成賦以紀事寶册香輿出法宫非烟御路曉濛濛仗齊劍佩千官裏金奏簫韶九廟中宣室鬼神徵賈誼太常禮樂屬孫通下臣有幸逢熙事散作恩波四海同圜丘禮成改直翰林敇書告廟祝版捧冊先期籲太宫聖孫翼翼孝心同霓旌曉絢香輿日鶴駕晴薰仗外風一代皇猷昭黼黻萬年寶厯卜濛鴻舞階行見干戈戢並在穹祇叶相中黼黻青城煥景光紫檀黄道藹天香鳯韶曲變初終奏龍衮衣明上下章共喜聖時修曠典更從春享議明堂吾皇飲福神靈畢却進公卿萬壽觴直延春閣蓬萊海上第三山仙掌雲間十二槃雞樹煙深殊窈窕鳯樓天近自髙寒銅壺傳箭聲相應紫詔封泥墨未乾願祝君王千萬夀坐施雄斷濟艱難送太傅丞相出師平徐方南征諸將久無功丞相親勞出總戎虎士嚴兵屯玉帳龍庭大宴賜彤弓萬年社稷收長算百戰旌旗得勝風幕府如雲盡才彦荆徐指日捷書同初度日八十一翁烏角巾尊前才放自由身病須善藥休離手衰借佳醪可飬神誰謂仲連為俠士或傳方朔是仙人行當小築西洋墅種杏栽桃作好春癸酉初度真率㑹分韻杏花風暖破春隂一笑幽齋喜盍簮人事萬端相聚少酒杯百罸不辭深生辰值月方傳斗故國觀星正在參多謝諸君為我夀滿牋佳句敵南金乙亥初度是嵗仍改至元此生重見至元年白髪垂垂已滿顛仕愧買臣無印綬歸思靖節有園田菜挑渚雪氷茸滑柑剝呉霜玉腦圓終結一庵湖上去老來閒送佛前錢病痁肉黄皮皺髪毛枯一病支離困壯夫痛要小奴搥臂膝冷尋破㡌聚頭顱隣翁教誦禳灾咒道士來書禁瘧符車轍馬蹄勞客問藥囊糜椀乏吾須炎火寒氷忽暗投肺腸日與藥為謀擬尋畫史圖獅子安得詩人咏髑髏月色自如閒度夜蟲聲無賴亂吟秋便當一起幽憂疾濯髪西風萬里流自喻狎鷗不下解知機蟋蟀先鳴能表微人海無涯俱泛泛佛天有相亦非非試論前輩今誰在欲問何山老可歸嚴瀨磻溪各求志豈關出處在漁磯憶山中買山晏塢近天根遙憶春深正灌園一樹爛紅櫻著子滿林鮮碧竹生孫少陵只擬還韋曲安石端冝得謝墩歸老㑹尋凌道士采芝燒藥了晨昏感興從來豪傑願風塵奮臂干戈肻顧身司馬諸王祇亂晉祖龍二世竟亡秦祠旁鬼火狐鳴惡橋下天寒鶴語神千古汗青留感慨山中輸與種桃人憶廣陵舊事乙未君王昔在鎮南年賔客風流日滿筵上國旌旗分一半層臺歌舞宿三千豪華遽盡悲離黍形勝空存慘暮煙多少楚魂歸未得江流無際海連天寄寶林同别峰定水復見心寶林老子虎耽耽定水道人蒲作庵歸老尚須㳺越絶尋師先儗到精藍越江碑在當重讀禹穴書藏㑹一探我亦三生學環者定從佳處結禪, SBCK: ''}
