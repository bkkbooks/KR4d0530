  - {type: variant, offset: 1218, length: 7534, content: 懐清源洞遊時方兵後漫漫漲海際天涯萬里乗來使者槎紫澤重尋仙客洞碧山常醉故侯家人多熟酒燒藤葉市有生蠻賣象牙安得夢中時化蝶翩翩飛向刺桐花寄副樞董摶霄孟起王師前後壓瀛河萬里風雲入盪摩晉帥先冝謀郤縠趙人終欲用亷頗枚銜突騎宵傳令鼓發轅門曉擁戈共待將軍白羽扇歸來幕府上功多寄野菴察罕平章時攻淄鄆聖主中興大業難元戎報國寸心丹軍中諸將驚韓信天下蒼生望謝安露布北來兵氣盛樓船南渡海波寒擬將舊直詞林筆細傳成功後世看大軍下濟南總戎十萬鐡鷂子殪賊一雙金僕姑白日照開華不注亂雲飛盡大明湖數年父老回生氣千里山川復舊圖已喜武威平汴兖可傾東海洗兵無哀孝子夏永慶沒海救父父出慶死年二十翁已生全兒殞軀投文我欲詰天呉一時肝膽寧知死萬頃波濤視若無骨𦵏夜泉鯨穴冷魂歸故國蜃雲孤自今孝子流風在直與扶桑水到枯雲州龍門鎮韓母劉孝節卷韓家門外立雙楹丹染旌書照路明此媪何如陶母傳諸郎具是董生行春泉躍鯉饒佳味曉樹啼烏有喜聲孝節従來貧始見秦臺那用築懐清真定王節婦習氏青春忽掩鏡鸞悲大節生全死不辭夫目九泉無瞑日妾身百嵗有歸時天髙地厚心如石女嫁男婚髪已絲東觀只今多直筆為書青簡配桓嫠上京睹陳渭叟寄友書聲及鄙人賦以答之其詩曰紫雲編已刋四卷忽憶江南古莊叟自號釣竿歸去拂珊瑚藥爐已熄勾庚火書篋閒抛遁甲符欲與陳陶同啖鮓祇令張翰逺思鱸不知别後詩多少刋到雲編戊己無不見故人今十載平安喜得上京書顧我真吟紇干雀羨君閒釣富春魚山房夜雨青燈外紫塞秋風白雁初終儗攜琴隱湖曲一官垂老欲何如授鉞天子臨軒授鉞頻東南何處不紅巾鐵衣逺道三軍老白骨中原萬鬼新烈士精靈虹貫日仙家談笑海揚塵只將滿眼凄涼淚哭盡平生幾故人左丞傅夢臣歸老汾曲賦以夀之六朝名徳仰巍巍未許家園久息機霖雨帝方思汝作衮衣人更望公歸南山一柱標中土左轄三星拱太㣲欲向賔筵頌眉夀寸心遙與白雲飛王繼學亷使遷南臺侍史詩以賀之天上歸來錦作袍幾陪春色醉仙桃銀河有路惟通鵲碧海無山不戴鼇卿月又臨仙掌動客星偏傍釣臺髙廣陵此去金陵近擬拂塵埃望節旄送西江胡允中之桃温萬户府學正遼水窮邊牟蓋東鎮人今始識儒宫詩書直化三韓逺文軌須令萬國同隼度塞雲秋有雪鼇翻海浪晝多風知君囘首神州路一髪青山落照中余伯疇歸浙東簡郡守王居敬四明㳺客住京都旅舍青燈照影孤家信十年黄耳犬鄉心一夜白頭烏却攜長鋏辭金水直挂輕帆到鑑湖為問蠡吾王太守别來安稳有書無寄達兼善經歴柯敬仲博士心憐旅寓各西東長憶樽前笑語同故國魚龍滄海上仙家雞犬白雲中百年人物無多見一代文章有至公等是不禁惆悵事鬢絲黄葉共秋風宗人鳴善將還武昌詩以叙别武昌城中官柳陰廣陵行客動歸心衣冠南渡悲豪傑江漢東流變古今多病馬卿㳺已倦能詩杜老律尤深洞庭明月如相憶為冩清愁入楚吟次倪元鎮張伯雨錫山倡和之什鶴在青林鳳在阿騷人行處有吟窩西風落木秋來早南國浮雲入暮多欲賦朱華臨鄴水可堪白芷怨湘波期君不負湖山約來聽吳儂欵乃歌答謝看雲宗師夀帙綺段之贈自信平生有道緣頻煩白鶴寄瑤箋錦分帝子機中織詩入真人誥内編余詩亦在刻中弱水蓬萊三萬里慶雲閶闔九重天擬抽玉刺従颷御一到環樞問列仙送涂茂才北㳺黄河十月已流氷暫解行􅑽駐廣陵逆旅壯懐銷北斗故山歸夢入孤燈千金燕市方求馬萬里天池欲徙鵬曾是公卿有知已孝廉船上覓張憑答韓伯清練溪見寄久慚簮紱趨文館擬問田園歸武林慷慨謾論當世事衰遲空負壯年心忘機白鳥何妨狎投老青山不厭深聞道練溪春酒熟期君苕上共登臨醉鄉半屬華胥半酒泉封君惟有麴生權觥籌席上無多地風月壺中别有天千日夢醒如隔世四時春盡不知年従來此處藏身好容我神遊太古前送曹鑑克明自浙省員外遷湖廣上流形勢控荆揚撾鼓飛帆過武昌幕府一時登傑俊朝廷今日際明良南樓詞翰題鸚鵡北斗旌旗下鳳凰好折楚芳遙寄與美人秋水逺相望越僧無涯號棲雲乞賦上方何處但聞鐘深護林扉翠幾重卧冷衲衣侵片石行隨錫杖度千峰松晴每下安巢鶴潭暮時留聴法龍更欲移禪沃洲去微茫巖洞不曽封懐上饒祝蕃逺時為建康學正聖王端拱致時平妙選羣才屬汗青一代彌文縣日月萬方同軌走雷霆敢希太史抽金匱更待中郎冩石經出處與君俱有道不煩猿鶴謝山靈送歐陽遜老從謙之湖閫照磨白雲親舍在湘東懐牒歸來晝錦同賔幕盡趨元帥府朝班舊引大明宫劍横巖客南樓日瑟罷湘靈北渚風何處登臨最相憶江蘺秋碧畹蘭紅送王季培還揚州兼述所懐逺憶淮南后土祠君歸今已發瓊枝好尋月下吹簫處猶及花前把酒時錦瑟金錢餘舊伴烏絲紅袖有新詩故人相見如相問老盡當年杜牧之江兖州叔志去思碑使君有道是民師惠政長留去後思秀麥不專稱漢史甘棠直欲繼周詩馴桑有雉童俱化攫肉無烏吏絶欺東魯自今應紙貴一時争打兖州碑臨川留别宜黄樂杞楚材當年攜酒杏花春同是江西榜上人嵗晚異鄉為客久夜來歸夢到家頻鴈聲孤館迢迢雨馬影斜陽漠漠塵悵望與君江海别幾時髙誼復相親寄答張五丈師夔明府時在莆田舊令龍陽有去思移家喜與土風宜人傳張籍妙樂府我識王維真畫師火米夏收畬稻早海椒春放瘴花遲客槎不到天無鴈賴有輶軒可寄詩寄歸學士彦温時寓夏縣老筆文章史漢間喜聞華髪映朱顔司空舊隱王官谷開府今稱庾子山一色黄茅丹竈火十年清夢紫宸班與君嵗晚須相見久辦歸思疏乞還寄韓文璵與玉自驚六十八年身老病蹉跎又見春京國嵗寒稀雨雪江淮兵久尚風塵鄉書屢絶親知逺官俸常空僕馬貧只憶練溪韓與玉封書寄與重傷神春闈和周伯温韻呈同院鼓角聲中漏未終衣寒官燭屢銷紅百年海嶽囘元氣一代文章有古風仙掌露溥金沆􅒭觚稜雪散玉玲瓏祗慚白首河汾客得與羣賢此㑹同正月九日夜雪甚寒雪後西山照眼青早寒㣲霰又飄零昨非未必今皆是衆醉何由我獨醒學篆毎朝臨碧落存神長夜養黄庭若為喚得瀛臺侣相與吹簫上杳冥長至後一日小集張氏小軒留題金殿當頭是廣寒闌干髙倚五雲端山銜落照虹光濶海蹙長氷玉氣乾僊客上昇惟控鯉月娥來舞毎乘鸞更須載酒春晴日萬里風煙快一㸔十月望夜食既戊戌歲翳翳氷輪漸欲無滿城鐘鼓競喧呼明銷魚腦渾應減食盡蟇腸正可刳后羿藥靈知不死臣仝心切望全蘓夜闌失喜清光滿一片霜風凍玉壺闕題席上屠蘓嵗嵗同只憐最後飲衰翁半生客路江湖裏十月春愁雨雪中黄道雲消晴見斗青陽氣轉曉占風欲題采帖無佳句思繞蓬萊最上宫寄郯九成即事自述豎儒無術善飛鈐鏡裏形容亦自嫌憂世不堪才力弱告歸方畏簡書嚴風沙慘淡寒吹帽星斗光芒夜近簾此際思君倍愁絶何山容得老夫潛寄成居竹時張㓂已受詔而隂襲揚州戰骨填溝塵滿城尚書歸說使人驚方期渤海民沾化豈意平涼賊畔盟何日皇天知悔禍中原故老望休兵傷心揚子洲邊月忍聽江流是哭聲髙沙失守哭知府李齊公平髙郵自昔號銅城一旦東門委賊兵殺氣倉皇迷野色怨魂嗚咽泣江聲廣陵瓊樹春仍在甓社珠光夜不明白首故人悲趙李臨風唯有淚縦横參政趙伯器死秦州潼關失守哭參政舒嚕杰存道十月三日天地昏將軍扼賊死轅門火飛華嶽三關破血浸秦川萬馬奔望越伍胥方抉目戰箕先軫不歸元北風吹盡英雄淚倚劍悲歌一愴魂寄答翟彬文中時避慈溪徃年使過慈湖上風景依稀可畫傳紅葉樹藏秋水寺白頭僧渡夕陽船竹林雨後山多筍漁浦潮來海有鮮藉是縣公能愛客不妨酬倡酒樽前静對孤燈思徃事偶聞疎雨落寒牕愁邊白髪三千丈夢裏青山十四雙蜀魄有聲疑訴國楚招無些憶沈江只因詩思緣君去吟斷遙鐘已曉撞食粥病齒入冬便食粥瓦瓶煑豆給晨庖鄰人新酒賒來醉道士奇方借得抄鴈喜隨陽還北鄉鵲知避嵗已南巢故園我亦無歸計且作齋居蓋白茅聞歸集賢逺引奉簡一章時吕左丞歐承㫖司尚書繼亡故舊相㸔逐逝波思歸無路欲如何將軍每嘆檀公策朝士徒悲穆氏歌南海明珠來貢少中原健馬出征多先生自說將髙舉不遣㝠鴻到罻羅題馮士啟士可藏書堂不惜黄金為買書要令絃誦被鄉閭聖賢事業千年上經史文章萬卷餘借送詎論鴟有酒收藏長愛蠧無魚他時許下成精舍嶽麓匡山恐未如分韻瓜步送司執中之江西憲府照磨山前古驛草蕭蕭候吏沙頭候畫橈采石晚風人渡急歴城煙樹鳥飛遙時平烽火沈江戍市早魚鹽散浦橋目送征帆慢相憶祇將離恨寄囘潮分題投書浦送沙彦文架閣之江西髙人豈作置書郵盡棄函封向石頭故迹不隨煙草沒遺風長與大江流悲臺鷹下川雲暮别國龍囘岳雨秋君過渚傍須艤棹題詩相寄莫沈浮分題若邪溪送别胡一中允文録事之紹興五雲溪水碧縈灣純浸蓬萊郡裏山金躍冶罏龍已化箭空仙的鶴長閒棹歌洲渚芙蓉外人在樓臺罨畫間吟賞總輸賢錄事樵風日暮送舟還寄題睢陽張文照存齋之子山房結數楹静無塵累已攖寧此心炯炯同千載吾道煌煌有六經雨後儀型山更好牕前意思草長青工夫要在存存熟便是齋居座右銘題四皓商山圖兵塵澒洞遶函關不到商於六里間赤幟頻傳秦楚蹶白雲自與綺園閒龍蛇陸起知何在鴻鵠㝠飛竟不還千載髙風無復見空餘芝草滿空山玉山墨工魏元徳名一時贈之以詩魏郎應得庭珪法未數松泉與雪堂萬杵熟膠香入劑一螺㸃漆黒生光掄材合致圖書府留價爭傾翰墨埸我有詩囊須剰襲草𤣥歸去老山房松泉林嵩號雪堂呉宇號山友為金閣山田道士作山人愛與山為友住得山前地幾雙為納白雲長掃室欲延青嶂别開牕嵐中笻跡粘苔磴風外琴聲瀉石缸應是烟霞數仙侣月明時復下旌幢望江是嵗合越飢寒潮已退大江空不見來鷗與去鴻半嶺綵霞纒落日一川紅樹照西風魯連蹈海英靈逺王粲登樓感慨同徑欲投竿㑹稽石得魚為飽浙河東嵗晏奇寒癡坐氍毺類凍蠅霜風吹折布衣稜爐翻宿火隨灰陷杯覆燖湯到地凝虎豹凍埋山盡雪魚龍寒宿水連氷濁醪最解強人意吟短西牕一寸燈寄答莫維賢景行故人音問久相疎忽寄新詩良起予半卷長箋欹枕讀盡拈佳句繞牕書此生館閣嗟留滯何日兵戈見掃除歸覓南屏山下隱酒杯茶竈共閒居答馬易之編修病中作喜君近疾已平安楮帳綿衾且避寒飯顆任嘲詩骨瘦糟丘能遣客懐寛天街鐘動朝初罷海國書囘嵗又殘忽訝衰翁不相問北風吹雪正漫漫寄成居竹黄舜臣嵗月崢嶸春又來歸心遙在故園梅十年厭見風塵惡萬事徒增耳目哀大漠平鋪沙雪去逺山直枕海雲開近懐欲報成夫子强起題詩對酒杯一見君詩倍黯然薊南湖北各風煙故人漸似星將曉塵世真成海變田桂在謾吟招隱曲鶴歸還記去家年虎丘山水知無恙有待先期置酒泉至日㣲雪家人盡上冢獨歩小酌忽忽又逢長至日此心寒似琯中灰尋思一日老一日得飲數杯還數杯鵲知太嵗改巢去雨被北風吹雪來醢兔羞鴽良不惡餕餘聊遣凍顔開送布延彦仁都事還蜀兼東時文可郎中送君一騎發長安王事方殷肯避難使者好尋巴道路詩人多勒蜀巖巒江來灌口聲初放雲接峩嵋翠不乾為報郎中勉勛業逺音時遣破幽端題栝士朱榘方畫五松隱君業在栝溪東種就長松倚翠空一夕蛟龍起春雨滿山鱗甲動天風也知造物生來異未許煙霞畫得同想見青田舊巢鶴時時來唳白雲中吾廬吾廬幽似野人家時倚南軒玩物華亦有君臣槐腹螘也能鼓吹沼中蛙隣翁來送新篘酒堂吏求抄舊草麻早晚乞骸尋舊隱不妨髙卧傲烟霞歙汪希仲罕代自雄新二州還都話其風土為賦越鳥巢南漲海東地兼夷夏氣惟雄洞深屋壘層厓上瀧險船行亂石中春樹濕雲生桂蠧瘴茒經雨落沙蟲宦游最數蠻荒惡羨子歸來面更紅病起偶題丁未閲世悠悠八十餘此身天地一蘧廬季鷹只愛生前酒司馬空留後世書野散未歸鳴澤鴈水煩徒噞在淵魚可堪濩落風塵裏兩鬢霜毛頓覺疎飲故相國宅相君池館舊撝訶今日還容野老過裂地商於真已矣積金郿塢竟如何胡僧漫演寅朝偈女鬼空悲子夜歌起向春風酹盃酒青蕪滿地雨紅多監中暮歸時廣帥獲鰐魚放之潞河滿林木皆梟鳴日夜不止己亥嵗也扶桑銅柱若為標南望兵氛久未銷秋水漲河初放鰐晚煙籠樹盡鳴梟枕戈未睹棲於越舞羽曽聞格有苗河北諸侯總戎翰好宣忠力佐皇朝次韻閩僧秀嵓寄竹溪僧峰北峰南法界中杖藜來徃夕陽鐘時過花洞逢游鹿夜呪珠臺放釣龍七字詩才清似水三生骨相古於松羨師方外全無事只箇蒲團又過冬望入南雲無去鴻凴誰持餉一瓶空詩來萬里燕臺下寺在三山冶縣東戲瓦空中惟見水挂旛窗外自搖風我今也擬辭簮紱去作巖居三老翁送監生聶讓省兄山後生父死王事書劒翩翩送子歸原頭相見脊令飛北風關路雪雲暗落日客亭烟火微血立忠臣頭上髪線留慈母手中衣老夫唯有銷兵望早遣平安到虎闈東坡淮口墨蹟卷後有黄策詩策號隨縁子潮落潮生沙岸頭布帆來徃幾經秋山川如故人何在天地無情水自流敗壘荒墟非昔畫野煙寒照總新愁只應千古清淮月曾照東坡此喚舟壽許集賢可用予同年少七月圭塘諭德真夀星斑衣戲舞滿中庭同年笑我雌為甲上夀㸔君老復丁壺有仙公新授藥廚留長史舊傳經他時若許相依住願割西山一半青㸔君才氣夐無雙徃徃賔賢鎮海邦未報美人青玉案且乘壯士碧油幢喚船椰葉迷蠻驛對酒椒花映客牕别後平安須越便鴈飛不過嶺頭瀧送貴溪彭伯時教授之髙州蒙古學都門栁色綠紛紛惆悵南園此送君䫈海驛程須給傳國朝字學要同文鼓來野廟迷蠻鬼火燎山田落瘴雲藉有梹榔與藤酒冷官聊復送朝曛樂平劉復初隱居四詠東皋南畆雨新晴杏花欲開菖葉生田婦蒸藜來午餉鄰翁荷鍤趂春畊烏犍引犢村村出布穀催人處處鳴歸與兒孫共閒夜一牕燈火讀書聲右耕田泱泱寒流底處尋但傳幽響出空林石根雲竇元多罅松籟風簧共一音醉夢䀨醒春枕熟詩懐清徹夜牕深中郎别有清溪曲更冩潺湲入素琴右聽泉釀法傳將道士家春醪一味采松花常時野坐開新瓮幾度山行載後車忤客有誰焚醉日學仙何處飲流霞明朝又覓南鄰伴還汲清泉洗石窪右飲酒漾漾清波浮紫鱗一笻閒倚樹邊身我疑濠上漆園老誰識江頭漁丈人細草留連還可藉野鷗來徃自相親此中正得悠然樂何用扁舟把釣綸右觀魚成居竹有詩見寄因郯九成行用韻答之歸隱山林嘆未能强支世故力難勝少狂欲作追風驃老退還如被凍蠅客賦有愁逾萬斛兵廚無酒可三升與君為結東家社珍重衰年護寢興送燕山楊文周之汾州教授關河迢逓入汾陽暑雨初收陌樹蒼名士多為文學掾此州今有狀元坊鴈來霜塞秋聲急鳥去煙臺野色荒試問西河讀書處因君石室重輝光送草牕講師周善京還九江太平宫萬叠匡廬紫翠開太平宫館即瓊臺九天使者雲間下五栁先生社裏來杏樹春隂渾滿院桂花涼露不盈杯遙應鶴侣相望久吹取樓頭鐵笛囬許編修克敬歸平水奉寄王秘監先輩憶昔先生致政時至今留在十圖詩古來賢達知幾早此日山林問舍遲故國衣冠多草莽中原郡縣半旌旗白雲汾水秋風外目送歸鴻有所思九日燕允孚森玉軒醉中感懐不見江南信使來菊花應傍戰塲開風塵渺渺家難問節物匆匆老轉催把酒多無今日醉坐中客此語有足動心者登髙只益寸心哀白頭一覺湖山夢誰料繁華有刼灰㑹試院泰甫兵部既答和拙作且示以佳章僕以汨於校文遂稽貂續仍韻見趣所考既就格輒綴四首錄奉一笑堆牀朱卷考初分衞士傳呼夜鎖門覂駕已多東野馬摶扶應有北溟鯤熟衣乍換寒猶薄倦枕纔憑睡易昏願向斯文求俊乂大廷行對帝王尊樓頭叠鼓已三嚴起聽秋聲滿四簷山葉落頻風繞樹露蛩吟苦月當簾煙寒銅獸催香換漏促金壺報箭添笑我原無食肉相只思蓴鱠薦呉鹽勌眼空花漫不分偶隨羣彦集金門扁舟只擬追張翰一壑還期置謝鯤楓葉舊詩多冷落梅花歸夢幾黄昏與君此去如休暇莫厭相過共酒樽詩律輸君敢鬬嚴強摩老眼傍風簷鵠袍夜散遙持燭席舍朝開盡撤簾久悟物機忘出入時存神火騐抽添明當喚取彈箏手與唱新聲阿鵲鹽故御史王楚鰲元戴為臨川王伯達三畫求題王館賔也雙鳳仙人茅作屋五雲閣吏繡為衣冩將瀟洒滄洲趣留待風流二老歸嵗月無情遺墨在江湖多事宿心違寒藤古木江西道惟有當年白鴈飛右雙鳳山居圖王山在臨川五里自奎章典籖為豸使故云閣吏罨畫溪頭春水波美人蘭棹逺來過杯如賀老稽山酒曲有呉兒小海歌樓館雲晴空翠濕汀洲花暗夕陽多只今粉墨餘髙致愁絶樵風冷薜蘿右山陰春霽圖時憲巡行越州小吏堞前煙水空淮山無數直叢叢使君援筆冩秋色舟子唱橈乘晚風幾處漁家依落木半汀殘照下飛鴻白雲望斷仙逰逺應在蓬萊碧海中右萬港秋汎圖時為淮西僉憲雪中梁師孟叔原餉渾酒小飲閒忩偶成一章嵗事蕭條雪擁門家人隨分具盤飱竈頭餅軟團團白缸面醅新盎盎渾萬竅風聲皆地籟一窩春意自天根老夫只待干戈息歸問西湖水竹村送偰元魯降香南岳南海天開朱岳奠炎方地入南溟接大荒使者肅修時典禮神明宜護國封疆仙臺雲散峰巒碧瘴嶺春回草木香珍重詞臣致誠禱願消昏癘降休祥送景初漕史還平江各賦一詩寄吳下諸友怒浪蹙天摧漕舟疾風吹雨黑中流海神躍馬火明滅龍伯釣鼇山蕩浮安得靈槎通漢使斷無奇藥采瀛洲丈夫政事經艱險不負平生亦壯逰景初押糧至成山遭風既沈米六萬石得小舟以免我憶栝山老徴士卷霧飛談那可當髙致何如漆園吏幽居真是鄭公鄉未能即去楚氛惡每一相思雲樹長欲覓雙魚問消息越來溪逺水茫茫鄭徳明匡山道士軀幹小豪氣直壓香爐峯池邊呪劍出金虎峽頂放船飛白龍老我毎推詩俊逸何時相見話從容散仙萬一煙塵外為報巢雲若箇松于彦成近報崐岡亦被兵知君撫劍氣崢嶸夫差强弩風生海姑蔑戰旗雲繞城天詔屢傳寛宥下王師行見掃除平草堂無恙玉山好我欲南轅尋舊盟顧仲瑛汶上早行圖上清張道士冩絳節前驅海日生川迴已見汶陽城數峰曉翠和煙濕千樹春紅照地明原隰使華來煥爛河山風物入經營憑君更冩千巖月與聽鸞笙夜夜聲白鷹愛此精神顧盼雄扶輿遙隔海濤東儁含金氣翎如雪直上秋雲骨有風絛鏃五方禽獻後錦貂千騎獵圍中平原側目多狐兔安得真拳一擊空九月二日掲曉僕以朔旦始得閒復成二詩錄奉泰甫侍郎思齊御史本中都事道明敏文伯崇有志諸寮友解送諸君藻鑑分棘圍明發喜開門荆人自許山多玉莊叟虚談海有鯤過鴈風髙秋索索護霜雲薄曉昏昏鄉來曽預春闈考猶記君王賜上尊西風漸急早寒嚴曉露俄晞日在簷滿鼎松聲烹活火半鈎花影捲疎簾菊黄又報秋期近髪白空驚老態添未得山中覓茅屋去修丹竈養紅鹽庚子元日早朝大明殿小飲自述玉殿齊班對正衙退朝冠蓋滿京華青天徹曉無雲氣黄道囘春轉日車閒染彩毫題帖子喜將綠酒泛椒花老身只待承平了攜取來書問故家仙興鶱林樹樹玉成圍皓鶴彩鸞中自飛𤣥石山人千日酒上清仙子六銖衣道心不動方歸樸物化無方總入機自炷蕪香明月夜露壇東向禮靈威自悼十二樓空月自明一圓一缺總關情每從畫裏瞻瓊在復向詩中記受生魂不歸來悲楚些夢還驚覺厭秋聲遙知别鶴離鸞思只在芙蓉海上城夢中常苦不分明天上人間各有情桃葉竹枝無限意靈芝瑞草可憐生若蘭謾織囘文字鸚鵡猶傳響板聲欲得近音何處問風煙遮斷武林城病中小兒舞袖學齋郎大女笑㸔傍鼓簧狂客有時來獵酒老夫無事坐焚香前家後家雜歌哭南斗北斗相低昻病卧經旬不出户牆角青青春薺長遣興七十蛻翁衰病餘一室儼若維摩居孔方無神可使鬼毛穎已秃不中書江湖天逺道塗斷鼓柝衝寒風雪初糠籺明年恐未飽欲求何地托吾廬至後暴日火煖氊牀擁病翁遣懐篇翰底求工悲歌學士徒能壯學坐禪僧要自空鶡旦猶鳴天有雪爰居已去海無風只留一段思鄉意不見詩中見夢中悼亡日是早題畫梅一幅夜夢梅花盛開有感剪水裁雲聚作花直教顔色冠芳華一雙仙子玉條脫三尺天家香辟邪南國好音將過鴈西牕殘夢已啼鴉年年此日傷春思忍把歸心賦落霞九日書似北山上人先夜雷雨老年尤惜過芳時籬下黄花值閏遲夜雨有愁如濕絮秋風無髪可吹絲勞魂數數還鄉夢徃事茫茫感興詩滿腹精神渾減盡一杯誰與共襟期中秋望亭驛對月代祀北還月色滄波共渺茫驛亭襍坐看湖光仙家刻玉青蟾兔帝子吹笙白鳯凰蘆葉好風生晚思桂花清露濕空涼囘槎使者秋懐濶倒㵼銀河入酒觴春日小軒獨坐江南椶筍正時新滋味還思養病身暮雨過雲初有電老鶯啼樹已無春虚名晚合徒多累同輩生存僅數人淨掃虚軒炷香坐只將篇什擬心神清明日杏園獨坐底事東風大放顛為花渾廢夜深眠賞心不有閏三月老眼應虚春一年歌舞盡傳天上曲笑談同是酒中仙歸時更愛東城道月在秋千影外圓長至日偕諸友逰故宫皇天有數混南邦組練長驅萬里江内井龍沈軍檄在西郊鬼泣帝車降河開故道穿宫籞殿鎖秋塵暗佛幢欲問興亡遺老盡晚風鈴語自摐摐中秋雨明日晴明玩月有作今夕清光不負公更無雲氣礙虚空晴遲一日秋纔朢㸔到三更月正中蟾兔影寒天下露魚龍魄動海生風故人别有蕉杯約未放扁舟一鶴東蜕菴集卷四, SBCK: ''}
