body:
  text: 憶廣陵舊事乙未君王昔在鎮南年賔客風流日滿筵上國旌旗分一半層臺歌舞􅀫三千豪華遽盡悲離􅁰形勝空存􅃤暮煙多少楚魂歸未得江流無際海連天懐清源洞舊游時方兵後漫漫漲海際天涯萬里乗来使者槎紫澤重㝷仙客洞碧山長醉故侯家人多熟酒燒藤葉市有生蠻賣象牙安得夢中時化蝶翩翩飛向刺桐花􅀉副樞董摶霄孟起時屯濟南王師前後壓瀛河萬里風雲入盪摩晉帥先宜謀郤縠趙人思欲用㢘頗枚衘突􅀐宵傳令鼓發縣門曉擁戈共待􅀅軍白羽扇歸来莫府上功多􅀉野菴察罕平章時攻淄鄆聖主中興大業難元戎報國寸心丹軍中諸將驚韓信天下蒼生望謝安露布北来兵氣盛樓船南渡海波寒擬􅀅舊直詞林筆細傳成功後丗看大軍下濟南総戎十萬銕鷂子殪賊一双金僕姑白日照開花不注􅅍雲飛盡大明湖数年父老囬生氣千里山川復舊圖巳喜武威平汴兖可傾東海洗兵無哀孝子夏永慶没海救父父出慶死年二十一翁已生全兒隕軀投文我欲詰天吳一時肝膽寧知死萬頃波濤視􅀂無骨塟夜泉鯨穴冷䰟歸故國蜃雲􅀌自今孝子流風在直與扶桑水到枯雲州龍門鎮韓母劉孝莭卷韓家門外立双楹丹染旌書照路明此媪何如陶母傳諸郎真是董生行春泉躍茗饒嘉味繞樹啼烏有喜聲孝莭従来貧始見秦臺那用築懐清真㝎王莭婦習氏青春忽掩鏡鸑悲女莭生全死不辭夫目九泉無瞑日妾身百􅀊有歸時天髙地厚心如石女嫁男婚髪巳絲東􅀚只今多直筆爲書青簡配桓􅊔上京睹陳渭叟􅀉友書聲及鄙人賦以荅之其詩曰紫雲編巳刋四卷忽憶江南古荘叟自號釣竿歸去拂􅃢瑚藥爐已熄勾庚火書箧閑抛遁甲符欲与陳陶同啖鮓秪令張翰逺思鱸不知别後詩多少刋到雲編戊巳無不見故人今十載平安喜得上京書頋我真吟紇干雀羡君閒釣冨春魚山房夜雨青燈外沙塞秋風白鴈􅀄終儗携琴隠湖曲一官垂老欲何如授􅃏天子臨軒授􅃏頻東南何處不紅巾銕衣逺道三軍老白骨中原萬􅀑新烈士精􅂕虹貫日仙家談咲海揚塵只􅀅滿眼凄凉淚哭盡平生幾故人左丞􅀓夢臣歸老汾曲賦以壽之六朝名徳仰巍巍未許家園乆息機霖雨帝方思汝作衮衣人更望公歸南山一柱標中土左轄三星拱太微欲向賔筵頌眉壽寸心遥與白雲飛王􅁇學㢘使遷南臺侍御史詩以賀之天上歸来錦作􅂁幾陪春色醉仙桃銀河有路惟通鵲碧海無山不戴鰲卿月又臨仙掌動客星偏傍釣臺高廣陵此去金陵近擬拂塵埃望莭旄送西江胡允中之桃温萬户府學正遼水窮􅁁牟盖東鎮人今始識儒宫詩書直化三韓逺文􅁤須令萬國同隼度塞雲秋有雪鼇翻海浪晝多風知君囬首神州路一髪青山落照中余伯疇歸浙東簡郡守王居敬四明㳺客住京都旅舎青燈照影􅀌家信十年黄耳犬郷心一夜白頭烏却携長鋏辭金水直挂輕颿到鑑湖為問蠡吾王太守别来安穏有書無􅀉逹兼善經歴柯敬仲博士心憐旅寓各西東長憶樽前􅀏語同故國魚龍滄海上僊家鷄犬白雲中百年人物無多見一代文章有至公䓁是不禁惆悵事鬂絲黄葉共秋風宗人鳴善􅀅還武昌詩以叙別武昌城中官柳隂廣陵行客動歸心衣冠南渡悲豪傑江漢東流変古今多病馬卿㳺巳倦能詩杜老律尤深洞庭明月如相憶為寫清愁入楚吟次倪元鎮張伯雨錫山唱和之作鶴在青林鳯在阿騷人行處有吟窩西風落木秋来早南國浮雲日暮多欲賦朱華臨鄴水可堪白芷怨湘波期君不􅀒湖山約来聴吾儂襖靄歌荅謝看雲宗師壽帙綺叚之贈自信平生有道縁頻煩白鶴􅀉瑶牋錦分帝子機中織詩入真人誥内編予詩亦在刻中弱水蓬莱三萬里慶雲閶闔九重天擬抽玉刺􅀙飇御一到環樞問列仙送涂茂才北遊黄河十月巳流氷暫觧行裝駐廣陵逆旅壮懷銷斗酒故山歸夢入孤灯千金燕市方永馬萬里天池欲徙朋㑹是公卿有知已孝廉船上覓張慿荅韓伯清練溪見􅀉乆慙簮紱趋文舘擬問田園歸武林忼慨謾論當丗事衰遲空􅀒壮年心忘機白鳥何妨狎投老靑山不厭深聞道練溪春酒熟期君苕上共登臨醉郷半属華胥半酒泉封君惟有麴生權觥籌席上無多地風月壷中别有天千日夢醒如隔丗四時春盡不知年􅀙来此處蔵身好容我神㳺太古前送曹鑑克明自浙省貟外遷湖廣上流形􅀔控荆􅀭撾鼓飛帆入武昌莫府一時登俊桀朝廷今日際明良南樓詞翰題鸚鵡北斗旌旗下鳯凰好折椘芳遥􅀉與美人秋水逺相望越僧無涯號栖雲乞賦上方何處但聞鐘深護林扉翠幾重卧冷衲衣侵片石行随錫杖度千峰松晴毎下安巢鶴潭暮時㽞聴法龍更欲移禪沃洲去微茫嵓洞不曽封懷上饒祝蕃蕃逺時為建康學正聖皇端拱致時平妙選群才属汗青一代彌文懸日月萬方同軌走雷霆敢希太史紬金匱更待中郎冩石經出處與君俱有道不煩猿鶴謝山􅂕送歐陽遜老􅀙謙之湖閫照磨白雲親舎在湘東懷牒歸来晝繍同賔幕新趋元帥府朝班舊引大明宫劒横岩客南樓日瑟罷湘􅂕北渚風何處登臨最相憶江籬秋碧畹蘭紅送王季境還􅀭州兼述所懐逺憶淮南后土祠君歸春巳發瓊枝好㝷月下吹簘處猶及花前把酒時錦瑟金錢餘舊伴烏絲紅䄂有新詩故人相見如相問老盡當年杜牧之汪兖州叔志去思碑使君有道是民師惠政長㽞去後思秀麥不専稱漢史甘棠直欲􅁇周詩馴桑有雉童俱化攫肉無烏吏絶欺東魯自今應􅁓貴一時争打兖州碑臨川㽞别冝黄樂􅂎楚材當年携酒杏花春同是西江榜上人歳晚異香為客乆夜来歸夢到家頻鴈聲􅀌舘迢迢雨馬影斜陽漠漠塵悵望与君江海别幾時髙􅁩復相親􅀉荅張五丈師䕫明府時在莆田舊令龍溪有去思移家喜與土風宜人傳張籍妙樂府我識王維真畫師火米夏収畬稻早海椒春放瘴花遲客查不到天無鴈賴有輶軒可􅀉詩􅀉歸學士彦温時寓夏縣老筆攵章史漢間喜聞華髪映朱顔司空舊隠王官谷開府今稱􅁃子山一色黄身丹竈火十年清夢紫宸班與君歳晚須相見乆辦歸田䟽乞還􅀉韓文璵與玉自驚六十八年身老病蹉跎又見春京國􅀊􅀊稀雨雪江淮兵乆尚風塵郷書屢絶親知逺官俸常空僕馬貧只憶練溪韓與玉封詩􅀉與重傷神春闈和周伯温韻呈同院鼓角聲沉漏未終夜寒官燭屢銷紅百年海岳囬元氣一代文章有古風仙掌露漙金沆瀣觚稜雪散玉玲瓏秪慙白首河汾客得與群賢此㑹同􅀉郯九成即事自述豎儒無術善飛鈐鏡裏形容亦自嫌憂丗不堪才力弱告歸方畏簡書嚴風沙􅃤淡寒吹㡌星斗光芒夜近簾此際思君倍愁絶何山容得老夫潜􅀉成居竹時張㓂巳受詔而隂襲􅀭州戰骨填溝塵滿城尚書歸􅀃使人驚方期勃海民霑化豈意平涼賊畔盟何日皇天知悔禍中原故老望休兵傷心揚子洲􅁁月忍聴江流是􅂘聲髙沙失守􅂘知府李齊公平髙郵自昔號銅城一旦東門委賊兵殺氣倉黄迷野色怨魂嗚咽泣江聲廣陵瓊樹春仍在甓社珠光夜不明白首故人悲趙李臨風唯有泪􅀙横㕘政趙伯噐死泰州潼􅀜失守􅂘叅政述律􅇐存道十月三日天地昏􅀅軍拒賊死轅門火飛華岳三􅀜破血浸秦川萬馬奔望越伍胥徒抉目戰箕先軫不歸元北風吹盡英雄淚􅀝劍悲歌一愴䰟􅀉荅翟彬文中時避地慈溪往年使過慈湖上風景依稀可畫傳紅葉樹蔵秋水寺白頭僧渡夕陽舩竹林雨後山多筍漁浦潮来海有鮮藉是縣公能愛客不妨酧唱酒尊前陳麟為尹静對􅀌燈思往事偶聞踈雨落寒窓愁􅁁白髪三千丈夢裏青山十四双蜀魄有聲疑訴國楚招無些憶沈江只應詩思縁君苦唫㫁遥鍾巳曉撞食粥病齒入冬便食粥瓦瓶煮豆給晨庖鄰人新酒賖来醉道士竒方借得抄鴈喜随陽還北郷鵲知避􅀊巳南巢故園我亦無歸計且作齋居盖白茅聞歸集賢逺引奉簡一章時吕左丞歐丞旨司尚書繼亡故亡相看逐逝波思歸無路欲如何􅀅軍每咲檀公䇿朝士徒悲穆氏歌南海明珠来貢少中原健馬出征多先生似􅀃将髙舉不遣㝠鴻到罻羅題馮士啓士可蔵書堂不惜黄金為買書要令弦誦􅀍郷閭聖賢事業千年上經史文章萬卷餘借送詎論鴟有酒収蔵長愛螙無魚它時許下成精舍岳麓匡山恐未如分韻􅀲歩送司執中之江西憲府照磨山前古驛草䔥蕭候吏沙頭候畫橈采石晚風人渡急歴城煙樹鳥飛遥時平烽火沈江戍市早魚鹽散浦槗目送征帆謾相億秪􅀅􅄐恨􅀉囬潮分題投書渚送沙彦文架閣之江西髙人豈作置書郵盡棄函封向石頭故迹不随煙草没遺風長與大江流悲臺鷹下川雲暮别國龍回岳雨秋君過渚旁須檥棹題詩相􅀉莫沈浮分題􅀂耶溪送胡一中允文録事之紹興五雲溪水碧縈湾純浸蓬莱郡裏山金躍冶鑪龍巳化箭空仙的鶴長閑棹歌洲渚夫容外人在樓臺罨畫間唫賞捴輸賢録事樵風日暮送舟還􅀉題睢陽張文昭存齋之子山房結數楹静無塵累已攖寜此心炯炯同千載吾道皇皇有六經雨後儀刑山更好窓前意思草長青功夫要在存存熟便是齋居座右銘題四皓商山圖兵塵澒洞繞函􅀜不到商於六里間赤幟頻傳秦楚蹶白雲自與綺園閑龍虵陸起嗟何在鴻鵠冥飛竟不還千載髙風無復見空餘芝草滿空山玉山墨工魏元徳名一時贈之以詩魏郎應得庭珪法未數松泉林嵩與雪堂吳宇萬杵熟􅑟香入劑一螺􅀧漆黒生光論材合致圖書府㽞價争傾翰墨塲我有詩嚢須剰襲草玄歸去老山房山友爲金閣山田道士作山人愛与山為友住得山前地幾双為納白雲長掃室欲延青嶂别開窓嵐中笻跡粘苔磴風外琴聲瀉石缸應是烟霞數仙侣月明時復下旌幢望江是􅀊台越飢寒潮巳退大江空不見来鷗與去鴻半嶺彩霞􅅶落日一川紅樹照西風魯連蹈海英􅂕逺王粲登樓感慨同徑欲投竿㑹稽石得魚為飽制河東􅀊晏竒寒癡坐氍毹􅀋凍蠅霜風吹折布衣稜爐翻􅀫火随􅁅䧟杯覆燖湯到地凝虎豹凍埋山盡雪魚龍寒縮水連氷濁醪最觧強人意吟短西窓一寸燈􅀉荅莫惟賢景行故人音問乆相踈忽􅀉新詩良起予半捲長牋欹枕讀盡拈佳句繞窓書此生舘閣嗟留滯何日兵戈見掃除歸覓南屏山下隱酒杯茶竈共閑居荅馬易之編脩病中作喜君近疾已平安楮帳緜衾且避寒飯顆任嘲詩骨瘦糟丘能遣客懷寛天街鐘罷朝􅀄動海國書囬􅀊又殘勿訝衰翁不相問北風吹雪正漫漫􅀉成居竹黄舜臣歳月峥嶸春又来歸心遥在故園梅十年厭見風塵惡萬事徒增耳目哀大漠平鋪沙雪去逺山直枕海雲開近懷欲報成夫子強起題詩對酒盃一見君詩倍黯然薊南吳北各風煙故人漸似星􅀅曉塵丗真成海變田桂在謾吟招隐曲鶴歸還記去家年虎丘山水知無恙有待先期置酒泉至日微雪家人盡上􅃁獨坐小酌忽忽又逢長至日此心寒似琯中􅁅尋思一日老一日得飲數杯還數杯鵲知太歳改巢去雨􅀍北風吹雪来醢兔羞鴽良不惡餕餘聊遣凍顔開送普顔彦仁都事還蜀兼柬文時可郎中送君一􅀐發長安王事方殷肯避難使者好㝷巴道路遺民思覩漢衣冠江来灌口聲􅀄放雲接峩眉翠不乾為報郎中勉勛業逺音時遣破憂端題括士朱榘方火五松隐君業在括溪東種就長松翠􅀝空一夕蛟龍起春雨滿山鱗甲動天風也知造物生来異未許煙霞畫得同想見青田舊巢鶴時時来唳白雲中吾廬吾廬幽似野人家時􅀝南軒玩物華亦有君臣槐腹蟻也能鼓吹沼中蛙鄰翁来送新篘酒堂吏求抄舊草麻早晚乞骸尋舊隐不妨高卧傲烟霞歙江希仲罕代自雄新二州警曹話其風土為賦越鳥巢南漲海東地兼夷夏氣惟雄洞深屋壘曽厓上龍險舩行亂石中春樹濕雲生桂蠧瘴茅經雨落沙蟲宦游最數蠻荒惡羡子歸来面更紅病起偶題丁未閱丗悠悠八十餘此身天地一蘧廬季鷹只愛生前酒司馬空㽞後丗書野散未歸鳴澤鴈水煩徒噞在淵魚可堪濩落風塵裏兩髩霜毛頓覺踈飲故相園宅相君池舘舊撝訶今日還容野老過裂地商於真已矣積金郿塢竟如何胡僧謾演寅朝偈女􅀑空悲子夜歌起向春風酹盃酒青蕪滿地雨紅多監中暮歸時廣帥進鰐魚放之潞河滿林木皆梟鳴日夜不止己亥歳也扶桑銅柱􅀂為標南望兵氛乆未銷秋水漲河􅀄放鰐晚煙籠樹盡鳴梟枕戈未睹栖於越舞羽曽聞格有苗河北諸侯捴戎翰好宣忠力佐王朝次韻閩僧秀嵓􅀉竹溪僧峯北峯南法界中丈藜来往夕陽鍾時過花洞逢㳺鹿夜呪珠臺放釣龍七字詩才清似水三生骨相古于松羡師方外渾無事只箇蒲團又過冬望入南雲無去鴻馮誰持餉一缾空詩来萬里燕臺下寺在三山冶縣東戯瓦室中惟見水掛旛窓外自揺風我今也擬辭簮紱去作嵓居三老翁送監生聶讓省兄山後譲父死王事書劍翩翩送子歸原頭想見脊今飛北風􅀜路雪雲暗落日客亭烟火微血立忠臣頭上髪線㽞慈母手中衣老夫惟有銷兵望早遣平安到虎闈東坡淮口墨跡卷後有黄䇿詩䇿號随縁子潮落潮生沙岸頭布帆来往幾經秋山川如故人何在天地無情水自流敗壘荒墟非昔畫野煙寒照捴新愁只應千古清淮月曽照東坡此喚舟壽許集賢可用予同年少七月圭塘諭徳真壽星斑衣戯舞滿中庭同年咲我雌爲甲上壽看君老復丁壷有仙公新授藥厨㽞長史舊傳經它時􅀂許相依住願割西山一半青病瘡少愈睹桃樹含蕚少遣春思􅀫隂􅀄觧見朝暾拄杖扶持強出門花蕊漸紅春有魄海波純碧涷無痕此生未了文章業何處堪㝷水竹村凖擬杏園携酒去滿前怊悵不須論院和御史李起巖明舉韻山繞神京海作池萬年天子夀無期諸生入對陳三䇿廣殿賔賢設九儀治道直超金大㝎人才不數宋淳熈老儒叨佐春官選竟日􅀙容出院遅春色先囬鴻鴈池郎君已及看花期磨崖欲作中興頌于澤􅀅行大射儀弱柳過風殊媚嫵輕雲籠日更光熈綉衣妙絶陽春曲自惜衰才属和遅次韻劉希曽師魯避兵病懷滄海珠沈劍去􅀌百年同夢化人都山雲時認䰟歸惡壟樹遥憐泪洒枯􅀒米仲由那復得弄烏莱子欲誰娱􅅍􅄐我亦傷心乆忍讀君詩向坐隅送四明道士陳士元敬止歸玄妙觀絳莭南歸越海涯四明山下有仙家羽人傳是中黄子閣史真成蔡少霞瓊笈瑣雲蔵玉籙白泥封竈養丹砂歩綱壇上空歌處想見神霄落花其師王致和新建宝閣曰通明内府以香旛賜之崔行之為求豐道士余剛中作林泉釣艇圖求題道人何處不天㳺時把漁竿放碧流一卷黄庭舩子上數椽白屋水􅁁頭磯空下峴雲猶夕鶴去􅀌山月自秋無限林泉如畫裏雨簑烟笠好歸休送崑山強仲賢照磨之南海元帥府看君才氣夐無双徃佐賔筵鎮海􅀖未報美人青玉案且盛壮士碧油幢喚舩椰葉迷蠻驛對酒蕉花映客窓别後平安須越使鴈飛不過嶺頭瀧送貴溪彭伯峕教授之髙州􅀩古學都門柳色緑紛紛惆悵南轅此送君嶺海驛程須給傳國朝字學要同文鼓来野廟迎蠻􅀑火燎山田落瘴雲藉有㯽榔与藤酒冷官聊復送朝曛樂平劉復􅀄隐居四詠景陽之父東臯南畒雨新晴杏花欲開菖葉生田婦蒸藜来午餉鄰翁荷鍤趂春畊烏犍引犢村村出布榖催人處處鳴歸與兒孫共閒夜一窓燈火讀書聲右畊田決決寒流底處㝷但傳幽響出空林石根雲竇元多罅風􅄜松篁共一音醉夢聒醒春枕熟詩懷清徹夜窓深中郎别有青溪曲更冩潺湲入素琴右聴泉醸法傳􅀅道士家春醪一味採松花常時野坐開新瓮幾度山行載後車忤客有誰焚醉日學仙何處飲流霞明朝又覓南鄰伴還汲清泉洗石窪右飲酒􅃞􅃞清波浮紫鱗一筇閑􅀝樹􅁁身我疑濠上漆園老誰識江頭漁丈人細草㽞連還可藉野鷗来徃自相親此中正得悠然樂何用扁舟把釣綸右觀魚成居竹有詩見􅀉因郯九成行用韻荅之歸隐山林嘆未能強支丗故力難勝少狂欲作􅇷風驃老退還如􅀍涷蠅賦客有愁逾萬斛兵厨無酒可三升與君㑹結東家社珎重衰年護寢興送燕山楊文周之汾州敎授􅀜河迢逓入汾陽暑雨􅀄収陌樹蒼名士多為文學􅁺此州今有狀元坊鴈来霜塞秋聲急鳥去烟臺野色荒試問西河讀書處因君石室重輝光怒浪蹙天摧漕舟疾風吹雨黒中㳅海神躍馬火明㓕龍伯連鰲山蕩浮安得􅂕查通漢使㫁無竒藥採瀛洲丈夫政要經艱險不􅀒平生亦壮逰景􅀄押粮至成山􅇜風沈米六萬石得小舟以免我憶括山老徴士卷霧飛談那可當髙致何如漆園吏幽居真是鄭公郷未能即去楚氛惡毎一相思雲樹長欲覓双魚問消息越来溪逺水茫茫鄭明徳匡山道士軀幹小豪氣直壓香爐峯池􅁁呪劒出金虎峡頂放舡飛白龍老我毎推詩俊逸何時相見話􅀙容散仙萬一煙塵外爲報巢雲􅀂个松于彦誠近報崑岡亦􅀍兵知君撫劍氣峥嶸夫差強弩風生海姑蔑􅀾旗雲遶城天詔屢傳寛宥下王師行見掃除平草堂無恙王山好我欲南轅㝷舊盟顧仲瑛雪中梁師孟叔原餉渾酒小紓悶悰偶成一章􅀊事䔥條雪擁門家人隨分具盤飱鏊頭餅軟􅇛團白缸面醅新盎盎渾萬竅風聲皆地􅄜一窩春意自天根老夫只待干戈息歸問西湖水竹村送偰元魯降香南岳南海天開朱岳奠炎方地入南􅈚接大荒使者肅脩時典祀神明冝護國封疆仙臺雲散峯巒碧瘴嶺春囬草木香珎重詞臣致誠禱願消昏癘降休祥試院泰甫兵部既荅和拙作且示佳章僕以汨扵校文遂稽貂續仍韻見趣所考既就格輙綴四首録奉一咲堆牀朱卷考􅀄分衛士傳呼夜瑣門泛駕巳多東野馬摶扶應有北溟鯤熟衣乍喚寒猶薄倦枕􅅻馮睡易昏願冋斯文求俊乂大廷行對帝王尊樓頭㬪鼓巳三嚴起聴秋聲滿四簷山葉落頻風繞樹露蛬吟苦月當簾烟寒銅獸催香換漏促金徒報箭添咲我元無食肉相只思蓴鱠薦吴鹽倦眼空花漫不分偶隨群彦集金門扁舟只擬􅇷張翰一壑還須置謝鯤楓葉舊詩多冷落梅花歸夢幾黄昏与君此去如休睱莫厭相過共酒尊詩律輸君敢闘嚴強摩老眼傍風簷鵠􅂁夜散遥持燭席舎朝開盡徹簾乆悟物機忘出入時存神火驗抽􅄈明當喚取弹筝手與唱新聲阿鵲鹽九月二日掲曉僕以朔旦始得間復成二詩録奉泰甫侍郎思齊御史本中都事道明敏文伯崇有志諸僚友觧送推君藻鑑分􅁄圍明發喜開門荆人自許山多玉莊叟虚談海有鯤過鴈風髙秋索索護霜雲薄曉昏昏郷来曽預春闈考猶記君王賜上尊西風漸急早寒嚴曉露俄晞日在簷滿鼎松聲烹活火半鈎花影捲踈簾菊黄又報秋期近髮白空驚老態􅄈未得山中覓茅屋去修丹竈養紅鹽汶上早行圖上清張道士冩絳莭前駈海日生川囬巳見汶陽城數峯曉翠和雲濕千樹春紅照地明原隰使華来煥爛河山風物入經營馮君更冩千岩月與聴笙鸞夜夜聲白鷹愛此精神頋盻雄扶餘遥隔海濤東俊含金氣翎如雪直上秋雲骨有風絛鏇五坊禽獻後錦貂千􅀐獵圍中平原側目多狐兔安得真拳一擊空庚子元日早朝大明殿小飲自述玉殿齊班對正衙退朝冠盖滿東華青天徹曉無雲氣黄道囬春轉日車閑染彩毫題帖子喜􅀅緑酒汎椒花老身只待承平了携取来書問故家仙興騫林樹樹玉成圍皓鶴彩鵉中自飛玄石山人千日酒上清仙子六銖銖道心不動方歸樸物化無方緫入機自炷蕪香明月夜露壇東向禮􅂕威自悼并􅇷和二首十二樓空月自明一圎一闕総関情毎從􅀞裏瞻瓊在復向詩中記受生魂不歸来悲楚些夢還驚覺厭秋聲遥知别鶴離鵉思只在芙蓉海上城夢中常苦不分明天上人間各有情桃葉竹枝無限思􅂕芝瑞露可憐生􅈍蘭謾織回文字鸚鵡猶傳響板聲欲得近音何處問風烟􅃒断武林城悼亡日是早題􅀞梅一幅夜夢梅花盛開有感剪水裁雲聚作花直敎顔色冠芳華一双仙子玉條脫三尺天家香辟邪南國好音􅀅過鴈西窓殘夢巳啼鴉年年此日傷春思忍把歸心賦落霞病中小兒舞䄂斈齋郎大女咲看旁鼓簧狂客有時来獵酒老夫無事坐焚香前家後家雜􅁔􅂘南斗北斗相低昻病卧經旬不出戸墻角青青春薺長遣興七十蛻翁衰病餘一室􅌂􅀂維摩居孔方無神可使􅀑毛穎巳秃不中書江湖天逺道塗断鼓柝街寒風雪􅀄糠紇明年恐未飽欲於何地托吾廬至後暴日火暖氈床擁病翁遣懷篇翰底求工視悲歌徒能壯斈坐禪僧要自空渇旦猶鳴天有雪爰居巳去海無風只留一段思郷意不見詩中見夢中九日書似北山上人先夜雷􅀨老年􅀹惜過芳時籬下黄花值閏遅夜雨有愁如濕絮秋風無髪可吹􅁝勞䰟数数還郷夢往事茫茫感興詩滿腹精神渾减盡一杯誰与共􅁭期中秋望亭驛對月代祀北還月色滄波共渺茫驛亭雜坐看湖光仙家刻玉青蟾兔帝子吹笙白鳯凰芦葉好風生晚思桂花清露濕空凉囬查使者秋懷闊倒㵼銀河入酒觴春日小軒獨坐江南椶笋正時新滋味還思養病身暮雨過雲􅀄有電老鶯啼樹巳無春虚名晚合徒多累同輦生存僅数人净掃虚軒炷香坐只􅀅篇什擬心神清明日杏園獨坐底事東風太放顛為花渾廢夜深眠賞心不有閏三月老眼應虚春一年歌舞盡傳天上曲咲譚同是酒中仙歸時更愛東城道月在秋千影外圎長至日偕諸友遊故宫皇天有数混南􅀖組練長駈萬里江内井龍沉軍檄在西郊􅄦泣帝車降河開故道穿宫籞殿鏁秋塵暗佛幢欲問㒷亡遺老盡晚風鈴語白摐摐中秋雨明日晴明玩月有作今夕清光不􅀒公更無雲氣碍虚空晴遲一日秋才望看到三更月正中蟾兎影寒天下露魚龍魄動海生風故人别有蕉山約未放扁舟一鶴東正月九日夜雪甚寒雪後西山照眼青早寒微霰又飄零昨非未必今皆是衆醉何由我獨醒斈􅂐毎朝臨碧落有神長夜養黄庭􅀂為喚得瀛䑓侣相與吹簘上杳冥長至後一日小集張氏小軒留題金殿當頭是廣寒䦨干高􅀝五雲端山衘落照虹光闊海蹙長氷玉氣乾仙客上昇惟控鯉月娥来舞毎乗鵉更須載酒春晴日万頃風漪快一看十月望夜月食既戊戌歳翳翳氷輪漸欲無滿城鐘鼓競喧呼明銷魚朏渾應减蝕尽蟇腸正可刳后羿薬灵知不死臣仝心切望全蘇夜䦨失喜清光滿一片霜風凍玉壷喜雪􅂤社友廣􅁜今朝臈日􅀄飛雪一白先期報歳豐坐見洪荒還太古信知造化自虚空詩情􅀞意天機外和氣􅂬声帝力中便欲訪君僧舎去凍泥晴滴阻西東清明大風雨隂霾連日惡風生老去愁多骨亦驚天色昏昏轉黄濁春光冉冉又清明隣家緑酒􅀄開瓮遊女香車不出城須爲杏花賖一醉誰家園裏有鶯声雷火焚故宫白塔辛未二月十三日数声起蛰乍聞雷驟落千山白雨来恐有恠龍􅇜電取未應佛塔􅀍魔烖人傳妖鳥生譌火誰寛胡僧話劫􅁅豈復神􅂕有遺恨冷煙殘烬滿荒䑓中秋樂陵驛玩月考試官季狀元王助教同行西風吹盡馬蹄塵凉夜中庭蹔觧巾華月􅇛團生兔腹黒雲片片散魚鱗髩毛老去如黄葉詩思秋来滿白蘋楽飲与君須逹曙㪯杯相属恰三人清明雨晴游包山龍華寺過慈雲嶺當年玉輦此經行古寺猶題扈􅀙名龍鳯䜟空山氣歇馬羊劫換海波平野桃着雨春紅落嶺路霾雲濕翠生日莫人歸烟樹黒飢鼯啼雨上宫城送春荅何髙士湖山不見莫雲渾楊柳風寒早閉門情在舊游花歴歴酒淹殘睡雨昏昏種桃道士今何處采若騷人不返魂欲識傷春無限意杜䳌枝上有啼痕家居九日日時予祝子􅀋值禁酒丁未􅀊也病餘痩骨不勝秋早起驚寒巳索裘安得酒酬佳莭醉􅀙教花為老人羞螟蛉有子寍嫌祝蛱蝶無知底用愁卻咲江湖舊詩客凄凉猶憶少年游喜雪荅鶴齋薛逸人曉雪􅀄飛應􅀊華因風吹起整還斜石田不種皆成玉瑶界非時自雨花道士擁爐衣􅀋鶴麻姑送酒䯻如鴉懸知此際神游処只在蓬莱海上家七月廿九日書所見杏花樹底血猶紅一􅀫星痕雨洗空鳯闕􅇷班􅃪帝詔羽林坐甲衛皇宫天官占候徴玄象國士精誠貫白虹引領雲間望笙鶴朝来佳氣巳葱葱過李陵䑓分敎上京路出桓州山縵迴僕夫指是李陵䑓樹遮望眼仍相弔雲結郷愁尚未開海上抵羊秋牧罷陵頭石馬夜嘶哀英雄不死非無意空遣歸魂故國来雪中早朝北風吹雪浩漫漫曉出津槗立馬看春入上林花樹早水連平地海波乾金城万雉微茫濕月闕双龍贔屓寒今日天顔知有喜紫宸朝下散千官夕次楊村烟中帆影落軻峩繫䌫沙邊巳夜過風驟数声来海樹月移半暈入天河得歸始斍形神王望逺空留感慨多坐聴舟人語明發芦花秋水正増波西興渡携家迢逓過西陵江霧微消海日昇帆影畫驚沙上鴈舩声斗落頭氷果園霜後􅀄分橘漁浦潮平各下罾歳晚不思行路倦剡中佳㒷正堪乗辱井欄爲御史所碎㽞片石斈之心甞好亊能収㫁石存摩抄堪憶古雲根楼空野燹鐘何在宫没寒蕪井已眢古􅂐半留攔上字妖􅁎猶有墓中魂試捫凹処殷紅濕不是燕脂是血㾗七言絶句送林崇髙還武夷山雲巖巖下聘君家長記宵談到曙霞今日壟頭誰灑飯鷓鴣啼老白桐花武夷山中毛竹多神君一去柰愁何松風尚帶琅璈響散入遺音作棹􅁔七月望日徐勉自武林来得兩赴音海舟隔歳望囬音及得囬音恨更深􅀙此逺書無用􅀉九原蕪没轉傷神外家䘮逝赴音来女嫁桐陵亦告哀老眼今朝方是哭百年心事捴寒􅁅予京居廿稔始置屋􅂕椿坊衰老畏寒始製青䑕􅂁且乆乏馬始作一車出入皆賦詩自志五槐濃緑䕃門前東宇西房数十椽不是衰翁買屋住歸時㽞作雇舡錢青䑕毛衣可禦寒秃衿窄䄂放身寛􅃒頭更著狐皮㡌好个儂家老契丹淺淺輕車稳便休何須高盖与華輈短轅不學王丞相下澤聊為馬少游讀瀛海喜其絶句清逺因口號数詩示九成皆實意也一日粮舡到直沽吳罌越布滿街衢新詩􅀅得如千首為問郯郎有買無接粮御史性情真㫁事官来苦怒嗔索酒索錢横生事􅇜風􅇜浪肯知人客窓昨夜北風高猶似乗舡海上濤明發先冝覓貂䑕喚人来作禦寒􅂁虎賁坐甲夜傳更千歩廊街鼓柝聲未許離人眠得熟馬蹄車鐸又天明拂郎之馬走千里獨立長嘶凡馬空昔在江南看圖畫今来天廐識真龍賽娘十五觧新聲楊柳腰支恰囀鶯好冩潘郎胡十八敎伊傳唱滿京城長川妓子早晨来戴笠􅀐驢帕擁顋捴在狭斜坊裏住教坊日日聴羌回杖屨㝷花虎丘寺壷觴按曲舘娃䑓阿成殺受吴中樂請入風沙海浪来結束黄騮粉畫韉更投西市買長鞭知儂巳有南歸日戸部来催助燕錢大風塵土漲天飛􅃒眼烏紗拍馬歸還是洞庭湖水好待郎来浣舊征衣大年小景雪窓二蘭其一摘竒一川風柳緑傞傞古木茅茨近澗阿溪上無人舡不渡水禽飛處夕陽多春澹空山不自聊幽花老盡國香銷只今愁絶沅湘路誰与傳芭賦楚招采采幽芳不􅄹把好収風露入銅缾虎丘老衲今何在思見春牙石上青幻闇宗師以詩招賞海棠文申有詩見約次韻自是仙家春日遲紫緜無数裊柔􅁝馮君多置看花酒肺渇如今似漏巵環樞堂上遲明来要向花前不放杯只恐狂風無頋藉盡􅀅春色委蒼苔好懷日近少曽開心憶湖山首屡囬不是故人多雅致誰能相約看花来廉子祐歸省金陵且就秋試作三絶句贈别故園歸思浩無涯更聴啼䳌惱客懷後夜月明應有夢先随潮水過秦淮陌上吹衣柳絮風馮君莫放酒杯空歸舟総是傷情處一路殘山剰水中自昔髙科取俊英布衣徒歩到公卿廟堂今日求才切正待諸君策治平王杲東白墨蘭樵題詩用韻其左并寓所懷光風葉葉露香新欲采幽芳惜暮春幾處玉笙吹夜月瀟湘雲断不逢人早出北城迎社稷香輿我如老馬怯征鞍推起東􅖠欲起難昨日風雷􅇌雹過滿衣明月五更寒偶成二絶句簡魯威學士雲物凄凉小雪􅀄半庭殘菊蝶来踈連朝筆研多忙事借得東泉學士書病起頭顱不可風南窓晴日正融融天憐老境無差使乞与詩篇酒醆中
