body:
  text: 郡樓晚望全晉山川氣象開滿城烟樹擁曽臺土風舊有堯時俗人物今無楚國才千嶂晩雲原上合兩河秋色鴈􅁁来昔賢勝賞空陳迹落日登臨画角哀鴈自代過晉嶺客中感興鴈行􅀄自鴈門来逺度平沙陳勢開光禄塞空霜氣冽受降城廢水聲哀烏孫公主􅁔難和猿臂􅀅軍射来回今日客中膓易㫁不須更在最高臺茌平道中風起征塵滿髩須頻呼驛卒緩前駈巳悲白骨多新􅀑尚􅀃黄巾半畏途麥老大田鳴乳雉草深荒徑竄妖狐停驂欲飲􅀲園井􅀏倩隣翁放轆轤宴四明江中醉卧及醒舟巳次車廐站使莭重来省昔年舊逰零落一凄然山川在眼空陳迹􅁔舞催人又别遥風捲潮聲全海起雨分虹影半空懸酒醒唯有斜窓月偏照姚江獨夜舩登樂清縣岑山亭百尺新亭起碧岑長藤古木欝蕭森山重山掩分吴越潮落潮生自古今飛鳥去􅁁浮海色夕陽明處散秋隂五雲長近仙臺上時聴鸞簘月下吟石門書院瀑布飛泉噴薄下靈湫疑有龍居㝡上頭長日風雷穿石起半空河漢決雲流青牛隠去神宫在玄鶴歸来洞府幽弭莭名山諧􅀫願築居終羡昔賢㳺西峡渡江上日高寒霧開渡頭風順蚤潮回中流白舫翩翩下兩岸青山衮衮来蛮媪綄紗衣佀雪驛夫到岸鼓如雷􅃕人起掲篷窓坐􅀏割羊桃薦酒杯湄洲屿飛舸鯨濤渡渺冥祠光壇上夜如星蛟龍筍虡懸金石雲霧衣冠集殿庭萬里使軺㳺冠絶千秋海甸仰英􅂕乗槎欲借天風便彷彿神山一髪青次福清宏路站州守林清源邀飲治所酒家籬落隔青棕更在輕烟細雨中繞郭好山横晚碧縁溪芳樹立春紅故人雪髩年年老大守風謡處處同十載相逢又相别不堪回首海雲東浮山道中處處人烟有酒旗楝花開後絮飛時一溪春水浮黄頰滿樹暄風呌畫眉入境漸聞人語好看山不厭馬行遲江蘺緑徧汀洲外儗折芳馨慰所思北行苦雨待程􅁇先舟行老態巳成便早睡呼兒更與助深盃半窓風雨催秋到一夜湖山入夢来潦水無根殊汎濫蛩聲多事苦悲哀不知明發縁何喜滿意燈花落又開􅀉龍翔訢公長老古笪橋􅁁夾道斜老禪方丈梵王家山人宴坐時分芋天女飛来或散花護法神龍蟠結構㝎巢春燕避袈裟此生巳悟空無住欲就莎房借鹿車登嚴先生兩釣臺兩臺有逕可躋攀老樹長藤薈蔚間魚釣自忘天子貴風雲何似客星閒鐘催夜月来􅀌寺帆挟春潮過􅅍山寂寞羊裘軒下路幾人携酒酹潺湲滕王閣晩望岧嶤傑閣􅁸城臯尚想君王結構勞楚國山川推壯麗唐人文賦擅風騷天開彭蠡連江闊山向畨禺入嶺髙萬里登臨一懐古朔雲秋興正滔滔南山蓮社偕韓友直伯清昆季㳺龍井寺長憶東林逺法師三生張野有前期經書貝葉繙重譯漏刻蓮花禮六時長老布金多滿地高僧卓錫自成池不妨随喜諸天上扶得風篁玉一枝天竺山中訪項可立不遇葛洪川畔千年寺路遶長松一澗分潭影青移行處岫嵐光白散望中雲猿公吟樹應思侣鹿女㗸花不􅅍群常羡山僧專勝㮣水声林下百無聞游萬松菴黄塵撲馬出西城忽見雲林眼倍明竟日寂無山鳥語滿風純是澗松声石幢花雨何時禪榻荼烟特地生客自去鐘􅆊外老僧於丗巳忘情扈􅀙之上京過龍門兩厓高立色冥冥仰視空光一罅靑石兀馬蹄危不渡水漂龍氣暗聞腥山川壮自開天險風雨隂疑来􅀑􅂕我欲重㝷舊題處􅊜雲寒蘚滿岩扄㳺武康禺山㽞􅀫昇元宫白石西􅁁山更青杖藜塵外得經行鳥翻夕照落空翠人逆松風聞澗聲道士煑茶㽞夜話田家燒草起春畊也知真境多佳􅃐儗約衡茅􅀉此生四月護三䘮渡江之宴塢􅅍雲散黒収殘雨落照浮紅滿大江烟際小星􅄈箇箇沙頭􅀫鳥下双双文章爛熳工何􅀘膽氣峥嶸老未降新喜仙翁与􅇚子買山容作讀書窓天竺北峯行香汎舟湖山堂肩輿直過上湖西泱漭晨光逺欲迷風起澗松清不暑雨乾石路净無泥泉分絶壑流􅁁續雲到高峯盡處低投老寧能數来往把杯洞口聴􅆐啼聴松軒為丹丘杜髙士作長松千樹擁前榮虚􅄜還􅀙樹㡳鳴一片海濤雲杪堕幾畨山雨月中生茶香夜煑苓泉活琴思秋翻鶴帳清安得南華老仙伯相随軒上􅀃風声􅀇圃為上清道士周静脩題路上仙岩最上溪仙家住處有丹悌瑶臺鶴下天風冷靈瑣花深曉日迷五色芝房􅇛紫盖千年石髄裂青泥羽人即此宜高􅀮豈在崑崙萬國西梅雪齋為紫霄宫楊逢賔題雪樹生香滿佩巾紫霄最上集仙真苔荒鶴跡渾無路花暗笙声不見人瑶圃月寒通白曉丹臺雲煖駐長春莫敎流水山前去恐似桃源客問津犀山凝翠臺為上清道士劉伯逹題仙舘深居寂寞濱千岩濃翠􅊜無塵築臺一日臨風雨駈石中宵使􅀑神潭上晝游魚聴瑟花間春醉鳥衘巾山􅂕不是蔵真境㽞待雲棲斈道人愛松亭為嘉禾三塔寺寛雲海賦醉李湾頭窣堵坡種来松樹繞庭多碧䊀老甲渾苔蘚黒入秋隂半薜蘿古刹每聞龍捨宅神僧常似鳥為窠無人倣得韋侯筆与作山堂帳子歌氷雪菴為衡岳北山上人賦衡岳山中老道人一龕一衲足容身禪林出㝎白生室詩境行吟清入神瓶水不凝龍氣煖石門長掃虎蹄新只應煨芋燒茶外乞火時時到寺鄰雲松巢為翰林學士王公儼作髙人自昔愛雲林儗作幽居寓素心遁丗每懐箕叟隠題詩聊效謫仙吟幾畨白鶴迷秋夢半樹青蘿􅀘夕隂獨坐天風洒毛髮高寒何似玉堂深醉月堂為萬声逺作月有秋期酒有郷虚堂中夜挹流光九天零露濺尊爼萬里高風扶佩裳白鳯飛回声縹緲玉笙吹徹夢清凉醒来却覓神㳺處狼籍中庭桂子香不繫舟漁者陳子尚自號本来無繫亦無舟随意江湖可漫㳺縦遣西風吹水外不妨明月爛沙頭人情平地波瀾起身丗虚空日夜浮安得􅀙君歸把釣只􅀅吾道付滄洲浮雲道院在吉安百年身丗与雲俱日看紛紛変態殊江雨欲来龍氣黒天風忽散鶴声􅀌行蔵与道同舒卷冨貴何心較有無此意髙人還盡解數椽營在楚山隅石田山房為毛叔逹作犖确􅀄開百畒荒四明山麓有丹房種来玉子双双白鑿破雲根寸寸方赤水洞天宜避丗全椒道士可休粮㑹㝷瀑布声中去一洗吾生浩劫忙雪巢為上清劉道士賦􅇛團茅盖一巢輕雪滿千山虚白生象外乾坤還太古望中楼觀盡通明雲蔵􅀫鶴渾無跡氷落長松暗有聲人在空寒最高處羽衣瑶佩不勝清次韻劉伯貞与金山即休了長老唱和老禪居處水雲重此地纎塵不可容潮色平鋪無際海日光先上最高峯踏花佛馭紅牙象獻寳神􅀐白耳龍第一江山第一座幾時来聴講時鐘北山禪房次危太朴韻一簞小􅀉青蓮宇尺五巍臨白玉京名藥曬庭分草木好詩書壁􅇎真行劫塵息後心源淨僧臘髙来頷雪生我住巷南師巷北相過談到暮鐘聲游金山柬即休了公八十了公如古佛禪心乆巳㑹真如飰供南海浮来鉢經鈔西天譯後書持呪降龍秋雨歇焚香迎客晚潮􅀄此生終儗依蓮社猶苦塵縁未破除􅀉越寳林别峯嘉禾水西仲銘越絶千峯有别峯老禪宴坐􅆊王宮願中結習三生熟機外忘言萬法空錫影夜飛天姥月鐘聲曉度禹陵風孔淳自許游方者須覓岩居竺法崇劫􅁅不到爽溪亭珎重堂頭老仲銘朝暮鐘魚仍􅆊唄虚空龍象自神􅂕幽禪㝎後燈縣壁清盥閑来水在瓶草座麻衣亦吾事㑹㝷臺上共繙經􅀉越能仁用章俊禪師晚莭樷林道欲􅀌喜公赤手縛於菟千岩萬壑平安否淡飯長􅹺飽得無坐觀山童窺止水講經龍女獻明珠沃洲勝㑹還堪􅁇豈獨東林有社圖􅀉清逺渭禪師自􅃪龍翔寺裏鐘劫餘金碧更重重天王按劍踏魔女羅漢弄珠降老龍蒲室千燈誰􅁇照渭川一􅂀自分宗未知今日西岡塔㽞得荒寒幾箇松西岡乃􅀏隠塔􅀉四明㝎水見心復禪師聞公近住慈溪寺今是璘師苐幾燈咲我在前圖作佛只今投老欲依僧瓶中舎利蔵来長窓外猕猴喚得譍㑹拂塵衣上方去天香樹底乞花蒸􅀉平江開元寺雪窓光公蜀人獨木山寮晝不開禪餘香印巳成􅁅寺分麋鹿臺前住人向魚鳬國裏来佛盋供多光􅀋玉祖衣傳乆色如苔一枝得箇邛州竹拄到雲居不擬回送西江賢古愚上人山僧新自豫章囬千里還乗渡水杯問法諸天龍象遶談經半夜􅀑神来西峯夏觧江雲變南國秋歸野菊開欲扣心宗塵外侣白頭今日已成􅁅送範準堂住天台法輪寺白首南屏坐不回偶提佛法住天台幽禪有味風生磬瘦影無塵月滿臺羅漢山中飛錫過蛟人海上獻珠来不知萬壑烟霞底何處㝷師撥芋􅁅送道存師游方故人去作逺遊僧千里􅀜河付脚縢壊衲秋逢慈母線空山夜别祖師燈王城乞食應持鉢岳寺栖禪暫挂藤何日諸方叅叩遍一菴歸老白雲層送絶宗􅁇講師住大雄寺大展三衣古道塲真人髙拱殿中央曼陁雨散天花落薫陸烟生石乳香纚纚風雷飛講舌耽耽龍象遶禪床師行不廢宗劉社㑹覓籃輿到上方送泐季潭還龍翔時咲隠巳化曽􅀅小品問支公真是中華學道雄弟子不須悲滅度禪師乆巳證圓通長懐石上三生舊無復溪頭一咲同想見西岡歸禮塔神光時繞夜壇紅送至上人還金陵卷有咲隠丁仲容詩朱雀橋􅁁白下門舊㳺囬首不堪論令威未返遼東鶴圎澤難招石上魂金刹火餘􅁅巳冷錦嚢詩在墨猶温南来邂逅逢師話老涙臨風堕酒尊聞雲海寛寳林同二師寂音悼之乆别吴寛與越同近傳歸寂故禪宫葛川有日㝷圓澤蓮社無人􅁇逺公亭外松焚雲海静井間鰻化寳林空只㽞一􅀧詩燈在長照殘山剰水中荅復見心見􅀉時居㝎水天香室蓮花峯下天香樹吹老西風幾度秋僧寳師真洪覺範詩窮我亦孟􅂙謀文章宇宙千年事身丗江湖萬里舟甚欲相竒石橋路更須同訪羽人丘重􅀉水西新公道塲渭公三塔寛公我恐前生老法華退居清淡即僧家禪師有道長􅀐虎侍者通神自辟虵巳􅀒法身来震旦終抛塵網覓提奢洞庭春後多風水準擬南歸買釣車道塲山頂千年寺逈出雲林最上層師巳親聞出丗法我今渾似在家僧書遲不到秋風鴈詩苦長懸夜雨燈早晩南歸有船買五湖烟水正堪乗愛松老禪安稳無水西外史近何如後身莫論前身事今歳才収去歳書山寺鼓羮末下江亭魚飯憶王餘浮雲蹤影􅀙南北神自相親跡自踈浙僧饒雲石至京即囬山僧業在臨平寺面面軒窓画障開渌水一川紅菡蓞青林千樹紫楊梅戴經偶作王城出卷衲還思故苑囬應是峯頭老黄鶴月明長待錫飛来用丁仲容韻送季潭泐公歸龍翔南歸還挂舊携藤古寺東􅁁是􅃽陵齋罷江山延睌眺禪餘鐘鼓報晨興􅀅詩却訪天台客别偈長㽞日本僧歳晚雲房㑹相見一杯春茗煮溪氷􅀉荅㝎水見心禪師三首自入赤墀青􅃈間舊遊禪侣亦䦨􅃢青山只憶招提境白首􅀄辭供奉班馬為空群猶蹻蹻鳥能求友自􅀜􅀜終期一舸相㝷去知在姚溪第幾湾見􅀃錢唐别築城凄凉風景􅀂為情湖堤柳盡曽㳺路石壁苔荒舊刻名老我無能如燭武何人可飲勝公榮沃洲勝㑹還容續即儗山中隠計成古刹鐘魚振一方山中禪伯法中良蒲編金地菴十笏墨寫石厓詩數行龍公聴講能変化魔􅀑避呪無災祥遥知㝎起佛鐙外童子蒸花香滿裳師號蒲菴故云次林伯昇游天童寺韻禪􅀜一到二十里􅀍嶺連雲皆古松海近仙洲通弱水山来佛國捴靈峯市開虚日家家酒僧飯齋時寺寺鐘勝㮣非詩誰冩得紫霞青靄一重重籌峯真舘􅇷和松瀑黄石翁尊師月色今宵恰滿規有山如此愧来遲金堂石室忽到處澗水松聲無盡時麻姑陵寒或送酒木客入夜同吟詩匡廬老仙去巳逺悵望雲間笙鶴期送張惟善使還上清宫馹􅀐翩翩萬里歸上清山下是岩扉金銀宫􅆣神人舘河漢文章織女機赤羽頻縣行處莭靑霞自剪醮時衣使塗觧后還相别囬首江雲朔鴈飛送道士張一無還安仁省親㕘中峯回南楚東呉一草亭道人元不歎漂苓幻身在丗真如露客髩經年漸欲星招隠山中􅆐鶴怨話禪石上􅀑神聴殷勤此别須囬首不忘君家桂樹青贈别勾曲外史張伯雨玄洲别島欝巃嵸滿谷蜷雲護萬松外史編圖瓊笈秘隐居留誥玉函封丹池雨現龍無角藥圃春肥鹿有茸儗借一龕為洞吏與君来往大茅峯壷隠為淦川徐仁則賦匏繫深知固蔕難養生聊託一壷間仙公賣藥曽蔵市逸士操瓢只在山千里江湖浮處逺百年日月貯来閑底須狡獪驚凡目剖破輪囷别築環懐計籌山通真舘純一雲峯髙士彫年短髪苦駸駸只益􅀌懷歎惋深老比師丹渾忘事死無鍾子絶知音哀􅆐易下三聲淚獨鶴長存萬里心謾憶雲峯凌羽士故山無夢可相㝷送匡山王濟逺朱弘道南歸萬峯蒼翠繞舒城中有琳宫似上清侠客劒寒騰虎氣仙人笙響作鸑聲到山㝎及朱桃熟歸洞應多白鹿迎好在丹房保玄極九還金液待君成幻寓菴用虞芝亭學士韻蹔􅀉微軀在丗塵此菴名亦強爲賔了知百􅀊旦暮事豈泥三生前後因非假日明那有目忽随空壞本無身要知枯坐環中者别是人間不死人送述古彭大年真人䄂有神方煉紫荷幾年㼇籙著功多仙人海上􅀐黄鵠道士山中認白騾棗木斗盤蔵霹􅆮楊枝瓶水洒天河只應小閱開皇劫一劒秋空處處過大年先人樂天遺雷符一卷爲題一夕空飛觧劒形先生神氣即風霆巳還天􅇅朝群帝别冩雷符使六丁遼海鶴歸雲邈邈葛陂龍化水冥冥只今有子能傳業来奉祠官􅂐檄􅂕壷洲為上清張道士題錦水西頭觀􅇅青仙家元不隔滄溟鳯麟洲渚寒凝碧雲霧衣冠夜降􅂕金醴浸花㽞客醉玉笙吹月使龍聴看君福地容蕭爽長与曽孫宴幔亭題閑閑吳宗師徒孫丁自南卷羡君學道上清宫親得先生早發蒙枸􅂎未逢朱孺子丹砂須問葛仙翁窓前􅀧易寒研露壇上焚香夜禮空化鶴歸来定何事􅀙師千􅀊住崆峒送劉彦基奉宗師命訪求道徳經註北風霜霰日冥冥送子南歸出廣庭上國幾年陪賜履名山随處訪蔵經藜光照夜時燃火龍氣衝寒直射星却憶冲虚觀前路豫章双樹更青青送上清道士李自賔歸山歸去青溪􅀧易窓仙材如子丗難双丹蔵虎豹千山雪劒度魚龍萬里江别洞苔花分石路古壇松子落岩淙道人不用尋烟火术煎經冬正滿缸送陳復齋歸婺之武義清寧觀武川道舘白雲間蕭散真宜羽客閑丹侣有期開薬竈青童應在守蘿􅀜岡頭叱石成羊起花下吹笙馭鶴還歳晚相思儗相覓只愁落葉滿空山送胡道士還豫章舟居道人船子是行窩如此東湖烟水何寳劍携􅀅叱雷雨銕符埋得鎮蛟鮀雲盤仙􅂐朱文細海浴神丹絳氣多應与匡廬桂風子山中􅀐虎夜相過送薛鶴齋南歸吳中老鶴幡然憶楚臯南来直渡浙江濤千年故國悲城郭萬里晴空見羽毛候舘夜吟飛綵翰靈壇秋醮振琅璈隃應白屋山中路㽞得仙家舊種桃雲臺真舘為上清周用章作突兀中天積翠遥曽臺宛似欝羅蕭清池曉浴丹如火白石春畊玉有苗此地来龍如可築它年歸鶴底須招只應月夜游仙侣時復吹笙下紫霄送方方壷羽士之京師學道武夷还上清羽人毛骨鶴同輕丹㽞别室生虹氣嘨隔空山作虎声劍外􅀑神来叱咤畫中河岳入經營候仙合在飛廉舘㑹見祠光徹夜明挽張伯雨宗契一夕星壇蛻羽衣山林何許散靈輝書㽞真誥陶弘景名在丹臺馬子微海上青騾應逺去爐中白兔想潜飛風篁後夜還成韻猶似簘聲月下歸鹿巾曽入紫宸朝歸向名山駐緑軺􅀛脫生筒無俗累鶴存瘦骨有仙標三元飯盃猶在五色香烟火巳消應復神游易遷舘人間楚些􅀂為招童稚相親到白紛真香幾向鵲爐焚丹成自浣天壇火劍觧空埋月澗雲塟所也山友分􅀅石刻帖門人唱得錦飛帬它時㑹續君前傳刋作青瓊板上文正一冲和宫􅀭弘道以虞學士詩求和玄都桃是舊時花曽駐春㳺送客車翰墨尚看延閣老松蘿長護羽人家丹砂學伯仙公術白絹封来諌議茶文采風流徒想見九霄無佩乞飛霞往事真成過眼花前王俱此走降車鶴歸華表千年郭燕入烏衣百姓家雨壊苑墻生野薺雪殘侯舘老山茶欲􅀅弔古無窮意髙􅀝披雲賦落霞廣東帥府􅁺林徳㳟餉藤簟韜向筩中一握輕風漪八尺勝桃笙文編黒白蚺皮滑漆透丹黄虎魄明隝上卷􅀅滄海色嶺南􅀉与故人情竹牀楠枕山窓下􅀙此酣眠夢亦清銕􅅇為孟暐賦愛此輕圎銕鑄成何須楚竹選􅀌生年多化作青虵色夜静吹如彩鳯聲鏽出碧花凝錯落冷含金氣發鏗清最宜携向君山去一聴仙翁奏月明給事以馬乳貺就索詩挏官載出槖駞馬分得官壷給事家代茗駱奴寧許敵蒸豚人乳不成誇肥凝曉露鴟夷革香帶秋風苜蓿花長与詩翁消酒渇肯辭為客住龍沙仙娥玩月圖為野雲陳氏題仙娥微歩下高寒獨立長松月滿山粧影透明金背鏡佩聲飛動玉連環洗空碧海銀蟾冷舞罷瑶階白鳯閒不是丹青􅀉顔色行雲無夢到人間陳子平􅀉所作瓊花賦荅謝鳯在陽岡鶴在臯相思空遣夢勞勞簘吹夜月江槗酒查汎秋風海市濤故國山川呉分野美人詞賦楚離騷瓊花新製人争寫應使􅀭州紙價髙周漢長公主府今開元宮臨安故城二圖主家樓􅀚欝參差想見當年全盛時宫草細分行輦路苑花深覆汎舟池瑶臺仙去塵生海甲帳神来風滿旗好在畫圖㽞勝跡五雲長護鶴笙祠南渡君臣建業偏不堪喬木黯風煙豈知白馬興王後又到紅羊換劫年三輔黄圖空郡國六朝王氣渺山川白頭開府歸来日應覧遺踪一愴然海樓爲宛丘秋蔵用題不著闌干百尺髙難容此客卧雲濤深連厚地三千軸迥壓神山十五鰲日影夜生浮画棟珠光秋孕射霜􅂁醉来白眼看餘子未許元龍氣獨豪太古樓爲豫章傅道士題羽客栖玄紫極宫樓居三景自玲瓏㳺神宛在鴻荒丗􅊥道元居怳愡中窓白夜生南浦月簾高時捲上江風如何宴坐思機者千劫塵縁一息空半村爲傅處士賦半距城闉半距村烟霞只尺少塵喧小車出市僕先路斜日下山人到門兩岸花隂連第宅一川草色散雞豚田家數里􅀅迎慣時復相㽞醉酒尊李克約餉蠟梅并詩用韻荅之空谷佳人縞􅃑單淡黄衫薄護春寒色欺隠者山中桂香逼騷􅂕畹内蘭鳥吐粟金粧處巧蜂㽞􅁡滓煉来乾數枝乞与吟窓供温水銅瓶自挿看霍丘孫游武林叙湖山之勝詒之十頃平湖繞郡城画船小槳蕩春声紅酣花港風荷宻玉照梅岡雪樹明煙月長㽞􅁔舞地山川不改古今情君行須到峯南北為寛蒼苔石上名懐臨川舊㳺賦以贈别戈直伯敬擬峴臺前汝水流因君還憶旧曽㳺故人苓落半爲􅀑賤子蹉跎今白頭詩思入江楓葉冷郷心隨雨鴈声秋北齋居士知強健為覓新篇慰别愁暮春偶作瞢腾睡思酒頻中潦倒吟懐語不工燕子人家春復夏楝花時候雨兼風靑林蛻螙成蝴蝶白水鳴蛙抱活東甚欲相􅀙問丹訣頂間朱橘幾時紅草堂為胡晉仲題姑孰城東林壑竒幽人愛此結茅茨垂窓巳著盧鴻畫繞壁唯書杜甫詩花氣晴熏燒酒火潮痕晚上釣魚絲數椽有此真堪隠不待山􅂕重勒移贈相士陳巨山老我寕甘徹骨貧多君見与掇皮真乖厓本是無情者􅀂水終為勇退人機外􅌐黄難著相眼中青白自如神華峯太極圖猶在何日相携問隠淪贈地理家何玉泉芒屩笻枝興渺然知君曽得異人傳輕探玉髄青囊秘山隠金精銕鎖縣腹有丹光飛日月眼窮地脉入雲烟幾時把􅃑神州路共看華嵩翠挿天贈易學李所翁易斈如翁近所無藹然声聞動江湖蓍􅀛凶吉占如繇爻象􅀙横畫有圖三卷秘書傳句曲百錢􅁲肆隠成都相逢欲問平生事何惜春醪滿眼沽贈筝工任禮鈿床銀甲不勝清錦席銀筝無限情苐一部中當絶藝十三絃上有新声齊宫蟬怨時時咽湘浦鴻来箇箇驚冝向敎坊供國樂要須名似郭無名玉笙為陸國瑞賦曽聴仙人白玉笙飛瓊有譜斈􅀄成碧桃半向露中落彩鳯忽来雲際鳴瑟響洞庭空冩恨磬浮瀛海不傳声何如吹上扁舟去秋滿西湖月正明長至日題佳節䔥然無過賔餕餘觴豆自相親斗垂西柄半入海梅發南枝先得春平日以文為事業老来惟酒是精神莫論炊熟邯鄲米巳是山翁一欠伸元夜獨坐九衢花月萬家燈憶在錢塘與廣陵過去豪華春似夢老来心賞冷於氷蘇耽仙後還為鶴房琯生前本是僧喚取家人多置酒只将寂寞付瞢騰夜起鷄鳴不鳴山四更月落未落霜滿城起看北斗寒桂地俯聴長河流有声今夕何夕耿無寐千古萬古難為情欲持心事出門去哀􅁔坐待東方明秋懷山人㡳事縛微官来對䦨干苜蓿盤匣印少開經雨澁箧衣多敝入秋寒勞生沙漠随征轂入夢江湖有釣竿歌罷中庭待明發起看星漢正漫漫丗事丗事紛紛在目前故園無復可歸年東吴城䧟仍為沼滄海塵生欲変田䑕穴詎容衘窶藪豨膏那觧運方穿臣心有血才盈匊儗向天公罄一牋病疽席上屠蘇歳􅀊同只憐醉後飲衰翁半生客路江湖裏十日春愁雨雪中黄道雲消晴見斗青陽氣轉曉占風欲題彩帖無佳句思遶蓬莱最上宮􅀄度日八十一翁烏角巾尊前才放自由身病須善藥休離手衰借嘉醪可養神誰謂仲連為侠士或傳方朔是仙人行當小築西洋墅種杏栽桃作好春癸酉􅀄度真率㑹分韻得杏花風煖破春隂一􅀏幽齋喜盍簮人事萬端相聚少酒杯百罰不辭深生辰值月方􅄤斗故國􅀚星正在參多謝諸君為我壽滿牋佳句敵南金乙亥􅀄度是􅀊仍改至元此生重見至元年白髮垂垂巳滿顛仕愧買臣無印綬歸思靖莭有園田菜挑渚雪氷茸滑柑剥吳霜玉腦圎終結一菴湖上去老来閑送佛前錢病痁肉黄皮皺髪毛枯一病支離困壯夫痛要小奴搥臂􅂰冷㝷破㡌褁頭顱鄰翁教誦禳灾呪道士来書禁瘧符車轍馬蹄勞客問藥嚢糜盌乏吾須炎火寒氷忽暗投肺膓日與藥為謀儗尋畫史圖師子安得詩人咏髑髏月色自如閒度夜蟲聲無頼􅅍吟秋便當一起幽憂疾濯髪西風萬里流自喻狎鷗不下解知幾蟋蟀先鳴能表微人海無涯俱汎汎佛天有相亦非非試論前軰今誰在欲問何山老可歸嚴瀬磻溪各求志豈関出處在漁磯憶山中買山宴塢近天根遥憶春深正灌園一樹爛紅櫻著子滿林鮮碧竹生孫少陵只擬還韋曲安石端宜得謝墩歸老㑹㝷凌道士采芝燒藥了晨昏感興􅀙来豪傑願風塵奮臂干戈肯頋身司馬諸王祗􅅍晉祖龍二丗竟亡秦祠旁􅀑火狐鳴惡橋下天寒鶴語神千古汗青㽞感慨山中輸与種桃人蛻菴詩卷之三蛻菴詩卷之四衡山釋大杼北山編集七言律詩殿試翥與讀卷官老臣載筆侍金鑾自愧三叨讀卷官進士擢科従古盛大臣考䇿得才難芳年荏苒聞鶗鴂花事􅀙容到牡丹明發禁扄當撤鎖文光髙動五雲端翰林三朝御容戊戌仲冬朔把香前宮嘉禧殿前􅀄日高瑞光先映赭黄􅂁雲間端露収金掌仗外微風颺彩旄黄鶴仙人周子晉碧鷄使者漢王褒禁園尚覺餘寒在未放春紅上小桃甲午禮闈白雪青天映日紅樓臺高下玉光中佳城正際新春晦薄冷猶吹向曉風萬國衣冠朝北􅇅一時文獻集南宫吾皇方此求賢俊載筆寍慙奉至公九月朔迎駕大口大駕今朝至上都期門罕畢巳前駈錦衣照日環龍衮翠盖凌雲覆象瑜萬里山河開白道兩京宫􅆣入黄圖縦􅀚父老心應喜知有天恩免過租庚辰十月朔奉迎明宗􅁽寳至石佛寺明日壬辰迎至太廟清祀禮成賦以紀事寳􅁽香輿出法宫非烟御路曉濛􅄥仗齊劒佩千官裏金奏簫韶九廟中宣室􅀑神徴賈誼太常禮樂属孫通下臣有幸逢熈事散作恩波四海同圎丘禮成改直翰林敕書告廟祝板捧􅁽先期􅈼太宫聖孫翼翼孝心同霓旌曉絢香輿日鶴駕晴薫彩仗風一代皇猷昭黼黻萬年寳歴卜延鴻舞階行見干戈戢並在穹祇叶相中黼黻青城煥景光紫壇黄道藹天香鳯韶曲變􅀄終奏龍衮衣明上下章共喜聖時脩曠典更􅀙春享議明堂吾皇飲福神􅂕畢却進公卿萬壽觴送太傅丞相出師平徐方南征諸􅀅乆無功丞相親勞出捴戎虎士嚴兵屯玉帳龍庭大宴賜􅊮弓萬年社稷収長筭百􅀾旌旗得勝風幕府如雲盡才彦荆徐指日捷書同直延春閣蓬莱海上苐三山仙掌雲間十二槃鷄樹烟深殊窅窱鳯樓天近自髙寒銅壷傳漏聲相應紫詔封泥墨未乾願祝君王千萬壽坐施雄㫁濟艱難􅀉寳林同别峯㝎水復見心寳林老子虎耽耽㝎水道人蒲作菴歸老尚須㳺越絶㝷師先儗到精藍娥江碑在當重讀禹穴書蔵㑹一探我亦三生學環者㝎從佳處結禪龕
