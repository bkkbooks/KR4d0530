舟雲樹長秋期到天目容我借禅房北山以着色蘭贈西昌堯如淵永題南國碧雲暮西風芳草多相思故人逺如此别情何諸絶山僧筆蒼茫楚客歌慿將万里意一問洞庭波嘨亭為塩令賈䇿治安題亭在西㒷江上老子掀髯処雲間􅀌草亭不妨舒逸氣直恐動精灵風水劃秋涌魚龍悲夜听幾畨流響歇江冷越山青􅀉題欽惟心山房在京口普照寺三首普照南徐寺蒼蒼祇樹林馱經惟白馬布地盡黄金午􅆊鐘声逺寒灯殿影深由来丗界黒誰與一明心朱方有真子心印悟南宗奏樂飛天女聴經化海龍香凝行道席灯照着衣鍾猶厭依城市開門别種松名山旦夕仰方外􅀫心親業白到􅀄地性空無一塵乞鍾時出寺坐夏不迎人想見惟心叟風凉滿㲲巾輯山村先生詩卷旧多今不存二首昔在垂髫日今嗟薄暮年床􅀌郄氏選詩得謝公傳故國空戎馬荒山冷墓田秖令後死者忍淚讀遺篇卷可留天地詩嘗泣􅀑神鶴仙歸化鶴􅀍髪下騏驎素望髙前輩青衫老此身栖霞石表在終古不成塵金水橋上聞􅁐池荷香内􅁐立馬金河上荷香出苑池石橋秋雨後瑶海夕陽時深樹栖鴉早微波浴象遲煩衿一􅀏爽正喜好風吹次韻題大雷山桃源汪氏桃隠鄞縣幽甚􅀯雷路嘗聞故老傳墟通賣魚碶潮入種蚶田櫺子渾成樹桃花不計年山中多佛寺香火肅芉芊􅀯北二十里两山中過雲采芝隨鹿去拾果与猿分酒熟青田核羮香碧澗芹非君播詩句那得丗人聞鑑堂上人招予適慧山舟行不成往固􅀉竟􅀒山游約長懷苐二泉毀茶休著論載酒謾回船㑹摘春林雨来㝷午竈烟從師坐聮句秪恐廢安禪溪居山水山景二首想像溪居好時来放釣船滄洲茅屋路春水白鴎天林壑無多地烟霞自一川底須論咫尺對此巳茫然何處野人村微茫澗谷分林多太古樹山有四時雲烏跡還成道猿啼或作群秋風茅屋破誰賦隠思君清溪濯足圖黄塵滿双脚宜賦故山㱕觧屦就清泚舉頭看翠微林猿下窺􅂰石蘚欲粘衣更覓魚竿伴閑来就釣磯􅀚潮海口潮􅀄上江流壅不行大風生氣势烈日奪光晶鷁首来何駛鴟夷怒未平呉児誇壮􅀚車馬暮填城水墨逹麽像班惟志筆佛法無多子西山雪拄天應㝷䓗嶺去方觧少林禅鞮屦露双脚罽衣披半肩虚空本無住湏借影中􅀓数日北風興懷過海諸友数日好風色行人應到家秋花香獨耐寒鴈字多斜薄飲無長酒輕行有小車吾心何尒汝聊復度年華啖筍今旦食指動新苞来上林此児森似玉饋我重如金晚火炊鮮滑春雷發蛰深山園未能往少快老饕心蛻庵詩卷之一蛻菴詩卷之二衡山釋大杼北山編集七言古詩題昌化陳孝子傳百丈山前妾辭主禮賢鎮中子逢母三十餘年昨日同白髮相看涙如雨阿􅭊去時未㫁乳児壮得知心獨苦清湖老嫗天所留逆旅主人神使語㱕来桑竹溪之滸婦前持觴児起舞双􅀲生祥表秋圃豈用旌書動官府呉人買妾紛莫数歳滿母㱕遺子女巷南巷北不相覓況復山川兩脩阻嗚呼千秋復萬古孝子之名在寰宇丗上滔滔忘母人不媿唐昌一抷土題銕石􅍡馬圖神厓黒龍時出水游此何年得其子是何毛骨如積銕㢠立長風獨竒偉霜蹄白鼻散五花倐見馬中真騄耳羙髯奚官能剪拂不遣雲鬉涴泥滓少施控勒即飛騰唾尚不敢况敢捶馬生豈在粟一石不飽寧能見材美朝燕晡越信汝良安得壮士同生死阿師一室巾錫外時展此圖臨燕几三生似是支遁林愛馬苦心同􅀂此平原豐草秋漠漠怳惚寒沙颯然起英雄有志在青霄老眼因之空萬里題趙文敏公畫馬君不見漢家􅀅軍求善馬戰骨縦横血流野㱕来作歌薦宗廟寧悲􅀑哭宛城下何如聖代徳所懐入獻磊落皆龍媒右牽者誰鬈者偲萬里知自宛沙来銀光鏡懸蹄腕促老奚識性仍善牧時廵之外游幸稀飽秣原頭春苜蓿呉興學士藝絶倫妙處直以曺􅀅軍只今有馬無此筆誰與冩之􅀓丗人爲君甘老駑駘群題牧牛圖去年苦旱啼􅃻塊今年水多深没鼻爾牛觳􅑌耕得田水旱無情力皆廢􅀞中見此東臯春牧児超揺犢子馴手持鴝鵒坐牛背風柳烟蕪閑殺人児長犢壮湏盡力豈惜辛勤供稼穡縱然喘死死即休不願徴求到筋角題李白觀泉圖玻瓈杯中春酒緑醉墨淋漓牡丹曲平生合置七寳床白苧烏紗美如玉阿瞞荒宴百不理寧計宫花㗸野鹿何物老嫗生此児偷向金鷄帳中􅀫髙􅀅軍􅂊奴􅀠耳誤使脫鞾吾所辱要㽞汗韈蹋鯨魚䑕子何堪煩一蹴尋常溝瀆不可濯何處容伸遭汙足翩然却下匡廬雲五老峯前看飛瀑題郝内翰書所作夢􅀚瓊花賦後釣魚山前龍上天武昌城外走蜀船老姦欺國馳露布使者坐囚吞雪氊潰兵一夜甲填水血汙木綿花下􅀑豈知老仙方卧游鶴背天風扶夢起頽雲挾月光西㳅玉簘聲断江聲愁露革泣盡瓊樹死廣陵春色寒於秋百年遺賦人争重勁墨遒毫精爽動節旄苓落喜生還回首江南巳如夢花神換根春更芳想像月色扃餘香楚招無人青鳥去公不少㽞空涕滂題趙仲穆怪石竒木君不見岳陽城南老樹能化人又不見草中巨石如卧虎樹逢仙客授還丹石誤􅀅軍飲飛雨海寧太守提健筆與丹通靈箭角力山精木魅寒睒暘千年醜怪匿不得衘瘤半裂雷火出隠入雲綃露竒蹟猝然一見心膽驚氣盡畫工俱辟易挂之髙堂風動揺古色一片秋䔥䔥待侯硯池卷東海㱕冩扶桑與沃焦題長孫皇后諌獵圖黄門曉出西清仗秋色滿天鷹大王虎落遥連渭水南鸞旗直渡河槗上日􅁁雲氣五色文虬鬚天子真天人羽林猛士森成列六氣不驚清路塵太平無征帝神武豈爲禽荒􅀅按旅巳知哲后佐興王不數樊􅁎能覇楚從容數語即罷田六宫迎􅀏花如烟蹕回那待外廷䟽聴諌由来同轉圜天寳神孫隳大業錦繍五家争蹀􅉜可憐風雪􅌐山宫政與真妃同射獵題華山圖華岳連天向西起澒洞秦川三百里巨靈髙掌削夫蓉影落黄河一􅁝水雲臺霧谷巢神仙羽衣金莭時周旋㱕来失脚白騾背㱕来石上長鼾眠千載悠悠􅀉玄賞耳孫風骨猶䔥爽逺􅀙丹丘渡滄海􅇷挹神蹤欲長往何人想像圖真形曡厓隂洞髙林青上摩金天之帝京下􅄃玉女之明星峯邪麓邪两莫極虎豹呌絶烟霏冥仙家樓􅀚超然住遥認微茫是征路丹梯銕鎖不可攀直喚茅龍上天去懶拙道人苕溪曉望圖憶昔薄遊苕之城溪光近秋山晚晴連峯接嶂望不及惟有白雲縦復横漁村無火林樹黒微風忽起菰蒲聲月􅀙太湖東畔出直射西塞山前明人家碧玉壷中有野舫銀河天上行酒酣時豈發長嘨水底直遣魚龍驚老暉郷亦此盤礴安知今我非三生盡捜萬􅁚入竒筆畫與詩境俱峥嶸吾家苕中有茅屋京塵滿髩難為情頓令扁舟夜入夢萬頃漚波㱕濯纓金宣孝太子墨竹少海神光射天起中有蟠龍龍有子混同江聲何處来捲作琳琅墨池水蜿蜒欻起鱗鬣張蛻骨立化千篔簹一朝侍臣抱髯泣鶴駕不㱕雲路長百年梁􅁐陵谷變㳅落人間能幾見明昌内府應秘蔵小字親題保成殿吁嗟帝子真天人此君亦作天人真君不見洋州老太守揮洒雖工無此神緑玉連環歌為邢從周典簿作于闐河頭夜光發赤髯賈胡采明月中有美璞凝寒晶惟許􅀑工能琢成伊誰得此邢公子示我緑玉双連理怳如空碧虹氣垂半隐青瑶蟾一規展之兩環不逾尺曡作􅇛團小蒼璧􅂖文錯落映雷文宛是昆吾寳刀刻廬陵學士癖好竒辨古重以瓊琚詞􅃢瑚佩鈎詎可數我疑制自金源時集賢仙公丈人行鳯閣舎人文有様請君㽞束宫錦􅂁待看揮毫玉堂上并州歌送張彦洪使畢還河東吾郷故人苓落盡見子老成殊慰心祥金百煉乃利器桐尾半焦方賞音河東臬府幙下士飛傳来作朝正使太和嶺上盗巳空旗旌盡是官軍紅殺人如麻道路絶朝狐暮梟競巢穴嚴風欻起霜倒飛塞日黯淡寒無輝子来未幾遽言㱕使我東望淚沾衣豈不聞并州少年游侠子手携玉龍最輕死并州􅀅軍劉越石夜半登臨長嘨起汾河直来繞郡城鴈門離石寒峥嶸老旻四葉彈丸地大梁全師勞再征一朝征賊輙破碎大􅀅不誅天失刑為子作歌歌憤激眼中太行如動色安得壮士射烏弓為落􅍴搶連太白劉道􅁠為李逺子微作青山似洛山圖為作歌係之石頭城中有眇􅆌之秦淮秦淮東㳅入江逺其上曡巘連層崖牛頭双闕雲間開三山北山鬰烟霾六朝遺跡猶在眼千古往事徒興懷昔人謂此洛中似四面青山圍二水劉侯熟識此景勝况復愛畫入骨髄五尺長􅁓繭不如乗興破墨塗成圖漁梁茅屋昏欲無壞陵荒隴迷楸梧寒潮巳落㫁岸闊行人不渡扁舟􅀌嵩邪邙邪漫漶那可辨但見招提林杪直下蔵村墟憶我覉游石城日江雨山烟正䔥瑟横塘酒家好新酒醉􅀝船窓看竒崛只將健句冩㱕来却恨此時無此筆吴儁仲傑横河精舎圖亦道􅁠作一巢拂衣拂著􅀫鶴背掛劍踏落長松稍空濛杳靄迷處所豈復漂摇畏風雨既非鳥窠老衲子無乃中林古巢父填窓擁户晝不開神光隐見金銀臺雲之君􅀆鳯為馬往往玉簘吹月来道人幾年游上國賣藥壷中人不識洞玄宫舘剛中所建宫名一􅁰殊靈秀似與仙都敵故巢未破㱕便得㱕到玉山多美石我詩母刻刻此圖留照千秋山水碧剛中永豐縣人送崔譲士良都事江淮行省時平乆不脩武俻一旦盗賊起跳踉南窺荆鄧北徐汝紅巾直来據武昌摧城破壁官吏走九江太守能死守赤眉銅馬終殄除此賊游魂那得乆天兵势􅀂風雨来直掃四野無氛埃廟謨最先擇􅀅帥國計莫重完江淮堂堂中書開外省幙府人材􅀝公等崔侯如刃新發硎鋒銳所當無肻綮金湯表裏元有捷正藉全籌申薄伐草茅有䇿可採用義士多方須教閱酒酣客起征馬鳴壮氣滿髯肝膽傾浩歌把劍徒激烈老矣莫賦􅀙軍行爲古紹先題劉平妻胡氏殺虎圖沙河岸􅁁秋草白棗陽城頭落日黑老兵辛苦踐更来林下稅車聊一息黄蘆颯颯中夜鳴倀􅀑呌嘨悲風生虎飢得人怒不置婦急徒手危相争直前死力持虎足呼児進刀屠虎腹但知有夫豈知虎視之何殊机上肉當時一擊寕頋軀驚魂碎骨仍携扶九原瞑目巳無憾舊血勿湔身上􅃭千秋莭義傳郷閭我猶膽怯見畫圖健婦果勝一丈夫嚮来馮婦有不如城南北風朝捲沙􅀅軍開宴樹大牙黄須健児飽酒肉十十五五来􅀅車盡駈丁男作生口􅀑妾􅀑馬充其家嗚呼上天不可問道旁􅀚者徒咨嗟范寛山水憶昔往㝷剡中山南明天姥相縈盤客路上頭穿鳥道行人脚底􅂿風湍旦寒露重多成雨􅂥霧濛雲互吞吐僕夫相呼岩壑間空響譍人作人語溪窮岸断地忽平石門壁立如削成隔水無数山花明中有人家雞犬聲向来老眼曽到處此境俱作桃源行百年留在范寛筆水墨精神且䔥瑟上有翰林學士之院章恐是宣和舊時物林􅆐野鶴應自在令我想見猶前日時平㑹乞間身㱕一壑得專吾事畢張師䕫為郭子静作終南山色因題終南山色秀可食中有游雲動凝碧華嶽西囬仙掌髙仙都下射金精白緇宫琳舘馮險阻渭水秦川来咫尺古木深藏魍魉寒隂厓杳入蜿蜒黒幽人舊隐依青壁蘿逕柴閉寥閴野槗挿岸何處船落日無人獨㱕客檪翁筆法追郭熈逺意欲􅀉烟霞微半生江海屢驚夢萬里風塵能化衣捷徑無媒既愁寂故山好在􅂚遄㱕尚􅀃于今明月夜時有簘聲臺上飛天香室爲四明定水復見心禪師賦寺有楊誠齋題定水山中多古桂老璘結茅来避丗嚢中少試蒸花法正藉烟霏作輿衛誰令作詩傳丗人一時攪動聲聞塵百年公案結未了復翁拈起還清新喝開石壁壁成字百顆明殊照天地不関旃檀林下風薫破枯禪半􅁁鼻吾聞佛家别有衆香國我亦三生學禪客􅀂爲一洗六根空􅀙子㱕来分半席題趙文敏公木石有先師題于上吴興筆法妙天下人蔵片楮無遺者南陽詩律動江湖一篇才出人争冩二老風㳅傾一時只今傳畫仍傳詩清􅆂月露秋見影黒入雷雨寒無姿仇山黄鶴去不返苕溪鷗保􅀊俱晚好呼銕爪夜錚錚刻向青珉照人眼題武林姚氏頥壽堂有地須種木蘭花有樹好􅀫双啼鴉木蘭女児能代父慈鴉之雛能哺母姚家堂中如畫圖鶴􅄠髙居綵衣舞當年兵塵暗郷関扶携藁砧烟瘴間天留晚福在平丗去家萬里仍生還有児有婦供滫􅔱書聲歌聲動鄰里板輿不待魚軒列鼎不如􅀒米中有至樂物莫比酌彼金罍酒起爲熈壽􅁔慈顔日日春風和􅁄心之詩豈足多我今獨無空尓羡如此堂中萱草何題雪溪待渡圖晋陽山下蒲村渡㫁坂連岡曡烟樹横汾水落㳅更急客子西㱕迫秋暮朔風轉雨作雪飛􅀝盖沙頭泥没屦後来者誰須我友望望津船出前溆濕雲撲地􅁁鴻驚危槗掛岸征馬生樵家有徑凍葉平土床火煖無人聲􅅍峯倒􅀝白石爛空壑半壓氷槎横㱕来想像猶眼底詎擬􅄄夫能盡此溪明雪净古色起一片荒寒在窓几􅀊晩逺㳺吾倦矣題李早女真三馬扇頭金源六葉全盛年明昌正似宣和前寳書玉軸充内府時以李早當龍眠想當畫院供奉日飽閱天閑萬竒骨䓁閒㳺墨落宫扇駿氣凌風欲超忽霧鬛風鬉剪剔新郎君玉為人四帶紗巾繍方領醉鞭踏盡燕臺春一聲白鴈黄河暮豈料征蹄竟南渡囬首西風障􅀾塵女仙空抱琵琶去題陳所翁九龍戯殊圖兩龍頡頏出重淵白日移海空中縣一龍囬矯一倒起側磔胡髯怒歕水大珠炎炎如彈丸爪底雲頭争控摶一龍仰首逆鱗露兩龍旁睨蒼厓蟠恠風狂電浩呼洶天吳倅立八山動一龍後出􅀹崛竒半尾戯繞蜿蜒児児生未角巳神猛一頋却走千蛟螭陳翁硯池蔵霹􅆮往往醉時翻水滴便覺天瓢入手来雨氣糢糊渾是墨我嘗見畫多巨幅􅉫蕩驚濤駭人目何如此筆窮變化三尺微綃形势足是翁前身定龍精故能吸欻奔精靈卷圖還君慎封鐍但恐破壁飛空冥題侍郎秋江捕魚圖秋江水多魚唯唯海風駈潮葭菼靡輕舠競載罛罔出欲向中流截魴鯉巨鱗有神不可􅀗騰沓波濤脫泥滓最憐濡沫笭箵間小白鍼頭尖如指釣璜渭叟晚終遇西塞玄真徴不起􅀂人自是隐者徒豈比沙島漁蛮子髙􅏋能畫得玄理塗抹山川游戯耳千岩万壑堆白雲稍看人家喬木底眼中之景何所似冨春澤畔鸕鷀里兩䑓䔥瑟秋氣髙脚底灘声蕩清泚我嘗扁舟衝鴈過彷彿厓根舊曽檥自知丗外漁者村只合投竿老烟水巨緇未辨五十犗草屩撈蝦􅀙此始畫馬後有宋思陵押封以御宝睿思殿中萬幾暇縹帶犀籖閱名畫君王愛此神駿姿筆势不在韋韓下五雲御押手自封玉窠蟠屈宸􅂐紅百年重遭赤馬劫散落不逐兵塵空誰欤傳之能愛惜尺楮蕭蕭開古色􅌐􅍡玉面蹄腕白青􅁝絡腦黄金勒風鬉半散頭怒側一􅇛渥洼雲氣黒緋衫圉郎緊控持直恐驕騰収不得向来南渡小朝廷虎視敢與金源争蜀襄馬􅂣能幾匹尚想按圖心膽傾只今萬里龍沙道游牝千群飽豐草天閑上駟皆乗黄駑蹇紛紛丗空老贈呉士桑饒呉興一士氣貌淳儒冠落魄甘長貧毉家諸書捴貫穿有病有藥即與人山中僦屋不肯出苦厭城市多囂塵得錢沽酒飲輙醉指􅀧富貴如浮雲時来西湖住数日所􅀫隨夜湌隨晨過門與我談抵掌百無一偽皆天真疾惡如讐毎憤激正坐時命遭其迍人生除貧貧則巳五􅀑到此安能神天以清名􅀘寒餓昔之隐者人皆聞聖賢法則吾豈敢郷里小兒安足云況君能毉當濟丗未歎行路常踆踆伸眉一􅀏索我别北風吹雪来繽紛溪船無錢附歸去垂槖不管妻孥嗔青山白石大自在且復掛子頭上巾江湖多盧識者少􅀊晩逺游須待春君不見舎中之長眼眥肉豈觧善事長桑君題泰東山蔵主十八開士圖環瀛茫茫去不窮大鯨吹浪􅄓鼓風樓船如山不敢過况在汎葦浮蕉中西方十八大尊者徑度萬里猶乗空犀行水開蛟蜃露直下踏入天呉宫􅀛魚背髙盂錫穏中流正與靈槎同怪頭逹枿四罔象一單舁出厖眉公鼻端嘘氣作飛塔舌上彈呪招降龍兩僧促膝披具葉一衲褁足須山僮雪毛白鹿岐角健斑尾黒虎双睛紅最後坐禪如古佛從渠􅅮控何神通吾聞浮屠多善幻作詩自賞􅀞者工君不見海波横潰􅀑神惡我無其術安能東蛻菴詩卷之二蛻菴詩卷之三衡山釋大杼北山編集七言律詩八月十六夜對月蟋蟀梧桐秋滿庭浮雲散盡月踈星仙人脩月渾無迹使客乗槎自有靈一道銀河通碧海三更白露下靑冥西風忽起吹黄鵠夢㫁瑶池醉未醒中秋次友生玩月韻華月光浮玉色醪凉飈時拂紫綈􅂁河通閣道流雲急星繞天樞出地高按舞豈無仙跨鳯縦吟聊放客揮毫扁舟近憶樟亭下曽看魚龍送夜潮閏九月㳺錢塘南屏諸山山僧領客興何長慧日峯前俯大荒舊俗尚傳三令節人生難遇兩重陽丹楓換葉隨秋老黄菊留花過閏香更與摩崖訪陳迹西風吹冷薜蘿裳閏中秋是日白露莭河漢雲消溢素光重開罇酒據胡床嫦娥斟酌猶前夕老子婆娑且醉郷風信兩畨生緑桂年華一寸入黄楊恠来詩思清難忍早鴈聲中露欲霜七月望對月新秋月色􅀄圎夜逺客樓中獨坐時却數只驚身老大相看聊與影栖遲神仙宫􅆣開三島牛女星河淡兩旗不是呉剛頻伐樹西風應長出輪枝中秋廣陵對月散盡浮雲月在東白蕉衫冷小庭空星河夜影尊罍裏城郭秋聲鼓角中落葉有光時墜露鳴蛩無響不含風此生五十三回見只遣姮娥􅀏秃翁上元􅀫通州楊原誠寓宅禁城東下一川平杳杳烟蕪澹澹晴風衮暗塵羊角轉水披殘凍鴨頭生􅄐居有酒春堪醉小市無燈月自明還憶故園今夕賞玉人花底共吹笙丁亥元日梅花院落雨聲中窓外春寒淰淰風臘酒撥醅浮玉螘夜燈挑烬落金蟲星環甲紀驚身老雪觧寅朝驗􅀊豐還喜驛書催上路寸心長在日華東中秋玩月崇真萬壽宫西風吹月出雲端松栢流光繞石壇上國山河天廣大仙家樓􅀚夜高寒似聞玉杵鳴玄兔疑有瑶笙下翠鸞只把酒盃供醉賞不知零露滿金槃四月旦雨中送春苦筍櫻桃次第来雨餘官樹緑連街白纓蚯蚓歌幽草赤幘蚍蜉穴古槐短髮欲星愁有效幻身如電事無涯人間恩怨何須論􅇛扇清風又入懷乙酉月二十七日大雪寒甚有㫖賜宴史局聖主恩隆六賜筵玉音躬聴相臣宣史裁東􅀚何殊漢人在瀛洲捴是仙御酒如春浮浩蕩宫花與雪闘婵姢微生此日霑休澤祇望丹震祝萬年述古真人壽席爲賦龍虎山中有洞天長生見此老彭籛羽衣小作金門客玉籙元書紫府仙藥竈夜光丹似日壽尊春色酒如泉未須便覓雲林隠更閱人間八百年春日汎湖陪李旻徳融席上作春来渾不到湖邊偶逐東風上晝船花氣暖流黄烏岸水光晴展白鷗天緑樽興極頻呼酒銀筦聲高正輥絃我比放翁應更放看花不獨海棠顛雪後苦寒雪後北風尤苦寒燎爐起擁􅂴頭冠謾懐學士酴醾酒仍對先生苜蓿盤戎馬尚驚塵衮衮客查空往海漫漫向来事是今朝夢底用悲吟且自寛喜雨乆旱苦蝗日氣如焚土氣腥黒雲當午忽冥冥雨工分下旗千隊神姥携来酒一瓶牛馬長河迷渚涘龍蛇平陸起雷霆快看一洗飛蝗盡猶及秋田晚稼靑清明日到陳荘出郭東門古道斜獨􅀐欵叚稳於車春纔三月已兩月村舊百家無十家山徑低飛􅀑蛺蝶野塘競噪官蝦蟆東風不柰晚愈悪吹散滿衣楊白花東西馬城春行柬平湜伯容淸明時節每多隂楊柳人家花滿林潑火乍収連日雨賞春長􅀒百年心鳬翁一一塘蒲暖雉子斑斑隴麥深爲報能詩平處士剰携芳酒共幽尋暮春有感次劉􅁥丞二鳥寧容一處囚能鳴何似不鳴休来今往古無窮事剰水殘山捴是愁欲賦碧雲須麗句儗裁白雪欠名謳強顔未得投簮去一濯塵纓萬里流上京大雨驟寒飲周􅀙道所暮年巳􅁲園田去豈意猶歌行路難且復酒杯同旅次不堪人事捴憂端山林茅屋三生逺風雨氈裘六月寒吾友有家應此住老夫何地挂吾冠游鳯凰山故宮至高禖臺鴻鴈池衰草寒烟老木風南朝佳氣落然空璧来山􅀑􅃒秦使槃泣仙人出漢宮壊埒尚傳祠乙鳥荒池曽見射飛鴻騷人自古多荆思長在登臨感􅁣中春日偕監中士友游南城樓閣參差紫翠間微風不動彩雲閑柳垂禁禦絲千尺水繞宫溝玉一環春樹鳥鳴圎似筦夕陽駝影兀如山醉鞭緩緩吟歸去燈火城東未掩􅀜上京秋日三首山前􅀌戍水􅁁營落日無人巳㫁行區脫数家門蚤閉轒温千帳火宵明白摧野草狼同色秋入􅀜榆鴈有聲最是不禁横􅅇怨海天秋月不勝情水遶雲廻萬里川鳥飛不下草連天歌殘敕勒風生帳獵罷焉支雪没韀紅頰女兒花作隊紫髯都護酒如泉時廵􅀊􅀊還京樂别換新聲􅀍筦絃逺山平野浩茫茫曽是當時古戰􅂣飲馬水乾沙窟白射雕塵起磧雲黄中郎節在仍歸漢校尉城空罷護羌今日車書逢混一不辭垂老看氈郷三月二日賞杏花光岳堂分韻柳色􅀄靑草漸茸春寒猶勒杏花風新烟院落清明後過雨園林罨画中洛社衣冠今日再蘭亭觴咏此情同吾年最老身仍健更向尊前借酒紅秋日偕成竹居秦景桓游蜀岡萬花園九曲池平帶蜀岡吴公臺逺隔雷塘閒㝷遺蹟懐千古迴立髙丘望八荒黄落山川秋廣大青冥風露日凄凉一尊不慰登臨地朔鴈南雲恨更長春日㳺王公亮南墅人家星散住村墟苐二港頭潮水􅀄蛺蝶一闌花院落烏犍千畒雨犂鉏養魚巳得陶朱法種􅀣還抄汎勝書興熟不辭歸路逺醉扶斜日上柴車臘日飲趙氏亭城上高亭一再過毎看風物費吟哦近詩頗效寒山子往事徒成春夢婆賸買十千燕市酒閑聴二八越娘􅁔梅花枉報春消息秖遣經年别恨多伏日陪吴興諸府公宴魯公池上芙容池上㑹群公滿意華筵咲語中虹影連蜷山外雨荷香澹蕩晩来風􅁔催銀甲筝逾急凉入金尊露易空我亦玉堂揮翰手題詩合在水精宫刋史局雨凉陪韓左丞叔亨小集㫁烟踈雨散秋虹古木高堂納晩風青史文章千古上紫微星象五雲中前朝無似于今盛群彦難期此㑹同凉思滿簾宜觧帶好懐寧放酒盃空中秋張外史招賞失約賦以謝之明月中天雲霧消酒醒凉思正飄飄星河不動秋空闊鍾鼓無聲夜寂寥露下逺山皆落木風来滄海欲生潮仙家玩事無縁到虚􅀒瓊樓聴玉簘辛巳二月朔登憫忠閣百級危梯遡碧空馮䦨浩浩納長風金銀宮􅆣諸天上錦綉山川一氣中事往前朝僧自老魂来滄海􅀑猶雄只憐春色城南苑寂漠餘花落舊紅蚤發潞陽驛征車如水轡如絲望入金河欲曙時萬里山川環拱抱九天宫􅆣起參差風林泥泥秋多露野淀稜稜曉有凘三十餘年􅀚國願白頭今日到京師上京即事灤河東出水縈廻曡坂曽岡擁復開金柱鎮龍僧呪罷玉輿馭象帝乗来中天星斗朝黄道塞漠雲山繞紫臺欲儗兩京為賦頌白頭平子愧無才舟發浙江夜泊廟山驛風帆東上浪冥㝠鐘鼓山前近驛亭江海秋生河漢白魚龍夜没水雲青誰􅀙三島求仙藥自信􅀌查應客星好喚呉兒叩舷起浩歌呼酒月中聴豫章山房為見心復公賦剱江寺裏古樟樹百尺如盖青童童山靈長此護林壑雷電不許蔵蛇蟲掃石僮来秋葉後譚經僧坐晝隂中題詩禪房更瀟洒便與王城祇樹同四明寓居即事郡城重鎮浙江東徼道荒蕪雉堞空於越山川星紀外故王臺榭水雲中舩来蠻賈衣裳恠潮上海鮮鱗鬛紅不向旗亭時一醉行人愁殺柳花風上清山中烟景空明石路微千年草木駐光輝山中觀􅆣金銀氣天上神仙黼黻衣赤日大溪魚欲化青雲玄圃鶴長飛只今浩劫頻来往未信滄洲與願違臺城運盡黄旗晉國開天星俄復拆三台方驚掘地双鵝起巳見浮江五馬来草暗離宫碑仆土雨殘戰地骨生苔當時一匊新亭淚猶帶寒潮日暮回冶城此地先皇駐六龍鼎成龍去杳無踪御床羅帕塵空暗輦道朱門草巳空題榜侍臣留帝􅃙築亭真士記天容自憐不及窺弓劍愁絶寒城響暮鐘鹿苑寺周處讀書臺郗后化蛇井皆在千古南朝幾劫􅁅䔥梁寺􅋕獨崔嵬化蛇妬婦餘空井刺虎􅀅軍有舊臺江口山紅寒照没石頭樹白暝烟来滿衣落葉西風急更為馮高送一杯瓦棺寺脩竹長松晝寂然梵宮高閣起中天虎頭妙畫空餘刻䲭吻名書竟不傳石柱至今標􅀫莽瓦棺何處葬寒烟馮高更盡䦨干曲及取江山未暮前石頭城用薩天錫韻逶迤石路帶城遥古寺殘僧蘚半凋一自降王歸上國空餘故老􅀃前朝壊陵􅀑剽傳金盌画壁仙粧剥鳯翹更欲㽞連盡竒觀夕陽江上又生潮秦淮晩眺赤欄橋下暮潮空逺火踈舂晻靄中新月半天分落照㫁雲千里附歸風嚴城鼓角秋聲早故國山川王氣終莫訝時来一長望越吟荆賦思無窮北歸渡河黄河南徙合清淮衮衮聲􅀙地底来岸㫁魭鮀蟠窟宅浪髙鱣鮪化風雷千年瑞應羲圖出萬里經流禹鑿開好汎靈查上天去窮源一試濟川林拜㐮陵祖塋有古柏四十株我祖神靈如在上曽孫来此獨踟蹰佳城白日三千歳喬木蒼烟四十株天上難招歸表鶴客㳺終作首丘狐生平不觧青囊術自愛西山正向隅
