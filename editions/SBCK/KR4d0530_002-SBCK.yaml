body:
  text: 宫中舞隊歌詞十六天魔女分行錦繍圍千花織歩障百寳帖仙衣囬雪紛難㝎行雲不肯歸舞心挑轉急一一欲空飛鑿海行龍舸馮山起鵠䑓天池神馬出月殿舞鸞来六合妖氛静群生壽域開吾皇樂民樂願上萬年杯白玉琱􅁫燕黄金鑿歩蓮簫吹鳯臺女花獻蕊宫仙香霧􅇛銀燭歌雲撲錦筵請􅀅供奉曲同賀太平年陳伯􅀅作北山梓公岳居圖予題于上髙僧業何許雲夢澤南州楼閣諸天上江湖萬里流禅心無住著生丗􅀂浮休寂寞京塵裏披圖時卧游潞荘松棚叟賣漿棚下午風凉獨澗繞群木数家成一坊蜂閑花巳􅁡􅅙罷葉仍桑此地無千歩真堪作蛻蔵鴈聲嘹嘹数鴈度㳅響一悽然半落淮南雨遥沈海上天踈砧欲断處哀角未吹前我亦離群者聞之夜不眠馬通薪可代薪如桂還宜火作媒翁攤扶杖立童拾戴筐囬野屋塞堆整山爐夜撥􅁅廐官無好亊不遣換香来烏桕樹西湖慈雲山側和靖有詩巾子峯前樹逋仙句最工迥明霜寺外半落石池中鄭老惟書柿崔郎只詠楓山林正寂寞借此作春紅聞蝉中庭白榆樹時有一蝉声沸繭方抽緒鳴絃忽断笋蒼烟起平椘落日下高城曽是天涯客因之百感生書所見戊戌七月溝中人啖屍道上母抛兒有眼不曽見無方能療飢干戈未觧日風雪正寒時㱕向妻孥􅀃母嫌朝食糜城南官掘穴日見委屍􅄹終朝鳥烏下薄暮狼狐鳴氷裂人刳骨風悲􅀑哭声茫茫死生理真宰豈無情偕鄢元止善東門視田白骨如􅅍石荒村殊􅆭神惡風生殺氣斜照逼帰人應俗悲多故全生幸此身靑青原上麥亦復可憐春題林德叙竹雪齋髙齋脩竹林積雪竹間深歳暮不改色幽人同此心種梅分地􅂩籠鶴就墻隂想見椒江上扁舟許客尋雪後雪後北風急起行氷滿須凍泥􅁨蹇馬活火爱􅇛蒲数口狼依狽群情虎畏貙毎逢来使問親故有書無路滑堆殘雪山晴散􅀫霾民生巳􅂗炭兵氣尚江淮撫丗􅁨徒切謀身計自乖臨觴且復醉吾命有安排癸巳元日即事禁苑朝珂集宫楼晝刻傳雲間黄道日春麗紫微天進虎蠻如畫仪鵉仗􅀋仙晨􅀚浄氛渾即是偃兵年大駕時廵千官導送至大口萬乗廵行逺三􅂕佑護多旌旄隨大纛鼓鐸襍鳴駝􅀄日浮黄繖微風送玉珂臣心如草色不断到滦河松巢為潜川謝堯章作林栖有隠君結構出塵氛就樹􅃒青雨牽蘿􅀘白雲双鳩从比拙獨鶴与平分華屋非無数山中了不聞蛻菴歳晏百􅁨熏心排遣以詩乃得五首開􅀊七十五故園猶未帰看從今以後知復是耶非星斗天垂象龍蛇地發機邊声近稍息一醉典春衣小小新齋閣温温舊毾㲪精神全藉酒筋力半支藤蟄豸深坯戸㝠鴻巧避矰􅀩頭衲􅀍底何異在家僧丗路正如􅁄吾生猶繫匏詩人􅁔蟋蟀軍士歎蠨蛸無地营家食何心觧客嘲山林徒在眼難覓一枝巢書舎如僧舎心閑與静宜冩多髠兔頴藏乆蚛貂皮宦蹟年劳見生涯日暦知未應同與俊肯􅀒沃洲期乆悟無生􅀃从容与化遷機忘橰俯仰道悟宻中邊宇縣猶多壘干戈巳十年吾惟待其㝎帰種故山田十月一日瓦益醅純白甎爐火乍紅風生月暈後霜下角声中飢䑕窺燈暗驚厖吠巷空于今玉堂老詎信暮途窮立冬前二日髙秋日淒冷且復閉門居蠏壮輸芒後醅香出榨􅀄霜籬存晚菊臘瓮作寒葅更好山翁唱陽春恐不如呉下客懷和荅湛囦白先生廷玉湖海無窮亊風霜薄暮年客程淹白日吾道信青天影自詶形贈心寕受目憐平生五字律名在萬人前懷先隴京國㽞家乆餘生只自憐一單如老衲八十又新年義士心惟血䜛夫舌謾涎何時抱樽酒􅀏向計峯前七月廿九日此醜今方殛京城蹀血新也知天悔禍誰謂國無人勝氣騰龍虎沈機動􅀑神大庭親命詔終夜在延春自誓此醜行當殛吾身敢頋危要看奪笏處正是結纓時萬古千秋在皇天后土知寸心三尺簡肯愧史臣詞乙巳􅀄度日自壽今日吾生日開尊向竹齋家人更上壽凡亊請寛懷學道精神淡匡時志願乖百年原上土自有一抷埋病起強起梳頭坐窓明晚景新生遭兵是劫病與􅀑為隣農亊田疇廢􅁁声鼔角頻故山多藥物徒切未歸身雨凉一雨収殘暑新凉夜頓􅄈秋声滿落葉蟲語傍虚􅉉衰疾便髙卧㳺程嘆乆淹山林雖寂寞亦足養吾恬􅀊晚苦寒偶成四章録似北山老禅易之編脩風􅁀寒逾急星囬歳欲周缺牙便食粥痩骨怯重裘莭物殊牢落落圗益􅍝悠蛻窩真􅀋蟄長日火爐頭清眠夢屡斍霜氣轉凄凄春近鴈北郷月明鳥夜啼爐香㽞墨􅂐燭涙聚銀泥少釋幽􅁨疾㝷君一杖藜兒劣翻書􅁽猫馴伴座氊吟懷欣雪夜疾目畏風天惟酒能消日無方可引年我詩猶偈子一問北山禅短景促殘歳窮隂連大荒徂三隨所賦亀六可深蔵未了惟文債堪帰秪醉郷絁衾有餘暖翻喜夜天長四月十三日白丁駈上城徒手不能兵闘􅀅惟人色行涂多哭声惟将孔逹觧竟遣夙沙烹滿眼黄塵暮悲風􅃤淡生城東廢寺一逕入荒寂松風長晝寒野义栖敗屋魔女去空壇古佛金全剥遺碑字半刓時逢好亊者来剔蘚文看遊刘真君廟俗曰三十􅀰文山嘗辟兵于此古廟西原上虚廊半欲摧木龍鱗剥雨畫􅀑面生苔叟乞烧錢火巫抄構殿材英雄有神護遁蹟此中来漸老漸老惟貪睡相㽞火有情詩从年長淡寒入夜深清不鼓床琴㾌慵書帖字生灯花獨何喜連夕向人明夜􅀫青芝墳園水落寛舩歩年豐宻酒壚土酥分地産木􅁡薦秋􅃾認路塵踪㫁拖􅀏野影􅀌行人不可暮落日有於菟上都从駕幸東凉亭鶴禁烟華紫龍岡草色靑羽林移曉仗法駕幸凉亭大業開天造甘泉發地灵微臣叨侍从願睹萬􅀖寕西内應制即亊烽火連齊魯干戈接隴秦四郊多壁壘萬里半烟塵􅀅帥屯兵乆君王遣使頻老臣叨視草進罷一霑巾行次獨石驛大雨馹行廿里喜晴叚段青天出浮雲四散帰燕忙攙馬過蠅乱撲人飛逺道倦行李故山思採薇北風朝巳冷未敢御絺衣􅁀疾卧視草堂予再歳分院矣伏枕朝慵起惟􅀅藥裏親紛紜眼前亊憔悴病中身􅀫露濃於雨秋花好似春最嫌薑桂絶無處乞諸隣有㫖翥領宋史刋于江浙次東阿站南来十五驛幽絶獨斯亭下榻月􅀄上捲簾山更靑干時嗟莫齒从事厭勞形寂寞江雲外誰知使者星九日抵武安縣徘􅆦店水落衡漳急川囬上黨髙流年秋忽忽行路日滔滔山市人多癭沙溝地不毛村墟欣有菊小駐為持醪代祀湄洲天妃廟次直沽曉日三叉口連檣集萬艘普天均雨露大海静波濤入廟靈風粛焚香瑞氣髙使臣三奠畢喜色滿宫袍次石門驛投老復行役江湖秋興悲艤舟黄落處欹枕黒甜時燕閏歸何晚鷗晴浴故遲不妨無事飲聊遣有情癡剡中清風嶺王莭婦沈江處有血書石上盡日經行逺嶀山又􅌘山江光寒照外雨氣􅅍峯間野艇􅊻魚賣村巫詛虎還千秋貞婦廟㽞在血書班關嶺新昌縣青林抱澗阿直上更嵳峩田鑿雲根種人盤鳥道過􅅍泉鳴暗谷豐草被陽坡彷彿疑山􅀑衣裳隐薜蘿雨中次黄嵓驛􅀫雨晨􅀄歇高秋日浸微水聲千澗落雲氣萬山歸委羽洞天在仙人飆駕飛丹砂如可問吾豈戀朝衣夜過石溪驛籃輿揺醉夢軋軋過前岡木落風聲碎行人月影長逺村時見火霑露忽零裳一􅀏方言異前涂殊未央劉山驛處州馮山嶺兹山􅀋台剡囬復度中岑傳舍白雲上人家烏桕林此身嗟老大行路轉嶇􅋂佳處時停䇿終焉惬野心瀬溪一名猴溪古渡猴溪外風烟淡欲無島人形貌恠閩語言殊小店魚蝦市深林猿鳥都肩輿看山好􅀱􅀐緩前駈發漳州萬里漳南道遥連嶺嶠東山寒冬息瘴海近晝多風廢圃攅筋竹踈林落刺桐㯽榔新善啖一觧􅀫醒空歸武林家雨至練市韓伯清荘溪雨寒猶重山雲晝不開老夫喜閒暇練水得􅆓洄鳬鴈衝船過魚蝦入饌来故人居漸近應待舉吾杯汎舟靑鎮至姚師善莊夕囬韓莊明月半溪水歸人中夜舟樹隂屯岸合螢影入烟流勲業生無取田園老可謀悠然發清咏思繞白蘋洲召入國學雨中過髙沙湖細雨洒秋色平湖生白波客心貪路急帆力受風多落木生詩思驚禽避棹歌舟行不借酒兀坐奈愁何登歌風臺君王逝巳乆遺構在城空闊青徐拆蒼茫楚漢争荒山尚雲氣喬木有風聲無限登臨意長歌忼慨生早發魯橋路滑􅀨􅀄歇山昏雲未開看燈野店近聞鐸賈車来馬飽力方健蛬寒聲易哀偶逢南去使早早附書囬泊隆興章江門把酒西風裏挂帆南斗旁夕陽城角盡人影水中長問俗勞羇旅干時儗俊良平生查上意漂轉益難忘還自臨川省親鄞之長山元日有作丙辰茅屋鹿皮几柴扉烏角巾杯盤豐海味禮數畧郷人樹霽石秋曉山暄槎浦春僻居無一事即是葛天民次曹娥江廟貌丹青古碑詞風雨訛桮投估客拜神降女巫歌沙竈燒鹽速潮船聚堰多貞魂招不得揮酒大江波北歸四月一日舟至市涇乙丑緑樹村村合晴川浦浦通岸容寛積雨水色㝎囬風戍近時鳴柝漁歸忽艤篷船人喜相約乗早過垂虹泊淮口灧灧潮􅀄上移舟出浦中岸分清濁水帆掉合離風傖楚方言􅇎徐􅀭地利通何殊入喬口懐古思無窮黄河櫓後風才順桅頭日未斜舊河通瓠子新浪漲桃花得鱠因沽酒聞䳌更憶家迢迢雲氣外北望是京華㽞􅀫洪洞慶雲􅀚劉山甫方丈旅寓丹房夜髙城乍絶鐘蠟花燒燭短乳面潑茶濃山豁三更月秋添四壁蛬殷勤老貞士清話得从容舟行即事霧樹渾連水氷溝不受潮米鹽江上舫魚菜市中橋壮士寧辭辱仙公㑹見招􅁁淮無酒禁磊隈剰須澆天水混無際中流明月輪山形立積鐵潮色爛鎔銀沙露凍粘石海風寒薄人舟師傳吉語沽酒祭江神歸来􅅰擾群生裏茫茫大化中是非同喻馬得失一亡弓買酒从賢濁論文任􅀑窮此身河上鳥只合信天公處士聲華逺吾生志趣同結廬猶洛北避丗即橋東幾見薫天冨俱成撲地空虞羅謾機事未許􅆲冥鴻七月一日之集慶望日次錫山􅀫玄文舘海月光芒濕川雲意緒閑剛風浮地外元氣滿人間野榜歌相荅漁燈去不還電明知有雨只在九龍山九日謁告歸阻風御河齊家堰壬午雨後風俄􅁀蔵舟古岸隂早霜紅樹變殘月白河沈鷗汎乗長浪狐跳没逺林人生信淹速那敢易􅀄心至通州去􅀊南帰以九月十二日發通州今年召入亦以是月日至通州云驛卒争鳴鼓舟人喜下桅依然今日到恰以去年囬岸黒秋濤縮川紅夕照開君恩忘險阻不覺畏涂来自悟古佛風潘盎詩僧醉可朋有生還有劫無盡本無燈早自楞伽悟今非願力能此心寧萬慮於道即三乗海内虚遊子山中蛻骨仙一單如老衲八十又新年野馬飛䆫日醯雞舞瓮天吾今丈人行肯與衆争憐上除日南山蓮社期懴偕伯清昆季還飲南園禊飲湖亭上臨流自祓衣閏㽞春事晚風打酒船稀蛙子黒􅀄出桃花紅欲飛早霞知有雨霑洒送人㱕伯清邀予至青芝塢汎湖暮㱕塢韓先隴也落日風花起寒波倐眇然山蔵進雪寺岸護種氷田醉眼輕浮丗牢愁入暮年􅀂為湖一曲携釣隠漁舩淸明遊包家山乙丑逺近紅千樹繁開奪艶霞月明寒食雨春老上陽花軰路迷游躅宫詞入夢華東風葵麥恨囬首野人家太液曽来鵠髙臺舊影娥美人黄土盡故國白雲多野草荒神籍宫蓮怨棹歌羌兒洗馬處斜日滿寒波偕􅀭瑀元誠王􅇐自行湖堤閑歩湖上西風急秋隂正杳冥水㾗連岸白山色徹雲青蟄燕依深谷還鷗下近汀君歌我當和有酒滿長缾秋試後胡益士㳟㱕畨易與游呉山聖水寺髙處見滄􅈚西風吹酒醒潮来一片白山擁萬重青草木如浮動烟塵忽杳冥登臨不可極吟思滿秋汀清明日偕李欽嗣㳺呉公弓臺至雷塘蜀井路絶平沙過新塘水半乾龍㱕雷雨惡鶻没海天寛縣幟春酤熟行厨野祭寒此生無􅀝泊隨處得盤桓九月八日陪危太朴偕梁九思遊南城三學寺萬壽寺南城多佛刹結構自遼金旁舍遺民在殘碑好事㝷雨苔塵壁暗風葉石