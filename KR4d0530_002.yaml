陪危太樸偕梁九思㳺城南三學寺萬夀寺南城多佛刹結構自遼金傍舍遺民在殘碑好事尋雨苔塵壁暗風葉石牀深一飯蒲團了蕭蕭鐘磬音其二休日得連騎髙秋天氣新樓臺惟見寺井里半成塵壊廟鬼無主荒丘狐化人千齡共須盡回首一傷神文昌樓望月時家已歸浙上今夜溪樓月登臨倍惘然電光何處雨風色欲秋天歴歴燈縁岸依依笛起船江湖歸路𣺌廻首白鷗前清明日逰東山謁棲霞嶺仇先生墓前輩凋零盡南陽有古阡詩應傳四海酒不到重泉槐國真成夢桃源亦是仙松根一匊淚慘淡墮風煙秋日獨行便上偶至清修寺庚午溪南野寺幽巾舄偶相求古道多黄葉殘僧半白頭逺村髙鳥暮灌木亂蟬秋此地茅堪剪吾将卜隠丘四月望觀帝師發思跋影堂佛子來西竺巍然南面尊法筵花散漫香殿玉温黁龍象諸天下鐘螺竟日喧朝觀立隨喜如在給孤園九月六日宿寳集寺來借禪房宿悠然空客心殘僧㡬人在古殿一燈深簷鐸能蕃語齋居發海音重陽又已近聊復此登臨次韻莫景行秋雨喜晴苦熱不可忍汗膚鱗甲生雨分何處落月在半天明蟲語迎秋早川光入夜清得涼忘坐久河漢忽西傾甲子元日夜大雪初三日立春始晴㡬年無此雪南國見應稀平地深三尺飛花大一圍銀河乾徹底白石爛生輝潤色饒梅栁新春曉已歸南園宴集雨歸有作驟落菰蒲雨遙生菡萏風歸雲龍井黒倒照鳯山紅簾暮舟頻引衣涼酒屢空歌聲未可放花底有驚鴻辛未苦雨禾田猶鉅浸春日復連綿醉使呼堂上饑人死道邊鶴神方下地龍伯已行天真宰如容問吾心血可箋癸酉人日雨中是嵗十二日立春積雨将謀雪新年未入春半生如過客七日又逢人采勝天花小香醪玉色醇多憂亦何事適意任天真與勃海孟芾景章守嵗成居竹宅予長一嵗此老無柴棘襟期一見同詩如孟東野名是米南宫把酒推年長圍爐到夜終賸吟須賸醉相對各衰翁庚辰元日立春采燕方迎嵗蒼龍忽建辰車書時有道宇宙物皆春紅喜燈花重青看菜甲新屠蘓不辭後已是白頭人戊子正月連雪苦寒答段助教天祐吉甫二首雪寒渾未解風力更狂吹强飯憐君瘦重裘覺我衰酒香紅面頰燈影黒鬚眉黄鶴山中地求田已有期其二三年冗博士自謂四海老詩人吉甫同是桑榆日惟堪麯米春清羸元夀相吉甫骯髒任長身自謂㣲子誰知我從來懶更真四月十四日習儀白塔寺有㫖翥升院判乍換朝衣紫祗憐客鬢華才知無補世官喜不離家海燕雛方乳戎葵蕊未花歸來北忩卧塵汙滿烏紗七月六夜對月星㑹黄姑夕天回白帝秋明河初左界大火漸西流晚景逢多故寒心集百憂山林莽寥落何處覓丹丘乙未元日稍稍鐘鼓動紛紛車馬朝張燈照白髪把酒送寒宵黄石終歸漢洪厓反見堯芻言欣見采拭目望新條嵗除日七十古稀有欣然嵗更新換衣癡女喜分粟故人貧軟飽須官釀竒温愛絮巾明當候雲物載筆紀王春暴風閉戸復閉戸黄塵千丈生不雨草無色衝風人倒行㳺子念鄉土腐儒憂甲兵狂吹不肯息終夜為心驚長至日壬辰至節得休暇閉關宜燕居孤懐愁易切逺信語多虛夀酒教兒勸祥雲聽史書親知半湖海無地問何如大風時送友南城南國碧雲暮西風芳草多相思故人逺如此别情何清絶山僧筆蒼茫楚客歌慿将萬里意一問洞庭波嘯亭為鹽令賈策治安題亭在西興江上老子掀髯處雲間孤草亭不妨舒逸氣直恐動精靈風水劃秋湧魚龍悲夜聽㡬翻流響歇江冷越山青寄題欽惟心山房三首在京口普照寺普照南徐寺蒼蒼祗樹林䭾經惟白馬布地盡黄金午梵鐘聲逺寒燈殿影深由來世界黒誰與一明心其二朱方有真子心印悟南宗奏樂惟天女聽經化海龍香凝行道席燈照著衣鐘猶厭依城市開門别種松其三名山旦夕仰方外宿心親業白到初地性空無一塵乞鐘時出寺坐夏不迎人想見惟心叟風涼滿㲲巾輯山村先生詩卷昔在垂髫日今吟薄暮年牀孤郗氏選詩得謝公傳故國空戎馬荒山冷墓田祗令後死者忍泪讀遺篇其二卷可留天地詩嘗泣鬼神遊仙歸化鶴披髪下騎麟素望髙前輩青衫老此身棲霞石表在終古不成塵金山橋上聞苑池荷香内苑立馬金河上荷香出苑池石橋秋雨後瑤海夕陽時深樹棲霞早㣲波浴象遲煩襟一笑爽正喜好風吹次韻題大雷山桃源汪氏桃隠鄞縣幽甚南雷路嘗聞故老傳墟通賣魚碶潮入種蚶田櫺子渾成樹桃花不計年山中多佛寺燈火肅芉芉其二南北二十里兩山中過雲采芝隨鹿去拾果與猿分酒熟青田核羮香碧澗芹非君播詩句那得世人聞鑑堂上人招余逰慧山行舟不成往因寄竟負山逰約長懐第二泉毁茶休著論載酒謾回船㑹摘春林雨來尋午竈煙從師坐聨句祗恐廢安禪大風徹晝風何急避行陵樹傍驚沙撲面黒野日暎人黄科斗旱未出栗留寒欲藏窮途淚易下不是阮生狂七月旦立秋風雨夜寒練裯不解暖已索絮衾眠老疾日漸退餘生天所憐蝎行忩紙響蛾撲燭花偏喜見沽頭報江南有到船黙坐時俸支降真香黙坐觀浮世何殊起滅雲猿寒夜嘷母鴉急晚追羣應俗神嗟耗經冬足苦皸俸香吾獨喜日可炷爐薰除夕坐玩羣兒戲閒供一笑歡朱丸那却鬼白酒不禁寒官索題春帖鄰分饋嵗槃歸期知㡬日謾檢厯頭看初三日夜翫月至中秋日得詩化工金鑄巧又換一鈎新逺道傷逰子深閨喜拜人影縣秋半破明遡日西淪正擬排宵看裁詩莫厭頻其二新月過初弦氷輪次第圓空中真見相清極恍如仙舊雨蒼苔地新寒白露天匡牀延佇久不覺屢移前悼太平公晨起洒杯酒北風吹淚痕豈徒歌楚些端欲呌天閽碧化萇𢎞血春歸杜宇魂千秋一史筆誰辨逐臣寃梅隠為蕃禧觀余道士作二首隠者多幽事鋤雲自種梅㡬盤山徑術强半雪莓苔拾藥泥丹竈浮香入酒杯時時霞上友清曉踏寒來其二茒屋西林下逋仙恐是君支笻鶴外見哦句竹邊聞老樹春常早空山雪不分道人無夢久何處覓梨雲寄雲門僧若邪溪兼題其松風閣二首聞道邪溪叟髙年出寺遲眉毫長㡬許布衲破多時挂錫鶴移樹繙經花滿池相望一江水嵗晚赴幽期其二閣外老松子蕭蕭虛籟生定從何處起寧有不平鳴我耳固師耳風聲是樹聲他時叩禪寂衲破睡天明識趣齋為山隂魏仲逺賦夏盖湖濱宅幽然水竹開荘前魚市合山下酒船來把釣雲移樹尋詩步石苔相羊縂成趣直待醒心回送泐季潭逰天台并送淵侍者歸天台二首來從石城寺去訪石橋僧錫杖空山路禪龕獨夜燈道知文暢得詩識皎然能到日西巖下應吟瀑布淜其二解夏回天竺尋真問石橋鄰房留偈徧歸路載經遙瀑壯秋懸雨江明日上潮題詩寄相憶何處覓山寮送蒲空叙本中往住長蘆寺在嘉禾杖錫風塵際師行戒畏途故人懐檇李春水到長蘆舍利藏金塔袈裟繫寳珠禪房大自在應念室中蒲謁儀則堂上方觀聽續撰釋氏通鑑平生方外朋今識故鄉僧史有春秋筆談空大小乘香厨朝飯麫古殿晝燃燈歸路煙蕪外斜陽下道陵北山以雪忩墨蘭竹石求題次韻幽蘭出楚畹美竹自湘濱共友三生石俱涵太古春山林空見相氷雪老通神長作禪房供毋令墮世塵清溪濯足圖黄塵滿雙足宜賦故山歸解屨就清泚舉頭看翠㣲林猿下窺膝石蘚欲霑衣更覓漁竿伴閒來就釣磯觀潮海口潮初上江流湧不行大風生氣勢烈日奪光晶鷁首來何駛䲭夷怒未平呉兒誇壯觀車馬暮填城送䝉古僧印空巖黄龍寺受戒于天目山髙僧明廷秀受業自南宗心訣提為印禪機捷若鋒爐香來化鶴瓶水豢降龍弟子經忩外應占舊偃松其二古刹西江外師居最上方山神出䕶法天女下焚香久客霜髭滿歸舟雲樹長秋期到天目容我借禪牀溪居山水小景二首想像溪居好時來放釣船滄洲茅屋路春水白鷗天林壑無多地煙霞自一川底須論咫尺對此已茫然其二何處野人村㣲茫澗谷分林多太古樹山有四時雲鳥跡還成道猿啼或作羣秋風茒屋破誰賦隠思君水墨達摩像班惟志筆佛法無多子西山雪柱天應尋葱嶺去方解少林禪鞮屨露雙脚罽衣披半肩虛空本無住須借影中傳數日北風興懐過海諸友數日好風色行人應到家秋花香獨耐寒雁字多斜薄飲無長酒輕行有小車吾心何爾汝聊復度年華啖筍今日食指動新苞來上林此兒生似玉饋我重如金晚火炊鮮滑春雷發蟄深山園未能往少快老饕心悠然閣為歙鄭處士作鄭子林居好遙希靖節賢看山秋色裏把酒菊花前人境殊多事吾廬自一天能知此中意何處不悠然次柱德常僉院韻鼇禁欣同直髙閒勝俗忙露花迎夕歛風樹借秋凉太史蘭臺筆郎官粉署香時時鈴索靜有喜到巖廊聞董孟起副樞乃弟鄂霄院判凶訃哭之二首天狗忽墮地兵生牙帳中寧為仗劍死不作倒戈攻故國魂歸黒平原血濺紅驚心激此變誰為責元戎其二羣盜猶銅馬将軍真虎牙死當為厲鬼生不負皇家野色含沈日河聲怒捲沙征東失名将朝野共驚嗟過黄河食指朝來動行庖旅次添淮魚初出網野鴨乍供鹽新米如珠滑香醪過蜜甜真成不負腹聊爾一掀髯陪東泉學士泛湖山靄忽空無春暉正滿湖船頭載家樂花裏駐行厨樂任喧呼動歸從酩酊扶使君留客意更為倒金壺題汪㑹語村隠居聞道荆村僻幽居趣自成桑中豚穽晚芹外燕泥晴苔石留僧坐山尊遲客傾憑軒久不到望得白雲生題太史楊公山居圖湖上山居好奎題壓翠㣲煙霞改舊色林壑發清暉松晚看書罷荷涼坐釣歸圖中有真趣須此挂朝衣伍牧宋将尹王援常州戰死於此苦戰勤王事精魂泣鬼雄壊城兵氣黒遺鏃血花紅故老談亡國明時録死忠長吟一搔首落日鳥呼風九日行湖上是節最闗情隨山得散行西風片雨過落日半湖明野菊黄堪把官醅綠可傾坐來無限思散入逺鴻聲莫矣莫矣年光速凄其世慮多半生縣磬室萬事缺壺歌秃木風難響寒雲日易蹉向來出處意不决欲如何寄韓伯清淫雨俄如此能傷稼穡無積隂霾日月愁色滿江湖老大心空壯艱難道愈孤美人秋水外不寄錦襜褕蜕菴集卷二
