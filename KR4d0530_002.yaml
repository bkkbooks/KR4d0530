body:
  text: 蛻菴集卷二元張翥撰五言律詩登歌風臺君王逝已久遺構在彭城空濶青徐坼蒼茫楚漢爭荒山尚雲氣喬木有風聲無限登臨意長歌慷慨生黄河㯭後風才順桅頭日未斜舊河通瓠子新浪漲桃花得鱠因沽酒聞鵑更憶家迢迢雲氣外北望是京華泊淮口灔灔潮初上移舟出浦中岸分清濁水帆掉合離風傖楚方言雜徐揚地利通何殊入喬口懐古思無窮蚤發魯橋路滑雨初歇山昏雲不開看鐙野店近聞鐸賈車來馬飽力方健蛬寒聲易哀偶逢南去使早早附書回泊隆興章江門把酒西風裏挂帆南斗傍夕陽城角盡人影水中長問俗勞羈旅干時儗俊良平生槎上意漂轉益難忘次曹娥江廟貎丹青古碑詞風雨訛珓投估客拜神降女巫歌沙竈燒鹽速潮船聚堰多貞魂招不得揮泪大江波還自臨江省親鄞之長山元日有作丙辰茒屋鹿皮几柴扉烏角巾杯盤豐海味禮數略鄉人樹霽石湫曉山暄槎浦春僻居無一事即是葛天民衡山福嚴寺二十三題為梓上人賦般若寺般若南朝寺思公第一傳拓開方丈地坐斷再生禪貝葉收經夾曇花散法筵山神應夜夜來禮佛燈前一生巖初地靈峯下重來為講經神應合掌受石亦㸃頭聽雲鶴隨飛盖湖龍入净瓶至今花雨處長照一鐙青二生塔塔寺前朝舊山林宿業空法身無幻壊藏骨自神通寳供珊瑚碧珠花舍利紅無縁香一瓣回首佛堂中三生藏神僧湼槃處那有去來今尚記三生石難磨萬古心地埋禪刹在山掩岳祠深長日聞鐘梵蕭蕭楓桂林天柱峯一柱標南紀神功自斷鼇寒過岣嶁逺勢敵祝融髙異鳥流清響神鐙見白毫危顛可觀日夜湧海東濤擲鉢峯神僧手中鉢擲向最髙峯徑度虛空上難尋變化蹤錫飛曽近鶴劍躍或成龍搔首不可見煙霞千萬重定心石燕坐百念息湛然方寸間相無分彼我空已判真頑魑魅來相試芻尼去不還衆人笑癡衲長日此看山磚鏡亭曹溪一祖後衡岳世多賢分得燈相續提將印宻傳法音風萬籟禪性月中天珍重磨磚喻㣲機要自詮隠身嵓塵世苦熱惱山林長夏幽岳神來䕶法尊者坐經秋呼粥魚頻響銜花鹿自㳺法雲長散滿七十二峯頭三泉一沼功徳泉天成後雙泉神應來雲根錫卓破卓錫泉地胍虎跑開虎跑泉暗溜懸山雨寒光漾石苔諸僧朝盥罷相次上堂回嶽心亭何許新亭好軒忩窈窕深天開雲四面地據岳中心雨緑蘼蕪道風香薝蔔林曉嵐收不盡猶作半山隂目雲亭兩公俱古佛遺跡在新亭塔寺疑神造山川本地靈峯秋陽雁斷潭暮雨龍腥老宿忘言久閒抛案上經迎雲亭細路捫蘿上髙亭在翠㣲樹隂幪草坐山氣濕田衣落日孤鐘動遙天一錫飛悠然片雲下知是應真歸兠率橋傳是竺僧說幽如兠率宫驅龍劈地險架石補天空星土熊湘合雲沙鷲嶺通䦨干倚來久時度吉祥風開虹橋蝃蝀横當道蜿蜒下滙潭幽光飛睒睒危構鬰耽耽鳥下窺寒瀑樵回帶夕嵐遙知說法處來作老人參大慧塔大慧談經地林園即給孤鑿雲藏舍利鞭石起浮圖風鐸時喧寂天經忽有無沙門每來此三繞作南謨讀書堂上年賢宰相遁迹白衣時試問葫蘆卜何如懶瓉知才名留别傳香火寄空祠千載衡江水東流有所思煨芋嵓彼美山中芋輪囷類餓鴟暖生松火夜香透竹爐時虎跡羣行滿猿聲獨嘯悲鄴侯知味否莫比御燒梨御書閣粲若唐宸翰森然宋賜書寳藏經閣上光動道塲初川岳留竒觀風雲繞净居何時能一到銀鑰借開魚退道陂神鑿三百級盤廻上峻陂攝衣蒼蘚滑倚杖白雲多野叟耕麋田耎山都寄鳥窠朱陵是儔侣飛錫定相過止南寮昔隠黄龍老今遺書記寮人天所供養巾盖此逍遙仙樂時時下香雲往往飄千秋一金塔闕藏雪寮雪山一片雪何日落中華皎㓗無藏處虛空自作花石厓穿乳竇海岸叠潮沙底用分荆越諸方總是家氷雪菴近嶺無氷雪菴居易過寒飯炊麻子熟衣補衲頭完顥氣詩脾裏雷音講舌端知師最清苦歸去北山干題桐廬鳳山寺僧道大鷺雪軒禪客忘機地舂鉏爾亦靈飛來萬㸃雪巢破一林青晚瀨明拳足秋蘿退閣翎山神䕶說法吹斷草風腥篷軒為呉僧元誼賦縛竹作禪宇小於江上舟樹聲疑叠浪月影似中流興寄江湖逺身同世界浮懐師燕坐處吾道在滄洲静寄軒為呉僧一元賦羣動寂寥外一軒瀟洒中山林亦長物身世本虛空清磬花龕日孤燈竹榻風不曽離寓所惟有主人公抱素子作自適圖求題隠者抱幽素獨行穿杳冥有詩吟木客無駕勒山靈寒澗流沙白秋雲入竹青攜琴向何處彈與野猿聽北山誦藏經三旬畢詩以調之金布荘嚴地花飛梵唄時舌端談孔雀頂上集芻尼國夀祈天永皇心體物慈明當喜圓滿一月廢吟詩用北山韻答之吾衰年冉冉師樂日閒閒師以詩娯意吾将酒駐顔看雲知幻滅見月喜明還莫問誰家曲相酬笑語間次柱徳常僉院韻鼇禁欣同直髙閒勝俗忙露花迎夕歛風樹借秋涼太史蘭臺筆郎官粉署香時時鈴索靜有喜到嵓廊馮秀才伯學以丹青小景山水求題沙禽毛羽新來往采桑津野水碧于草桃花紅照人徘徊逺山暮窈窕江南春芳思不可極悠然懐釣綸送觀性空上人歸省白髪髙堂在青山舊業貧載經隨客舫留偈别禪鄰行路半春雨近鄉多故人一龕還可老莫汙衲衣塵送以中及公自揚天寜寺逰匡廬趺坐對禪鐙江風浪㡬層還從鶴城路去訪虎溪僧湖曉星浮石巖春瀑斷氷呉中却回日應老舊池菱清軒軒居最瀟洒不受一塵侵門斷懐金者人知飲水心鶴聲生晚思竹色净秋隂此意琴尊外翛然只自深話舊送胡士恭之京師話舊共蟬聨河橋且繫船春歸花滿地江濶雨連天處士題鸚鵡詩人拜杜鵑此生雖老去未敢愧前賢自顧自顧摧頽客仍居寂寞濱月傭奴誶少嵗計婦憂貧酒後詩成夢燈前壁寫神漁樵吾所喜相見即情親懐天目山處士張一無二首仙巖道士禮中峯受戒具一飯了年華蒲團静結跏雪蹊抛即栗風壁裂袈裟寒狖窺燒葉饑禽聽施茶清除億刼想吾欲問僧伽其二僧舍蜂腰綴君居第㡬間池氷寒挂瀑雲雪白藏山未得抛塵網相從出死關東岡幻住塔禮罷㡬時還送福上人無際南歸嵗閏春來早師行且過寒問程山寺逺乞食野人難空性元無際禪鋒豈有端遇予方外友一為問平安清河水漲答復中吉監縣水字韻漭漾清河漲湍流滋浸淫滄溟渾灌注濁浪浩浮沉洲渚津涯濶泥沙沮洳深㳂淮澤鴻滿漂蕩渡江潯送鄭喧宣伯赴赤那思山大斡耳朶儒學教授四首其一聖祖興王地風雲䕶大營天垂紫塞濶星戴赤山明人俗殊淳古皇文易化成君行當勸學無愧魯諸生其二絶漠同文軌提封振古稀犬牙開武帳元老秉天威白馬紫駝酒青貂銀䑕衣那思山下水曽覩六龍飛其三野散千軍帳雲横萬里川寒多雨是雪日近海為天黒黍供甘釀黄羊飽割鮮廣文但少客寜慮坐無氊其四晨發戒行􅋔風沙磧路長油韀白鼻馬藍綬赤銅章文學重新命闕宫中舞隊歌詞十六天魔女分行錦綉圍千花織步幛百寳貼仙衣回雪紛難定行雲不肯歸舞心挑轉急一一欲空飛其二鑿海行龍舸慿山起鵠臺天池神馬出月殿舞鸞來六合妖氛靜羣生夀域開吾皇樂民樂願上萬年杯其三白玉琱釵燕黄金鑿步蓮簫吹鳯臺女花獻蕊宫仙香霧團銀燭歌雲撲錦筵請将供奉曲同賀太平年潞莊松棚叟賣漿棚下午風涼獨澗繞羣木數家成一坊蜂行花已宻蠶罷葉仍桑此地無千步真堪作蛻藏聞蟬中庭白榆樹時有一蟬聲沸絸方抽緒鳴絃忽斷箏蒼煙起平楚落日下髙城曽是天涯客因之百感生雁聲嘹嘹數雁度流響一凄然半落淮南雨遙沉海上天踈砧欲斷處哀角未吹前我亦離羣者聞之夜不眠馬通薪可代薪如桂還宜火作煤翁攤扶杖立童拾戴筐回野屋寒堆整山爐夜撥灰廏官無好事不遣換香來陳伯将作北山梓公嶽居圖余題其上髙僧業何許雲夢澤南洲樓閣諸天上江湖萬里流禪心無住著世事若浮休寂寞京塵裏披圖時卧㳺烏桕樹西湖慈雲山側和靖有詩巾子峯前樹逋仙句最工逈明霜寺外半落石池中鄭老惟書柿崔郎只詠楓山林正寂寞備此作春紅書所見戊戌七月溝中人啖屍道上母抛兒有眼何曽見無方能療饑干戈未解日風雪正寒時歸向妻孥說毋嫌朝食糜其二城南官掘穴日見委屍盈終朝烏鳥下薄暮狼狐鳴氷裂人刳骨風悲鬼哭聲茫茫死生理真宰豈無情偕鄢元止善東門視田白骨如亂石荒村殊慘神惡風生殺氣斜照逼歸人應俗悲多故全生幸此身青青原上麥亦復可憐春題林徳清竹雪齋髙齋修竹林積雪竹間深嵗暮不改色幽人同此心種梅分地隙籠鶴就墻隂想見椒江上扁舟許客尋雪後雪後北風急起行氷滿鬚凍泥憂蹇馬活火愛團蒲數口狼依狽羣情虎畏貙每逢來使問親故有書無其二路滑堆殘雪山晴散宿霾民生已塗炭兵氣尚江淮撫世憂徒切謀身計自乖臨觴且復醉吾命有安排癸巳元日即事禁苑朝珂集宫樓晝刻傳雲開黄道日春麗紫薇天進虎蠻如畫儀鸞仗類仙晨觀凈氛氣即是偃兵年大駕時巡千官導送至大口萬乘巡行逺三靈佑䕶多旌旄隨大纛鼓鐸雜鳴駝麗日浮黄繖㣲風送玉珂臣心如草色不斷到灤河松巢為潜川謝堯章作林棲有隠君結構出塵氛就樹遮青雨牽蘿補白雲雙鳩從此拙獨鶴與平分華屋非無數山中了不聞蛻菴嵗晏百憂薰心排遣以詩乃作五首開嵗七十五故園猶未歸看從今以後知復是邪非星斗天垂象龍蛇地發機邊聲近稍息一醉典春衣其二小小新齋閣温温舊毾㲪精神全藉酒筋力半支籐蟄豸深坯户㝠鴻巧避矰䝉頭衲被底何異在家僧其三世路正如棘吾生猶繫匏詩人歌蟋蟀軍士歎蠨蛸無地營家食何心解客嘲山林徒在眼難覓一枝巢其四書舎如僧舎心閒與静宜寫多髠兔頴藏久蛀貂皮宦蹟年勞見生涯日厯知未應同與俊肯負沃洲期其五久悟無生法從容與化遷機忘橰俯仰道悟蜜中邊宇縣猶多壘干戈已十年吾惟待其定歸種故山田十月一日瓦盎醅純白磚爐火乍紅風生月暈後霜下角聲中饑䑕窺燈暗驚厖吠巷空于今玉堂老詎信暮途窮立冬前二日髙秋日凄冷且復閉門居蠏壮輸芒後醅香出榨初霜籬存晚菊臘瓮作寒葅更好山翁唱陽春恐不如呉下客懐秋荅湛囦白先生廷玉湖海無窮事風霜薄暮年客程淹白日吾道信青天影自酬形贈心寜愛目憐平生五字律名在萬人前懐先隴京國留家久餘生只自憐一單如老衲八十又新年義士心猶血讒夫舌謾涎何時抱尊酒哭向計峯前七月廿九日此醜今方殛京城蹀血新也知天悔禍誰謂國無人勝氣騰龍虎沈機動鬼神大廷親命詔終夜在延春自誓此醜行當殛吾身敢顧危要看奪笏處正是結纓時萬古千秋在皇天后土知寸心三尺簡肯愧史臣詞乙巳初度今日吾生日開尊向竹齋家人更上夀凡事且寛懐學道精神淡匡時志願乖百年原土上自有一坏埋病起强起梳頭坐忩明晚景新生遭兵是刼病與鬼為鄰農事田疇廢邊聲鼓角頻故山多藥物徒切未歸身嵗晚苦寒偶成四章録似北山風暴寒逾急星回嵗欲周缺牙便食粥瘦骨怯重裘節物殊牢落前圖益謬悠蛻窩真類蟄長日火鑪頭其二清眠夢屢覺霜氣轉凄凄春近雁北向月明烏夜啼爐香留墨篆燭淚聚銀泥少釋幽憂疾尋君一杖藜其三䑕劣翻書册猫馴伴坐氊吟懐欣雪夜疾目畏風天惟酒能消日無方可引年我詩猶偈子一問北山禪其四短景催殘嵗窮隂連大荒狙三隨所賦龜六可深藏未了惟文債堪歸祗醉鄉絁衾有餘暖翻喜夜天長雨涼一雨收殘暑新涼夜頓添秋聲滿落葉蟲語傍虛簷衰病便髙卧㳺程歎久淹山林雖寂寞亦足養吾恬四月十三日白丁驅上城徒手不能兵鬬将無人